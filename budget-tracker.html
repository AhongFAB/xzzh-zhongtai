<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>周度预算跟踪工具</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #4facfe;
            --secondary: #0ea5e9;
            --bg-start: #0f172a;
            --bg-end: #1e293b;
            --card-bg: rgba(255,255,255,0.05);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --success: #22c55e;
            --warning: #eab308;
            --danger: #ef4444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            min-height: 100vh;
            color: var(--text-primary);
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            padding: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        select, input[type="month"] {
            padding: 10px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            outline: none;
            transition: all 0.3s;
        }
        select:hover, input[type="month"]:hover { border-color: var(--primary); }
        select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,172,254,0.2); }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(79,172,254,0.4); }
        .btn-secondary { background: rgba(255,255,255,0.1); color: var(--text-primary); border: 1px solid rgba(255,255,255,0.2); }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }
        .btn-danger { background: rgba(239,68,68,0.2); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
        .btn-danger:hover { background: rgba(239,68,68,0.3); }
        .tab-nav {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            padding: 4px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow-x: auto;
        }
        .tab-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .tab-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
        .tab-btn.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .main-content {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 24px;
            min-height: 600px;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            border-radius: 2px;
        }
        .import-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .import-box {
            border: 2px dashed rgba(79,172,254,0.3);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }
        .import-box:hover { border-color: var(--primary); background: rgba(79,172,254,0.05); }
        .import-box.dragover { border-color: var(--primary); background: rgba(79,172,254,0.1); }
        .import-icon { font-size: 48px; margin-bottom: 16px; }
        .import-text { color: var(--text-secondary); margin-bottom: 8px; }
        .import-hint { font-size: 12px; color: var(--text-secondary); opacity: 0.7; }
        .table-wrapper { overflow-x: auto; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background: rgba(255,255,255,0.05); color: var(--text-secondary); font-weight: 600; white-space: nowrap; }
        td { color: var(--text-primary); }
        tr:hover td { background: rgba(255,255,255,0.03); }
        tr.highlight td { background: rgba(239,68,68,0.15) !important; }
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-green { background: rgba(34,197,94,0.2); color: var(--success); }
        .status-yellow { background: rgba(234,179,8,0.2); color: var(--warning); }
        .status-red { background: rgba(239,68,68,0.2); color: var(--danger); }
        .status-purple { background: rgba(168,85,247,0.2); color: #a855f7; }
        .value-positive { color: var(--success); }
        .value-negative { color: var(--danger); }
        .chart-container { position: relative; height: 350px; margin-bottom: 20px; }
        .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .week-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .week-card { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 16px; text-align: center; }
        .week-card-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
        .week-card-value { font-size: 20px; font-weight: 600; color: var(--primary); }
        .week-card-date { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.5; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; text-align: center; }
        .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
        .heatmap-container { overflow-x: auto; }
        .heatmap-table { width: 100%; border-collapse: collapse; }
        .heatmap-table th, .heatmap-table td { padding: 8px 12px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .heatmap-cell { border-radius: 4px; padding: 8px; font-size: 12px; font-weight: 600; }
        .footer { text-align: center; padding: 24px; color: var(--text-secondary); font-size: 12px; }
        .hidden-input { display: none; }
        .view-toggle { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .toggle-btn { padding: 8px 16px; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; background: transparent; color: var(--text-secondary); font-size: 13px; cursor: pointer; transition: all 0.3s; }
        .toggle-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .alert-box { padding: 16px; border-radius: 8px; margin-bottom: 16px; }
        .alert-warning { background: rgba(234,179,8,0.15); border: 1px solid rgba(234,179,8,0.3); }
        .alert-info { background: rgba(79,172,254,0.15); border: 1px solid rgba(79,172,254,0.3); }
        .alert-title { font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .alert-item { font-size: 13px; padding: 4px 0; color: var(--text-secondary); }
        .badge-prev { background: rgba(168,85,247,0.2); color: #a855f7; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 8px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: flex-start; }
            .chart-grid { grid-template-columns: 1fr; }
            .chart-container { height: 280px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📊 周度预算跟踪工具</h1>
            <div class="header-controls">
                <div class="year-month-selector">
                    <input type="month" id="yearMonthPicker" />
                </div>
                <button class="btn btn-secondary" onclick="clearAllData()">🗑️ 清空数据</button>
                <button class="btn btn-secondary" onclick="exportAllData()">📤 导出数据</button>
            </div>
        </header>
        
        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="template">📥 模板下载</button>
            <button class="tab-btn" data-tab="overview">📋 数据总览</button>
            <button class="tab-btn" data-tab="account">🏦 科目分析</button>
            <button class="tab-btn" data-tab="dept">🏢 部门分析</button>
            <button class="tab-btn" data-tab="charts">📈 趋势图表</button>
        </nav>
        
        <main class="main-content">
            <!-- 模板下载页 -->
            <div class="tab-content active" id="template">
                <div class="card">
                    <div class="card-title">Excel数据模板</div>
                    <p style="color: var(--text-secondary); margin-bottom: 20px;">
                        点击下载标准Excel模板，包含三个工作表：科目预算（月度）、实际数据（周度）、上月实际（月度汇总）。
                        可在Excel中编辑后导入系统。
                    </p>
                    <div class="import-section">
                        <div class="import-box" onclick="downloadTemplate()">
                            <div class="import-icon">📊</div>
                            <div class="import-text">下载标准模板</div>
                            <div class="import-hint">含预算/实际/上月实际三工作表</div>
                        </div>
                    </div>
                    
                    <div class="card-title" style="margin-top: 30px;">导入数据</div>
                    <div class="import-section">
                        <div class="import-box" id="budgetDropZone" 
                             ondrop="handleDrop(event, 'budget')" 
                             ondragover="handleDragOver(event)" 
                             ondragleave="handleDragLeave(event)"
                             onclick="document.getElementById('budgetFileInput').click()">
                            <div class="import-icon">💰</div>
                            <div class="import-text">导入科目数据（含上月实际）</div>
                            <div class="import-hint">支持 .xlsx 和 .xls 格式</div>
                        </div>
                        <input type="file" id="budgetFileInput" class="hidden-input" accept=".xlsx,.xls" onchange="handleBudgetImport(event)">
                    </div>
                    
                    <div id="importStatus" style="margin-top: 20px;"></div>
                </div>
                
                <div class="card">
                    <div class="card-title">当前月份周次信息</div>
                    <div class="week-info" id="weekInfoContainer">
                        <p style="color: var(--text-secondary);">请先选择年月查看周次信息</p>
                    </div>
                </div>
            </div>
            
            <!-- 数据总览页 -->
            <div class="tab-content" id="overview">
                <div id="overviewContent">
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <p>暂无数据</p>
                        <p style="font-size: 12px; margin-top: 8px;">请先导入科目数据</p>
                    </div>
                </div>
            </div>
            
            <!-- 科目分析页 -->
            <div class="tab-content" id="account">
                <div id="accountContent">
                    <div class="empty-state">
                        <div class="empty-state-icon">🏦</div>
                        <p>暂无数据</p>
                    </div>
                </div>
            </div>
            
            <!-- 部门分析页 -->
            <div class="tab-content" id="dept">
                <div id="deptContent">
                    <div class="empty-state">
                        <div class="empty-state-icon">🏢</div>
                        <p>暂无数据</p>
                    </div>
                </div>
            </div>
            
            <!-- 趋势图表页 -->
            <div class="tab-content" id="charts">
                <div class="view-toggle">
                    <button class="toggle-btn active" data-view="budget" onclick="switchChartView('budget')">预算vs实际</button>
                    <button class="toggle-btn" data-view="prevMonth" onclick="switchChartView('prevMonth')">上月对比</button>
                    <button class="toggle-btn" data-view="progress" onclick="switchChartView('progress')">达成进度</button>
                    <button class="toggle-btn" data-view="trend" onclick="switchChartView('trend')">趋势分析</button>
                    <button class="toggle-btn" data-view="heatmap" onclick="switchChartView('heatmap')">热力图</button>
                </div>
                <div id="chartContent">
                    <div class="empty-state">
                        <div class="empty-state-icon">📈</div>
                        <p>暂无图表数据</p>
                    </div>
                </div>
            </div>
        </main>
        
        <footer class="footer">
            <p>© 2024 张洪杰 版权所有</p>
        </footer>
    </div>

    <script>
        // ==================== 全局变量 ====================
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth() + 1;
        let budgetData = null;
        let actualData = null;
        let prevMonthData = null;  // 上月实际数据
        let weeklyBudgets = [];
        let currentChartView = 'budget';
        let charts = {};
        
        // 预置科目
        const defaultAccounts = [
            { name: '主营业务收入', type: 'income' },
            { name: '其他业务收入', type: 'income' },
            { name: '主营业务成本', type: 'cost' },
            { name: '变动成本', type: 'cost' },
            { name: '人工成本', type: 'expense' },
            { name: '物流成本', type: 'expense' },
            { name: '广告费', type: 'expense' },
            { name: '办公费', type: 'expense' },
            { name: '差旅费', type: 'expense' },
            { name: '财务费用', type: 'expense' },
            { name: '租金', type: 'expense' },
            { name: '水电费', type: 'expense' },
            { name: '日常费用', type: 'expense' }
        ];
        const defaultDepts = ['销售部', '采购部', '仓储物流部', '财务部', '行政部', '总经办'];
        
        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date();
            document.getElementById('yearMonthPicker').value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
            loadData();
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() { switchTab(this.dataset.tab); });
            });
            
            document.getElementById('yearMonthPicker').addEventListener('change', function() {
                const [year, month] = this.value.split('-').map(Number);
                currentYear = year;
                currentMonth = month;
                updateWeekInfo();
                updateAllViews();
                saveData();
            });
            
            updateWeekInfo();
            updateAllViews();
        });
        
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabId));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.toggle('active', content.id === tabId));
            setTimeout(() => updateAllViews(), 100);
        }
        
        // ==================== 周次信息 ====================
        function updateWeekInfo() {
            const weeks = calculateWeeks(currentYear, currentMonth);
            const container = document.getElementById('weekInfoContainer');
            
            let html = '';
            weeks.forEach((week, index) => {
                html += `
                    <div class="week-card">
                        <div class="week-card-label">第${index + 1}周</div>
                        <div class="week-card-value">${week.days}天</div>
                        <div class="week-card-date">${week.startDate} ~ ${week.endDate}</div>
                    </div>
                `;
            });
            container.innerHTML = html || '<p style="color: var(--text-secondary);">请选择年月</p>';
            calculateWeeklyBudgets();
        }
        
        function calculateWeeks(year, month) {
            const weeks = [];
            const daysInMonth = new Date(year, month, 0).getDate();
            let currentDate = 1, weekNum = 1;
            
            while (currentDate <= daysInMonth) {
                const daysInWeek = Math.min(7, daysInMonth - currentDate + 1);
                weeks.push({
                    weekNum: weekNum,
                    startDate: `${month}月${currentDate}日`,
                    endDate: `${month}月${currentDate + daysInWeek - 1}日`,
                    days: daysInWeek,
                    startDay: currentDate,
                    endDay: currentDate + daysInWeek - 1
                });
                currentDate += daysInWeek;
                weekNum++;
            }
            return weeks;
        }
        
        function calculateWeeklyBudgets() {
            if (!budgetData) { weeklyBudgets = {}; return; }
            
            const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
            const weeks = calculateWeeks(currentYear, currentMonth);
            weeklyBudgets = {};
            
            for (const account in budgetData) {
                const monthlyBudget = budgetData[account].total || 0;
                const dailyBudget = monthlyBudget / daysInMonth;
                
                weeklyBudgets[account] = { total: monthlyBudget, byDept: {}, byWeek: {}, weeklyTotal: {} };
                
                for (const dept in budgetData[account].byDept) {
                    const deptMonthly = budgetData[account].byDept[dept];
                    const deptDaily = deptMonthly / daysInMonth;
                    weeklyBudgets[account].byDept[dept] = deptMonthly;
                    weeklyBudgets[account].byWeek[dept] = {};
                    weeks.forEach((week, index) => {
                        weeklyBudgets[account].byWeek[dept][`W${index + 1}`] = deptDaily * week.days;
                    });
                }
                
                weeks.forEach((week, index) => {
                    weeklyBudgets[account].weeklyTotal[`W${index + 1}`] = dailyBudget * week.days;
                });
            }
        }
        
        // ==================== 模板下载 ====================
        function downloadTemplate() {
            const wb = XLSX.utils.book_new();
            const weeks = calculateWeeks(currentYear, currentMonth);
            const weekHeaders = weeks.map((w, i) => `W${i + 1}`);
            
            // Sheet1: 科目预算
            const budgetData = [['科目', '类型', ...defaultDepts, '合计']];
            defaultAccounts.forEach(account => {
                const row = [account.name, account.type === 'income' ? '收入' : (account.type === 'cost' ? '成本' : '费用')];
                defaultDepts.forEach(() => row.push(''));
                row.push('');
                budgetData.push(row);
            });
            const ws1 = XLSX.utils.aoa_to_sheet(budgetData);
            XLSX.utils.book_append_sheet(wb, ws1, '科目预算');
            
            // Sheet2: 实际数据
            const actualData = [['科目', '部门', ...weekHeaders, '合计']];
            defaultAccounts.forEach(account => {
                defaultDepts.forEach(dept => {
                    const row = [account.name, dept];
                    weekHeaders.forEach(() => row.push(''));
                    row.push('');
                    actualData.push(row);
                });
            });
            const ws2 = XLSX.utils.aoa_to_sheet(actualData);
            XLSX.utils.book_append_sheet(wb, ws2, '实际数据');
            
            // Sheet3: 上月实际
            const prevMonthData = [['科目', '类型', ...defaultDepts, '合计']];
            defaultAccounts.forEach(account => {
                const row = [account.name, account.type === 'income' ? '收入' : (account.type === 'cost' ? '成本' : '费用')];
                defaultDepts.forEach(() => row.push(''));
                row.push('');
                prevMonthData.push(row);
            });
            const ws3 = XLSX.utils.aoa_to_sheet(prevMonthData);
            XLSX.utils.book_append_sheet(wb, ws3, '上月实际');
            
            // 使用说明
            const readmeData = [[
                '【说明】',
                '1. 科目预算 Sheet：填写各科目在各部门的月度预算金额',
                '2. 实际数据 Sheet：填写各科目在各部门每周的实际发生额（W1-W5代表第1-5周）',
                '3. 上月实际 Sheet：填写各科目在上月的实际发生额（用于环比分析）',
                '4. 类型列：收入类填写"收入"，成本类填写"成本"，费用类填写"费用"',
                '5. 支持增删行和列，但请保持首行列标题不变',
                '6. 可将三个Sheet的数据填写在同一文件或分开多个文件导入'
            ]];
            const ws4 = XLSX.utils.aoa_to_sheet(readmeData);
            XLSX.utils.book_append_sheet(wb, ws4, '使用说明');
            
            XLSX.writeFile(wb, 'budget-template.xlsx');
            showStatus('模板下载成功！', 'success');
        }
        
        // ==================== 文件拖拽 ====================
        function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('dragover'); }
        function handleDragLeave(e) { e.currentTarget.classList.remove('dragover'); }
        function handleDrop(e, type) {
            e.preventDefault();
            e.currentTarget.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) processImportFile(file);
        }
        
        function handleBudgetImport(e) {
            const file = e.target.files[0];
            if (file) processImportFile(file);
        }
        
        // ==================== 文件导入（统一处理） ====================
        function processImportFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    
                    let hasData = false;
                    
                    workbook.SheetNames.forEach(sheetName => {
                        const sheet = workbook.Sheets[sheetName];
                        const jsonData = XLSX.utils.sheet_to_json(sheet);
                        
                        if (jsonData.length === 0) return;
                        
                        // 判断Sheet类型并解析
                        const lowerName = sheetName.toLowerCase();
                        
                        if (lowerName.includes('预算') || lowerName.includes('科目')) {
                            budgetData = parseBudgetData(jsonData);
                            hasData = true;
                        } else if (lowerName.includes('实际') && !lowerName.includes('上月')) {
                            actualData = parseActualData(jsonData);
                            hasData = true;
                        } else if (lowerName.includes('上月')) {
                            prevMonthData = parsePrevMonthData(jsonData);
                            hasData = true;
                        } else if (lowerName === 'sheet1' || lowerName === '科目预算') {
                            budgetData = parseBudgetData(jsonData);
                            hasData = true;
                        } else if (lowerName === 'sheet2' || lowerName === '实际数据') {
                            actualData = parseActualData(jsonData);
                            hasData = true;
                        } else if (lowerName === 'sheet3' || lowerName === '上月实际') {
                            prevMonthData = parsePrevMonthData(jsonData);
                            hasData = true;
                        }
                    });
                    
                    if (!hasData) {
                        // 尝试按顺序解析前三个Sheet
                        const sheetNames = workbook.SheetNames.slice(0, 3);
                        if (sheetNames.length >= 1) {
                            const s1 = workbook.Sheets[sheetNames[0]];
                            budgetData = parseBudgetData(XLSX.utils.sheet_to_json(s1));
                        }
                        if (sheetNames.length >= 2) {
                            const s2 = workbook.Sheets[sheetNames[1]];
                            actualData = parseActualData(XLSX.utils.sheet_to_json(s2));
                        }
                        if (sheetNames.length >= 3) {
                            const s3 = workbook.Sheets[sheetNames[2]];
                            prevMonthData = parsePrevMonthData(XLSX.utils.sheet_to_json(s3));
                        }
                    }
                    
                    calculateWeeklyBudgets();
                    saveData();
                    updateAllViews();
                    
                    let msg = [];
                    if (budgetData) msg.push('科目预算');
                    if (actualData) msg.push('实际数据');
                    if (prevMonthData) msg.push('上月实际');
                    showStatus(`导入成功！${msg.length > 0 ? '已导入: ' + msg.join('/') : '未识别到有效数据'}`, 'success');
                    
                } catch (error) {
                    console.error(error);
                    showStatus('文件解析失败：' + error.message, 'error');
                }
            };
            reader.readAsArrayBuffer(file);
        }
        
        function parseBudgetData(jsonData) {
            const result = {};
            jsonData.forEach(row => {
                const keys = Object.keys(row);
                let accountName = null, accountType = null, depts = {}, total = 0;
                
                keys.forEach(key => {
                    if (key === '科目') accountName = row[key];
                    else if (key === '类型') accountType = row[key];
                    else if (key === '合计' || key === '总计') total = parseFloat(row[key]) || 0;
                    else {
                        const value = parseFloat(row[key]);
                        if (!isNaN(value) && value !== 0) depts[key] = value;
                    }
                });
                
                if (accountName) {
                    result[accountName] = {
                        type: accountType === '收入' ? 'income' : (accountType === '成本' ? 'cost' : 'expense'),
                        byDept: depts,
                        total: total || Object.values(depts).reduce((a, b) => a + b, 0)
                    };
                }
            });
            return result;
        }
        
        function parseActualData(jsonData) {
            const result = {};
            const weeks = calculateWeeks(currentYear, currentMonth);
            const weekHeaders = weeks.map((w, i) => `W${i + 1}`);
            
            jsonData.forEach(row => {
                const accountName = row['科目'];
                const dept = row['部门'];
                if (!accountName) return;
                
                if (!result[accountName]) result[accountName] = { byDept: {} };
                if (dept) {
                    result[accountName].byDept[dept] = {};
                    let deptTotal = 0;
                    weekHeaders.forEach(week => {
                        const value = parseFloat(row[week]) || 0;
                        result[accountName].byDept[dept][week] = value;
                        deptTotal += value;
                    });
                    result[accountName].byDept[dept]['合计'] = deptTotal;
                }
            });
            return result;
        }
        
        function parsePrevMonthData(jsonData) {
            const result = {};
            jsonData.forEach(row => {
                const keys = Object.keys(row);
                let accountName = null, accountType = null, depts = {}, total = 0;
                
                keys.forEach(key => {
                    if (key === '科目') accountName = row[key];
                    else if (key === '类型') accountType = row[key];
                    else if (key === '合计' || key === '总计') total = parseFloat(row[key]) || 0;
                    else {
                        const value = parseFloat(row[key]);
                        if (!isNaN(value) && value !== 0) depts[key] = value;
                    }
                });
                
                if (accountName) {
                    result[accountName] = {
                        type: accountType === '收入' ? 'income' : (accountType === '成本' ? 'cost' : 'expense'),
                        byDept: depts,
                        total: total || Object.values(depts).reduce((a, b) => a + b, 0)
                    };
                }
            });
            return result;
        }
        
        // ==================== 数据持久化 ====================
        function saveData() {
            const data = {
                year: currentYear,
                month: currentMonth,
                budgetData: budgetData,
                actualData: actualData,
                prevMonthData: prevMonthData
            };
            localStorage.setItem('budgetTrackerData', JSON.stringify(data));
        }
        
        function loadData() {
            try {
                const saved = localStorage.getItem('budgetTrackerData');
                if (saved) {
                    const data = JSON.parse(saved);
                    currentYear = data.year || new Date().getFullYear();
                    currentMonth = data.month || new Date().getMonth() + 1;
                    budgetData = data.budgetData;
                    actualData = data.actualData;
                    prevMonthData = data.prevMonthData;
                    
                    document.getElementById('yearMonthPicker').value = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
                    calculateWeeklyBudgets();
                }
            } catch (error) { console.error('加载数据失败:', error); }
        }
        
        function clearAllData() {
            if (confirm('确定要清空所有数据吗？')) {
                budgetData = null;
                actualData = null;
                prevMonthData = null;
                weeklyBudgets = {};
                localStorage.removeItem('budgetTrackerData');
                updateAllViews();
                showStatus('数据已清空', 'success');
            }
        }
        
        function exportAllData() {
            if (!budgetData && !actualData) {
                showStatus('没有可导出的数据', 'error');
                return;
            }
            
            const wb = XLSX.utils.book_new();
            const weeks = calculateWeeks(currentYear, currentMonth);
            const weekHeaders = weeks.map((w, i) => `W${i + 1}`);
            
            // 科目预算
            if (budgetData) {
                const budgetRows = [['科目', '类型']];
                const depts = new Set();
                Object.values(budgetData).forEach(acc => Object.keys(acc.byDept).forEach(d => depts.add(d)));
                const deptList = Array.from(depts);
                budgetRows[0] = [...budgetRows[0], ...deptList, '合计'];
                
                Object.entries(budgetData).forEach(([name, acc]) => {
                    const row = [name, acc.type === 'income' ? '收入' : (acc.type === 'cost' ? '成本' : '费用')];
                    let total = 0;
                    deptList.forEach(d => { const v = acc.byDept[d] || 0; row.push(v); total += v; });
                    row.push(total);
                    budgetRows.push(row);
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(budgetRows), '科目预算');
            }
            
            // 实际数据
            if (actualData) {
                const actualRows = [['科目', '部门', ...weekHeaders, '合计']];
                Object.entries(actualData).forEach(([account, data]) => {
                    Object.entries(data.byDept || {}).forEach(([dept, weeks]) => {
                        const row = [account, dept];
                        let total = 0;
                        weekHeaders.forEach(w => { const v = weeks[w] || 0; row.push(v); total += v; });
                        row.push(total);
                        actualRows.push(row);
                    });
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(actualRows), '实际数据');
            }
            
            // 上月实际
            if (prevMonthData) {
                const prevRows = [['科目', '类型']];
                const depts = new Set();
                Object.values(prevMonthData).forEach(acc => Object.keys(acc.byDept).forEach(d => depts.add(d)));
                const deptList = Array.from(depts);
                prevRows[0] = [...prevRows[0], ...deptList, '合计'];
                
                Object.entries(prevMonthData).forEach(([name, acc]) => {
                    const row = [name, acc.type === 'income' ? '收入' : (acc.type === 'cost' ? '成本' : '费用')];
                    let total = 0;
                    deptList.forEach(d => { const v = acc.byDept[d] || 0; row.push(v); total += v; });
                    row.push(total);
                    prevRows.push(row);
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(prevRows), '上月实际');
            }
            
            XLSX.writeFile(wb, `预算跟踪_${currentYear}年${currentMonth}月.xlsx`);
            showStatus('数据导出成功！', 'success');
        }
        
        // ==================== 视图更新 ====================
        function updateAllViews() {
            updateOverview();
            updateAccountView();
            updateDeptView();
            updateChartView();
        }
        
        // 数据总览（含环比分析）
        function updateOverview() {
            const container = document.getElementById('overviewContent');
            
            if (!budgetData) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📊</div><p>暂无科目预算数据</p></div>';
                return;
            }
            
            const weeks = calculateWeeks(currentYear, currentMonth);
            const weekHeaders = weeks.map((w, i) => `W${i + 1}`);
            
            // 计算统计数据
            let totalBudget = 0, totalActual = 0, totalPrev = 0;
            Object.entries(budgetData).forEach(([account, data]) => {
                totalBudget += data.total;
                if (actualData?.[account]) {
                    Object.values(actualData[account].byDept || {}).forEach(deptData => {
                        Object.values(deptData).forEach(v => { if (typeof v === 'number') totalActual += v; });
                    });
                }
                if (prevMonthData?.[account]) totalPrev += prevMonthData[account].total;
            });
            
            const overallRate = totalBudget > 0 ? (totalActual / totalBudget * 100).toFixed(1) : 0;
            const chainRate = totalPrev > 0 ? ((totalBudget - totalPrev) / totalPrev * 100).toFixed(1) : 0;
            
            // 预算合理性检查
            const warnings = [];
            Object.entries(budgetData).forEach(([account, data]) => {
                const prev = prevMonthData?.[account]?.total || 0;
                if (prev > 0) {
                    const deviation = (data.total - prev) / prev;
                    if (Math.abs(deviation) > 0.2) {
                        warnings.push({
                            name: account,
                            budget: data.total,
                            prev: prev,
                            deviation: deviation,
                            type: data.type
                        });
                    }
                }
            });
            
            let html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">本月预算</div>
                        <div class="stat-value">¥${formatNumber(totalBudget)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">上月实际</div>
                        <div class="stat-value">¥${formatNumber(totalPrev)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">环比变动</div>
                        <div class="stat-value" style="font-size: 22px; color: ${chainRate >= 0 ? 'var(--success)' : 'var(--danger)'}">${chainRate >= 0 ? '+' : ''}${chainRate}%</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">整体达成率</div>
                        <div class="stat-value">${overallRate}%</div>
                        <div class="stat-sub">${getStatusText(overallRate / 100, 'income')}</div>
                    </div>
                </div>
            `;
            
            // 预算合理性警告
            if (warnings.length > 0) {
                html += `
                    <div class="alert-box alert-warning">
                        <div class="alert-title">⚠️ 预算合理性提醒（偏差超过20%）</div>
                        ${warnings.map(w => {
                            const devText = (w.deviation * 100).toFixed(0);
                            return `<div class="alert-item">${w.name}：预算¥${formatNumber(w.budget)} vs 上月实际¥${formatNumber(w.prev)}（${w.deviation >= 0 ? '+' : ''}${devText}%）</div>`;
                        }).join('')}
                    </div>
                `;
            }
            
            // 周度对比表
            html += `
                <div class="card">
                    <div class="card-title">周度预算-实际-上月对比</div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>周次</th>
                                    <th>日期范围</th>
                                    <th>本月预算</th>
                                    <th>上月实际<span class="badge-prev">日均×天数</span></th>
                                    <th>本月实际</th>
                                    <th>vs上月</th>
                                    <th>达成率</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody>
            `;
            
            const prevDaysInMonth = new Date(currentMonth === 1 ? currentYear - 1 : currentYear, currentMonth === 1 ? 12 : currentMonth - 1, 0).getDate();
            const prevDailyAvg = totalPrev / prevDaysInMonth;
            
            weekHeaders.forEach((week, i) => {
                let weekBudget = 0, weekActual = 0;
                Object.entries(budgetData).forEach(([account, data]) => {
                    weekBudget += weeklyBudgets[account]?.weeklyTotal?.[week] || 0;
                });
                Object.entries(actualData || {}).forEach(([account, data]) => {
                    Object.values(data.byDept || {}).forEach(deptData => { weekActual += deptData[week] || 0; });
                });
                
                const prevPeriodActual = prevDailyAvg * weeks[i].days;
                const vsPrev = prevPeriodActual > 0 ? ((weekActual - prevPeriodActual) / prevPeriodActual * 100).toFixed(1) : 0;
                const rate = weekBudget > 0 ? (weekActual / weekBudget * 100).toFixed(1) : 0;
                
                html += `
                    <tr>
                        <td>${week}</td>
                        <td>${weeks[i].startDate} - ${weeks[i].endDate}</td>
                        <td>¥${formatNumber(weekBudget)}</td>
                        <td>¥${formatNumber(prevPeriodActual)}</td>
                        <td>¥${formatNumber(weekActual)}</td>
                        <td class="${vsPrev >= 0 ? 'value-positive' : 'value-negative'}">${vsPrev >= 0 ? '+' : ''}${vsPrev}%</td>
                        <td>${rate}%</td>
                        <td>${getStatusBadge(rate / 100, 'income')}</td>
                    </tr>
                `;
            });
            
            html += '</tbody></table></div></div>';
            
            // 科目汇总表（含环比）
            html += `
                <div class="card">
                    <div class="card-title">科目汇总对比</div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>科目</th>
                                    <th>类型</th>
                                    <th>上月实际</th>
                                    <th>本月预算</th>
                                    <th>环比变动</th>
                                    <th>本月实际</th>
                                    <th>vs预算</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody>
            `;
            
            Object.entries(budgetData).forEach(([account, data]) => {
                let actual = 0;
                Object.entries(actualData?.[account]?.byDept || {}).forEach(([dept, weeks]) => {
                    Object.values(weeks).forEach(v => { if (typeof v === 'number') actual += v; });
                });
                
                const prev = prevMonthData?.[account]?.total || 0;
                const chainChange = prev > 0 ? ((data.total - prev) / prev * 100).toFixed(1) : 0;
                const vsBudget = data.total > 0 ? ((actual - data.total) / data.total * 100).toFixed(1) : 0;
                const typeName = data.type === 'income' ? '收入' : (data.type === 'cost' ? '成本' : '费用');
                
                html += `
                    <tr>
                        <td>${account}</td>
                        <td>${typeName}</td>
                        <td>¥${formatNumber(prev)}</td>
                        <td>¥${formatNumber(data.total)}</td>
                        <td class="${chainChange >= 0 ? 'value-positive' : 'value-negative'}">${chainChange >= 0 ? '+' : ''}${chainChange}%</td>
                        <td>¥${formatNumber(actual)}</td>
                        <td class="${vsBudget >= 0 ? 'value-positive' : 'value-negative'}">${vsBudget >= 0 ? '+' : ''}${vsBudget}%</td>
                        <td>${getStatusBadge(actual / data.total, data.type)}</td>
                    </tr>
                `;
            });
            
            html += '</tbody></table></div></div>';
            
            container.innerHTML = html;
        }

                    if (data.byDept[dept]) totalBudget += data.byDept[dept];
                });
                Object.entries(actualData || {}).forEach(([account, data]) => {
                    Object.values(data.byDept?.[dept] || {}).forEach(v => { if (typeof v === 'number') totalActual += v; });
                });
                Object.entries(prevMonthData || {}).forEach(([account, data]) => {
                    if (data.byDept?.[dept]) totalPrev += data.byDept[dept];
                });
                
                let weeklyStats = weekHeaders.map(w => {
                    let budget = 0, actual = 0;
                    Object.entries(budgetData).forEach(([account, data]) => {
                        budget += weeklyBudgets[account]?.byWeek?.[dept]?.[w] || 0;
                    });
                    Object.entries(actualData || {}).forEach(([account, data]) => { actual += data.byDept?.[dept]?.[w] || 0; });
                    return { budget, actual, rate: budget > 0 ? (actual / budget * 100).toFixed(1) : 0 };
                });
                
                const totalRate = totalBudget > 0 ? (totalActual / totalBudget * 100).toFixed(1) : 0;
                const chainChange = totalPrev > 0 ? ((totalBudget - totalPrev) / totalPrev * 100).toFixed(1) : 0;
                
                html += `
                    <div class="card animate-in">
                        <div class="card-title">${dept}</div>
                        <div class="stats-grid">
                            <div class="stat-card"><div class="stat-label">上月实际</div><div class="stat-value" style="font-size: 20px;">¥${formatNumber(totalPrev)}</div></div>
                            <div class="stat-card"><div class="stat-label">本月预算</div><div class="stat-value" style="font-size: 20px;">¥${formatNumber(totalBudget)}</div></div>
                            <div class="stat-card"><div class="stat-label">环比变动</div><div class="stat-value" style="font-size: 20px; color: ${chainChange >= 0 ? 'var(--success)' : 'var(--danger)'}">${chainChange >= 0 ? '+' : ''}${chainChange}%</div></div>
                            <div class="stat-card"><div class="stat-label">达成率</div><div class="stat-value" style="font-size: 20px;">${totalRate}%</div></div>
                        </div>
                        
                        <div class="table-wrapper">
                            <table>
                                <thead><tr><th>周次</th>${weekHeaders.map(w => `<th>${w}</th>`).join('')}</tr></thead>
                                <tbody>
                                    <tr><td>预算</td>${weeklyStats.map(w => `<td>¥${formatNumber(w.budget)}</td>`).join('')}</tr>
                                    <tr><td>实际</td>${weeklyStats.map(w => `<td>¥${formatNumber(w.actual)}</td>`).join('')}</tr>
                                    <tr><td>达成率</td>${weeklyStats.map(w => `<td>${getStatusBadge(w.rate / 100, 'expense')}</td>`).join('')}</tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html || '<div class="empty-state"><p>暂无部门数据</p></div>';
        }
        
        // ==================== 图表 ====================
        function switchChartView(view) {
            currentChartView = view;
            document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.view === view));
            updateChartView();
        }
        
        function updateChartView() {
            const container = document.getElementById('chartContent');
            if (!budgetData) { container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📈</div><p>暂无图表数据</p></div>'; return; }
            
            Object.values(charts).forEach(chart => { if (chart && typeof chart.destroy === 'function') chart.destroy(); });
            charts = {};
            
            switch (currentChartView) {
                case 'budget': renderBudgetVsActualChart(container); break;
                case 'prevMonth': renderPrevMonthCompareChart(container); break;
                case 'progress': renderProgressChart(container); break;
                case 'trend': renderTrendChart(container); break;
                case 'heatmap': renderHeatmapChart(container); break;
            }
        }
        
        function renderBudgetVsActualChart(container) {
            const weeks = calculateWeeks(currentYear, currentMonth);
            const weekLabels = weeks.map((w, i) => `第${i + 1}周`);
            const weekHeaders = weeks.map((w, i) => `W${i + 1}`);
            
            const weeklyBudgets_total = weekHeaders.map(w => {
                let total = 0;
                Object.values(budgetData).forEach(data => { total += weeklyBudgets[data]?.weeklyTotal?.[w] || 0; });
                return total;
            });
            
            const weeklyActuals_total = weekHeaders.map(w => {
                let total = 0;
                Object.entries(actualData || {}).forEach(([account, data]) => {
                    Object.values(data.byDept || {}).forEach(deptData => { total += deptData[w] || 0; });
                });
                return total;
            });
            
            container.innerHTML = `<div class="card"><div class="card-title">每周预算 vs 实际</div><div class="chart-container"><canvas id="budgetChart"></canvas></div></div>`;
            
            new Chart(document.getElementById('budgetChart'), {
                type: 'bar',
                data: {
                    labels: weekLabels,
                    datasets: [
                        { label: '预算', data: weeklyBudgets_total, backgroundColor: 'rgba(79, 172, 254, 0.8)', borderRadius: 4 },
                        { label: '实际', data: weeklyActuals_total, backgroundColor: 'rgba(14, 165, 233, 0.8)', borderRadius: 4 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8' } } }, scales: { x: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.1)' } }, y: { ticks: { color: '#94a3b8', callback: v => '¥' + (v >= 10000 ? (v/10000).toFixed(1) + '万' : v) }, grid: { color: 'rgba(255,255,255,0.1)' } } } }
            });
        }
        
        function renderPrevMonthCompareChart(container) {
            const accounts = Object.keys(budgetData);
            
            const budgets = accounts.map(a => budgetData[a].total);
            const actuals = accounts.map(a => {
                let total = 0;
                Object.entries(actualData?.[a]?.byDept || {}).forEach(([dept, weeks]) => {
                    Object.values(weeks).forEach(v => { if (typeof v === 'number') total += v; });
                });
                return total;
            });
            const prevs = accounts.map(a => prevMonthData?.[a]?.total || 0);
            
            container.innerHTML = `<div class="card"><div class="card-title">本月预算 vs 上月实际 vs 本月实际</div><div class="chart-container"><canvas id="prevChart"></canvas></div></div>`;
            
            new Chart(document.getElementById('prevChart'), {
                type: 'bar',
                data: {
                    labels: accounts,
                    datasets: [
                        { label: '上月实际', data: prevs, backgroundColor: 'rgba(168, 85, 247, 0.7)', borderRadius: 4 },
                        { label: '本月预算', data: budgets, backgroundColor: 'rgba(79, 172, 254, 0.8)', borderRadius: 4 },
                        { label: '本月实际', data: actuals, backgroundColor: 'rgba(14, 165, 233, 0.8)', borderRadius: 4 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8' } } }, scales: { x: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.1)' } }, y: { ticks: { color: '#94a3b8', callback: v => '¥' + (v >= 10000 ? (v/10000).toFixed(1) + '万' : v) }, grid: { color: 'rgba(255,255,255,0.1)' } } } }
            });
        }
        
        function renderProgressChart(container) {
            const accounts = Object.keys(budgetData);
            const budgets = accounts.map(a => budgetData[a].total);
            const actuals = accounts.map(a => {
                let total = 0;
                Object.entries(actualData?.[a]?.byDept || {}).forEach(([dept, weeks]) => {
                    Object.values(weeks).forEach(v => { if (typeof v === 'number') total += v; });
                });
                return total;
            });
            
            container.innerHTML = `<div class="card"><div class="card-title">各科目达成进度</div><div class="chart-container"><canvas id="progressChart"></canvas></div></div>`;
            
            new Chart(document.getElementById('progressChart'), {
                type: 'bar',
                data: {
                    labels: accounts,
                    datasets: [
                        { label: '预算', data: budgets, backgroundColor: 'rgba(79, 172, 254, 0.5)', borderRadius: 4 },
                        { label: '实际', data: actuals, backgroundColor: actuals.map((a, i) => {
                            const budget = budgets[i];
                            const rate = budget > 0 ? a / budget : 0;
                            const type = budgetData[accounts[i]].type;
                            if (type === 'income') {
                                if (rate >= 1) return 'rgba(34, 197, 94, 0.8)';
                                if (rate >= 0.8) return 'rgba(234, 179, 8, 0.8)';
                                return 'rgba(239, 68, 68, 0.8)';
                            } else {
                                if (rate <= 1) return 'rgba(34, 197, 94, 0.8)';
                                if (rate <= 1.2) return 'rgba(234, 179, 8, 0.8)';
                                return 'rgba(239, 68, 68, 0.8)';
                            }
                        }), borderRadius: 4 }
                    ]
                },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8' } } }, scales: { x: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.1)' } }, y: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.1)' } } } }
            });
        }
        
        function renderTrendChart(container) {
            const weeks = calculateWeeks(currentYear, currentMonth);
            const weekLabels = weeks.map((w, i) => `第${i + 1}周`);
            const weekHeaders = weeks.map((w, i) => `W${i + 1}`);
            
            const accounts = Object.keys(budgetData);
            const colors = ['rgba(79, 172, 254, 1)', 'rgba(14, 165, 233, 1)', 'rgba(34, 197, 94, 1)', 'rgba(234, 179, 8, 1)', 'rgba(239, 68, 68, 1)', 'rgba(168, 85, 247, 1)', 'rgba(236, 72, 153, 1)'];
            
            const datasets = accounts.slice(0, 7).map((account, i) => {
                const weeklyRates = weekHeaders.map(w => {
                    let budget = weeklyBudgets[account]?.weeklyTotal?.[w] || 0;
                    let actual = 0;
                    Object.values(actualData?.[account]?.byDept || {}).forEach(deptData => { actual += deptData[w] || 0; });
                    return budget > 0 ? (actual / budget * 100) : 0;
                });
                return { label: account, data: weeklyRates, borderColor: colors[i], tension: 0.3, fill: false };
            });
            
            container.innerHTML = `<div class="card"><div class="card-title">各科目达成率趋势</div><div class="chart-container"><canvas id="trendChart"></canvas></div></div>`;
            
            new Chart(document.getElementById('trendChart'), {
                type: 'line',
                data: { labels: weekLabels, datasets: datasets },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8' } }, tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.raw.toFixed(1) + '%' } } }, scales: { x: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.1)' } }, y: { ticks: { color: '#94a3b8', callback: v => v + '%' }, grid: { color: 'rgba(255,255,255,0.1)' } } } }
            });
        }
        
        function renderHeatmapChart(container) {
            const accounts = Object.keys(budgetData);
            const allDepts = new Set();
            Object.values(budgetData).forEach(data => Object.keys(data.byDept).forEach(d => allDepts.add(d)));
            if (prevMonthData) Object.values(prevMonthData).forEach(data => Object.keys(data.byDept).forEach(d => allDepts.add(d)));
            const depts = Array.from(allDepts);
            
            let heatmapHtml = '<table class="heatmap-table"><thead><tr><th>科目/部门</th>';
            depts.forEach(dept => { heatmapHtml += `<th>${dept}</th>`; });
            heatmapHtml += '</tr></thead><tbody>';
            
            accounts.forEach(account => {
                const accountType = budgetData[account].type;
                heatmapHtml += `<tr><td><strong>${account}</strong></td>`;
                
                depts.forEach(dept => {
                    let budget = budgetData[account].byDept[dept] || 0;
                    let prev = prevMonthData?.[account]?.byDept?.[dept] || 0;
                    let actual = 0;
                    Object.values(actualData?.[account]?.byDept?.[dept] || {}).forEach(v => { if (typeof v === 'number') actual += v; });
                    
                    const rate = budget > 0 ? (actual / budget * 100) : 0;
                    const chainRate = prev > 0 ? ((budget - prev) / prev * 100) : 0;
                    const bgColor = getHeatmapColor(rate, accountType);
                    const chainColor = Math.abs(chainRate) > 20 ? 'rgba(239, 68, 68, 0.6)' : bgColor;
                    
                    heatmapHtml += `<td><div class="heatmap-cell" style="background: ${chainColor};" title="达成:${rate.toFixed(0)}% 环比:${chainRate >= 0 ? '+' : ''}${chainRate.toFixed(0)}%">${rate.toFixed(0)}%</div></td>`;
                });
                heatmapHtml += '</tr>';
            });
            heatmapHtml += '</tbody></table>';
            
            container.innerHTML = `
                <div class="card">
                    <div class="card-title">科目×部门达成率热力图（红色边框=环比偏差>20%）</div>
                    <div style="margin-bottom: 16px; font-size: 12px; color: var(--text-secondary);">
                        <span style="display: inline-block; width: 16px; height: 16px; background: rgba(239, 68, 68, 0.8); border-radius: 4px; vertical-align: middle;"></span> <80%
                        <span style="display: inline-block; width: 16px; height: 16px; background: rgba(234, 179, 8, 0.8); border-radius: 4px; vertical-align: middle; margin-left: 16px;"></span> 80%-100%
                        <span style="display: inline-block; width: 16px; height: 16px; background: rgba(34, 197, 94, 0.8); border-radius: 4px; vertical-align: middle; margin-left: 16px;"></span> ≥100%
                    </div>
                    <div class="heatmap-container">${heatmapHtml}</div>
                </div>
            `;
        }
        
        function getHeatmapColor(rate, accountType) {
            if (accountType === 'income') {
                if (rate >= 100) return 'rgba(34, 197, 94, 0.8)';
                if (rate >= 80) return 'rgba(234, 179, 8, 0.8)';
                return 'rgba(239, 68, 68, 0.8)';
            } else {
                if (rate <= 100) return 'rgba(34, 197, 94, 0.8)';
                if (rate <= 120) return 'rgba(234, 179, 8, 0.8)';
                return 'rgba(239, 68, 68, 0.8)';
            }
        }
        
        // ==================== 辅助函数 ====================
        function formatNumber(num) {
            if (num === null || num === undefined || isNaN(num)) return '0';
            return Math.round(num).toLocaleString('zh-CN');
        }
        
        function getStatusBadge(rate, type) {
            let status, text;
            if (type === 'income') {
                if (rate >= 1) { status = 'status-green'; text = '达标'; }
                else if (rate >= 0.8) { status = 'status-yellow'; text = '预警'; }
                else { status = 'status-red'; text = '未达标'; }
            } else {
                if (rate <= 1) { status = 'status-green'; text = '达标'; }
                else if (rate <= 1.2) { status = 'status-yellow'; text = '预警'; }
                else { status = 'status-red'; text = '超支'; }
            }
            return `<span class="status-indicator ${status}">${text} ${(rate * 100).toFixed(1)}%</span>`;
        }
        
        function getStatusText(rate, type) {
            if (type === 'income') {
                if (rate >= 1) return '达标 ✓';
                if (rate >= 0.8) return '预警 ⚠';
                return '未达标 ✗';
            } else {
                if (rate <= 1) return '达标 ✓';
                if (rate <= 1.2) return '预警 ⚠';
                return '超支 ✗';
            }
        }
        
        function showStatus(message, type) {
            const statusEl = document.getElementById('importStatus');
            const color = type === 'success' ? 'var(--success)' : (type === 'error' ? 'var(--danger)' : 'var(--warning)');
            statusEl.innerHTML = `<div style="padding: 12px; background: ${color}20; border-radius: 8px; color: ${color}; border: 1px solid ${color}40;">${message}</div>`;
            setTimeout(() => { statusEl.innerHTML = ''; }, 5000);
        }
    </script>
</body>
</html>
