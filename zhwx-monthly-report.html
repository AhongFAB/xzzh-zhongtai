<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中合五金月报生成器 V1.0</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #111827 100%);
            min-height: 100vh;
            color: #e2e8f0;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 32px;
            color: #38bdf8;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }
        .header p {
            color: #94a3b8;
            font-size: 14px;
        }
        .upload-zone {
            max-width: 800px;
            margin: 0 auto 40px;
            padding: 60px 40px;
            border: 2px dashed rgba(56, 189, 248, 0.4);
            border-radius: 20px;
            background: rgba(30, 58, 138, 0.1);
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
        }
        .upload-zone .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        .upload-zone h3 {
            color: #38bdf8;
            margin-bottom: 10px;
            font-size: 20px;
        }
        .upload-zone p {
            color: #94a3b8;
            font-size: 14px;
        }
        .file-list {
            margin-top: 20px;
            text-align: left;
        }
        .file-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.4);
            border-radius: 8px;
            margin: 5px;
            font-size: 13px;
            color: #10b981;
        }
        .file-item.error {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
            color: #ef4444;
        }
        .month-selector {
            max-width: 600px;
            margin: 0 auto 30px;
            display: none;
        }
        .reupload-bar {
            max-width: 700px;
            margin: 10px auto 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(14,165,233,0.08);
            border: 1px solid rgba(14,165,233,0.2);
            border-radius: 10px;
        }
        .reupload-info {
            color: #94a3b8;
            font-size: 13px;
        }
        .reupload-btn {
            background: rgba(14,165,233,0.15);
            color: #38bdf8;
            border: 1px solid rgba(14,165,233,0.3);
            padding: 6px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .reupload-btn:hover {
            background: rgba(14,165,233,0.25);
        }
        .month-selector h4 {
            color: #38bdf8;
            margin-bottom: 15px;
            text-align: center;
        }
        .month-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .month-btn {
            padding: 10px 20px;
            background: rgba(30, 58, 138, 0.3);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 8px;
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .month-btn:hover {
            background: rgba(56, 189, 248, 0.2);
            border-color: #38bdf8;
        }
        .month-btn.active {
            background: #0ea5e9;
            border-color: #0ea5e9;
            color: #fff;
        }
        .report-container {
            display: none;
            max-width: 1800px;
            margin: 0 auto;
        }
        .glass-card {
            background: rgba(30, 58, 138, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 18px;
            color: #38bdf8;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .stat-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .stat-card {
            background: rgba(30, 58, 138, 0.2);
            border: 1px solid rgba(56, 189, 248, 0.15);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-card .label {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
        }
        .stat-card .value.positive { color: #10b981; }
        .stat-card .value.negative { color: #ef4444; }
        .stat-card .sub {
            font-size: 12px;
            color: #64748b;
            margin-top: 5px;
        }
        .stat-card.highlight {
            border-color: rgba(14, 165, 233, 0.5);
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.1);
        }
        .row-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 24px;
        }
        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 15px;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 15px;
        }
        .data-table th, .data-table td {
            padding: 10px 12px;
            text-align: right;
            border-bottom: 1px solid rgba(56, 189, 248, 0.1);
        }
        .data-table th {
            color: #38bdf8;
            font-weight: 600;
            text-align: center;
        }
        .data-table td:first-child, .data-table th:first-child {
            text-align: left;
        }
        .data-table tr:hover {
            background: rgba(56, 189, 248, 0.05);
        }
        .warning-card {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .warning-card.warning-level {
            background: rgba(245, 158, 11, 0.15);
            border-color: rgba(245, 158, 11, 0.4);
        }
        .warning-card .icon {
            font-size: 24px;
        }
        .warning-card .text {
            color: #fecaca;
        }
        .warning-card.warning-level .text {
            color: #fde68a;
        }
        .cashflow-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .cashflow-card {
            background: rgba(30, 58, 138, 0.2);
            border: 1px solid rgba(56, 189, 248, 0.15);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
        }
        .cashflow-card .label {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 10px;
        }
        .cashflow-card .value {
            font-size: 24px;
            font-weight: 700;
        }
        .cashflow-card .value.positive { color: #10b981; }
        .cashflow-card .value.negative { color: #ef4444; }
        .drill-down {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            display: none;
        }
        .drill-down.active {
            display: block;
        }
        .drill-toggle {
            color: #38bdf8;
            cursor: pointer;
            font-size: 13px;
            margin-top: 8px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .drill-toggle:hover {
            color: #0ea5e9;
        }
        .sub-items {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 8px;
        }
        .sub-items div {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px dashed rgba(56, 189, 248, 0.1);
        }
        .no-data {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        .no-cashflow {
            text-align: center;
            padding: 30px;
            background: rgba(245, 158, 11, 0.1);
            border: 1px dashed rgba(245, 158, 11, 0.3);
            border-radius: 12px;
            color: #f59e0b;
        }
        .footer {
            text-align: center;
            padding: 30px 0;
            color: #64748b;
            font-size: 12px;
            border-top: 1px solid rgba(56, 189, 248, 0.1);
            margin-top: 40px;
        }
        .trend-indicator {
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
        }
        .trend-indicator.up { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .trend-indicator.down { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        @media (max-width: 768px) {
            .stat-cards { grid-template-columns: repeat(2, 1fr); }
            .cashflow-cards { grid-template-columns: 1fr; }
            .row-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="loadStatus" style="position:fixed;top:10px;right:10px;background:#0ea5e9;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;z-index:9999;">页面加载中...</div>
    <script>
    window.onerror = function(msg, url, line) {
        var el = document.getElementById('loadStatus');
        if(el) { el.style.background='#ef4444'; el.textContent = 'JS错误: ' + msg + ' (行' + line + ')'; }
    };
    window.onload = function() {
        var el = document.getElementById('loadStatus');
        if(el) { el.style.background='#10b981'; el.textContent = '✅ 页面加载完成'; setTimeout(function(){el.style.display='none';}, 3000); }
    };
    </script>

    <div class="header">
        <h1>🏪 中合五金月报生成器 V1.0</h1>
        <p>支持上传经营决算表和现金流量表，自动生成可视化月报</p>
    </div>

    <div class="upload-zone" id="uploadZone">
        <div class="icon">📁</div>
        <h3>拖拽Excel文件到此处</h3>
        <p>或点击选择文件 · 支持 .xls 和 .xlsx 格式</p>
        <p style="margin-top:10px;color:#38bdf8">请上传：经营决算表 + 现金流量表</p>
        <div class="file-list" id="fileList"></div>
        <input type="file" id="fileInput" multiple accept=".xls,.xlsx" style="display:none">
    </div>

    <div class="reupload-bar" id="reuploadBar" style="display:none">
        <span class="reupload-info">📎 已加载数据 · 切换月份查看不同月报</span>
        <button class="reupload-btn" onclick="resetUpload()">重新上传</button>
    </div>

    <div class="month-selector" id="monthSelector">
        <h4>📅 选择查看月份</h4>
        <div class="month-buttons" id="monthButtons"></div>
    </div>

    <div class="report-container" id="reportContainer">
        <!-- 区块1: 经营总览 -->
        <div class="glass-card">
            <div class="section-title">📊 经营总览</div>
            <div class="stat-cards" id="overviewStats"></div>
        </div>

        <!-- 区块2: 收入分析 -->
        <div class="glass-card">
            <div class="section-title">💰 收入分析</div>
            <div class="row-grid">
                <div>
                    <div class="stat-cards" id="revenueStats"></div>
                    <div class="chart-container"><canvas id="revenuePieChart"></canvas></div>
                </div>
                <div>
                    <div class="chart-container" style="height:350px"><canvas id="revenueTrendChart"></canvas></div>
                </div>
            </div>
        </div>

        <!-- 区块3: 成本分析 -->
        <div class="glass-card">
            <div class="section-title">📉 成本分析</div>
            <div class="row-grid">
                <div>
                    <div class="chart-container" style="height:280px"><canvas id="costPieChart"></canvas></div>
                </div>
                <div>
                    <div class="chart-container" style="height:280px"><canvas id="costTrendChart"></canvas></div>
                </div>
            </div>
            <div id="costDetail" style="margin-top:20px"></div>
        </div>

        <!-- 区块4: 费用分析 -->
        <div class="glass-card">
            <div class="section-title">📋 费用分析</div>
            <div class="row-grid">
                <div>
                    <div class="chart-container" style="height:300px"><canvas id="expenseTop10Chart"></canvas></div>
                </div>
                <div>
                    <div class="stat-cards" id="expenseStats"></div>
                    <div class="chart-container" style="height:200px"><canvas id="expenseTrendChart"></canvas></div>
                </div>
            </div>
            <div id="expenseTable"></div>
        </div>

        <!-- 区块5: 现金流概览 -->
        <div class="glass-card">
            <div class="section-title">💵 现金流概览</div>
            <div id="cashflowSection">
                <div class="cashflow-cards" id="cashflowCards"></div>
                <div class="row-grid">
                    <div>
                        <div class="chart-container" style="height:250px"><canvas id="cashflowBarChart"></canvas></div>
                    </div>
                    <div>
                        <div class="chart-container" style="height:250px"><canvas id="cashflowTrendChart"></canvas></div>
                    </div>
                </div>
            </div>
            <div class="no-cashflow" id="noCashflow" style="display:none">
                ⚠️ 尚未上传现金流量表，无法展示现金流数据
            </div>
        </div>

        <!-- 区块6: 效率指标 -->
        <div class="glass-card">
            <div class="section-title">⚡ 效率指标</div>
            <div class="stat-cards" id="efficiencyStats"></div>
            <div class="chart-container" style="height:250px;margin-top:20px"><canvas id="efficiencyTrendChart"></canvas></div>
        </div>

        <!-- 区块7: 月度趋势 -->
        <div class="glass-card">
            <div class="section-title">📈 月度趋势</div>
            <div class="chart-container" style="height:350px"><canvas id="monthlyTrendChart"></canvas></div>
            <div class="chart-container" style="height:300px;margin-top:20px"><canvas id="profitTrendChart"></canvas></div>
        </div>

        <!-- 区块8: 风险与关注 -->
        <div class="glass-card">
            <div class="section-title">🚨 风险与关注</div>
            <div id="riskCards"></div>
        </div>
    </div>

    <div class="footer">
        © 2026 中台-财务工具箱 · 开发者：张洪杰，侵权必究
    </div>

    <script>
        // 全局数据存储
        let decisionData = null;
        let cashflowData = null;
        let currentMonth = 1;
        let availableMonths = [];

        // Excel日期序列号转月份
        function excelDateToMonth(dateNum) {
            if (!dateNum || dateNum < 40000 || dateNum === 23) return null;
            const d = new Date(Math.round((dateNum - 25569) * 86400 * 1000));
            return d.getMonth() + 1;
        }

        // 格式化金额（万元）
        function formatMoney(val, showUnit = true) {
            if (val === null || val === undefined || isNaN(val)) return '-';
            const w = val / 10000;
            const abs = Math.abs(w);
            let str;
            if (abs >= 10000) {
                str = (w / 10000).toFixed(2) + '亿';
            } else if (abs >= 1) {
                str = w.toFixed(2);
            } else {
                str = w.toFixed(4);
            }
            return (w < 0 ? '-' : '') + str + (showUnit && abs >= 1 ? '万' : '');
        }

        // 获取某行某月的数据（经营决算表）
        function getDecisionValue(row, month) {
            if (!decisionData || !decisionData[row]) return 0;
            // 月份列: 1月=3,2月=5,... 每月间隔2列
            const colIndex = 3 + (month - 1) * 2;
            if (colIndex >= decisionData[row].length) return 0;
            let val = decisionData[row][colIndex];
            if (val === 23 || val === null || val === undefined) return 0;
            return val || 0;
        }

        // 获取全年累计（列B，即index 1）
        function getYearTotal(row) {
            if (!decisionData || !decisionData[row]) return 0;
            return decisionData[row][1] || 0;
        }

        // 解析经营决算表
        function parseDecisionTable(workbook) {
            // Try multiple sheet names for compatibility
            let ws = null;
            const possibleNames = ['数据表', 'Sheet1', 'Sheet0', workbook.SheetNames[0]];
            for (const name of possibleNames) {
                if (workbook.Sheets[name]) {
                    ws = workbook.Sheets[name];
                    break;
                }
            }
            if (!ws) {
                console.error('可用Sheet:', workbook.SheetNames);
                return null;
            }
            const data = XLSX.utils.sheet_to_json(ws, {header: 1, raw: true, defval: 0});
            return data;
        }

        // 解析现金流量表
        function parseCashflowTable(workbook) {
            // 返回 {sheet0: [...], sheet1: [...]}，两个Sheet都解析
            const result = {sheet0: null, sheet1: null};
            // Sheet0: 全年12月格式
            const name0 = workbook.SheetNames[0];
            if (workbook.Sheets[name0]) {
                result.sheet0 = XLSX.utils.sheet_to_json(workbook.Sheets[name0], {header: 1, raw: true, defval: 0});
            }
            // Sheet1: 小企业简表（本月金额+本年累计）
            if (workbook.SheetNames.length > 1) {
                const name1 = workbook.SheetNames[1];
                if (workbook.Sheets[name1]) {
                    result.sheet1 = XLSX.utils.sheet_to_json(workbook.Sheets[name1], {header: 1, raw: true, defval: 0});
                }
            }
            return result;
        }

        // 获取可用月份
        function detectAvailableMonths() {
            const months = [];
            for (let m = 1; m <= 12; m++) {
                const revenue = getDecisionValue(2, m);
                if (revenue > 0) {
                    months.push(m);
                }
            }
            return months.length ? months : [1];
        }

        // 渲染月份选择器
        function renderMonthSelector() {
            const container = document.getElementById('monthButtons');
            container.innerHTML = '';
            availableMonths.forEach(m => {
                const btn = document.createElement('button');
                btn.className = 'month-btn' + (m === currentMonth ? ' active' : '');
                btn.textContent = m + '月';
                btn.onclick = () => selectMonth(m);
                container.appendChild(btn);
            });
            document.getElementById('monthSelector').style.display = 'block';
        }

        // 选择月份
        function selectMonth(m) {
            currentMonth = m;
            document.querySelectorAll('.month-btn').forEach((btn, i) => {
                btn.classList.toggle('active', availableMonths[i] === m);
            });
            renderReport();
        }

        // 渲染经营总览
        function renderOverview() {
            const container = document.getElementById('overviewStats');
            const revenue = getDecisionValue(2, currentMonth);
            const mainCost = getDecisionValue(18, currentMonth);
            const otherCost = getDecisionValue(19, currentMonth);
            const profit = getDecisionValue(54, currentMonth);
            const staffCount = getDecisionValue(55, currentMonth);
            const perProfit = getDecisionValue(56, currentMonth);

            // 门店毛利率 = (收入-主营成本)/收入
            const mainGrossRate = revenue > 0 ? ((revenue - mainCost) / revenue * 100) : 0;
            const netRate = revenue > 0 ? (profit / revenue * 100) : 0;

            // 上月数据用于环比
            const prevRevenue = currentMonth > 1 ? getDecisionValue(2, currentMonth - 1) : 0;
            const prevProfit = currentMonth > 1 ? getDecisionValue(54, currentMonth - 1) : 0;
            const revenueChange = prevRevenue > 0 ? ((revenue - prevRevenue) / prevRevenue * 100) : 0;
            const profitChange = prevProfit > 0 ? ((profit - prevProfit) / prevProfit * 100) : 0;

            container.innerHTML = `
                <div class="stat-card highlight">
                    <div class="label">营业收入</div>
                    <div class="value">${formatMoney(revenue)}</div>
                    ${revenueChange !== 0 ? `<div class="sub">环比 ${revenueChange > 0 ? '↑' : '↓'}${Math.abs(revenueChange).toFixed(1)}%</div>` : ''}
                </div>
                <div class="stat-card">
                    <div class="label">营业成本</div>
                    <div class="value">${formatMoney(mainCost + otherCost)}</div>
                </div>
                <div class="stat-card">
                    <div class="label">毛利</div>
                    <div class="value ${revenue - mainCost < 0 ? 'negative' : 'positive'}">${formatMoney(revenue - mainCost)}</div>
                </div>
                <div class="stat-card">
                    <div class="label">毛利率</div>
                    <div class="value ${mainGrossRate < 5 ? 'negative' : ''}">${mainGrossRate.toFixed(2)}%</div>
                </div>
                <div class="stat-card">
                    <div class="label">净利润</div>
                    <div class="value ${profit < 0 ? 'negative' : 'positive'}">${formatMoney(profit)}</div>
                </div>
                <div class="stat-card">
                    <div class="label">净利率</div>
                    <div class="value ${netRate < 0 ? 'negative' : ''}">${netRate.toFixed(2)}%</div>
                </div>
                <div class="stat-card">
                    <div class="label">算薪人数</div>
                    <div class="value">${staffCount || '-'}</div>
                </div>
                <div class="stat-card">
                    <div class="label">人均利润</div>
                    <div class="value ${perProfit < 0 ? 'negative' : 'positive'}">${formatMoney(perProfit)}</div>
                </div>
            `;
        }

        // 渲染收入分析
        function renderRevenue() {
            const container = document.getElementById('revenueStats');
            const revenue = getDecisionValue(2, currentMonth);
            const mainRevenue = getDecisionValue(3, currentMonth);
            const otherRevenue = getDecisionValue(4, currentMonth);
            const yearTotal = getYearTotal(2);

            container.innerHTML = `
                <div class="stat-card">
                    <div class="label">当月收入</div>
                    <div class="value positive">${formatMoney(revenue)}</div>
                </div>
                <div class="stat-card">

        // 渲染现金流
        function renderCashflow() {
            const section = document.getElementById('cashflowSection');
            const noData = document.getElementById('noCashflow');

            if (!cashflowData) {
                section.style.display = 'none';
                noData.style.display = 'block';
                return;
            }
            section.style.display = 'block';
            noData.style.display = 'none';

            // 从现金流量表获取数据
            // cashflowData = {sheet0: 全年12月, sheet1: 小企业简表}
            // Sheet0: Col0=项目, Col1=行次, Col2=1月...Col13=12月
            // Sheet1: Col0=项目, Col1=行次, Col2=本月金额, Col3=本年累计
            // 关键行映射：Sheet0→Sheet1: 15→11(经营), 28→18(投资), 38→25(筹资), 42→28(期末)
            const sheet0 = cashflowData.sheet0;
            const sheet1 = cashflowData.sheet1;
            // Sheet1行号映射：按关键词动态查找
            const sheet1RowMap = {};
            if (sheet1) {
                for (let i = 0; i < sheet1.length; i++) {
                    const name = (sheet1[i][0] || '').toString().trim();
                    if (name.includes('经营活动') && name.includes('净额')) sheet1RowMap.operate = i;
                    if (name.includes('投资活动') && name.includes('净额')) sheet1RowMap.invest = i;
                    if (name.includes('筹资活动') && name.includes('净额')) sheet1RowMap.finance = i;
                    if (name.includes('期末') && name.includes('余额')) sheet1RowMap.endBalance = i;
                    if (name.includes('期初') && name.includes('余额')) sheet1RowMap.startBalance = i;
                }
            }

            const getCashflowValue = (s0Row, month, s1Key) => {
                // 优先从Sheet0取当月值
                if (sheet0 && sheet0[s0Row]) {
                    const col = month + 1;
                    const val = sheet0[s0Row][col];
                    if (val && val !== 0) return val;
                }
                // 回退Sheet1：取"本月金额"列(col2)
                if (sheet1 && s1Key && sheet1RowMap[s1Key] !== undefined) {
                    const s1Row = sheet1RowMap[s1Key];
                    const sheet1Val = sheet1[s1Row][2]; // 本月金额
                    if (sheet1Val && sheet1Val !== 0) return sheet1Val;
                }
                return 0;
            };

            const operate = getCashflowValue(15, currentMonth, 'operate');
            const invest = getCashflowValue(28, currentMonth, 'invest');
            const finance = getCashflowValue(38, currentMonth, 'finance');
            const endBalance = getCashflowValue(42, currentMonth, 'endBalance');

            document.getElementById('cashflowCards').innerHTML = `
                <div class="cashflow-card">
                    <div class="label">经营活动现金流净额</div>
                    <div class="value ${operate >= 0 ? 'positive' : 'negative'}">${formatMoney(operate)}</div>

                <div class="cashflow-card">

                <div class="cashflow-card">

                    <div class="value ${endBalance >= 0 ? 'positive' : 'negative'}">${formatMoney(endBalance)}</div>
                </div>
            `;

            // 三类对比柱状图
            if (window.cashflowBarChart && typeof window.cashflowBarChart.destroy === "function") window.cashflowBarChart.destroy();
            const bCtx = document.getElementById('cashflowBarChart').getContext('2d');
            window.cashflowBarChart = new Chart(bCtx, {
                type: 'bar',
                data: {
                    labels: ['经营活动', '投资活动', '筹资活动'],
                    datasets: [{
                        label: '净额(万)',
                        data: [operate / 10000, invest / 10000, finance / 10000],
                        backgroundColor: ['#0ea5e9', '#f59e0b', '#8b5cf6']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#94a3b8' } },
                        y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#94a3b8' } }
                    }
                }
            });

            // 月度趋势图
            if (window.cashflowTrendChart && typeof window.cashflowTrendChart.destroy === "function") window.cashflowTrendChart.destroy();
            const labels = availableMonths.map(m => m + '月');
            const opValues = availableMonths.map(m => getCashflowValue(15, m, 'operate') / 10000);
            const tCtx = document.getElementById('cashflowTrendChart').getContext('2d');
            window.cashflowTrendChart = new Chart(tCtx, {
                type: 'line',
                data: {

                    datasets: [{

                        borderColor: '#38bdf8',
                        backgroundColor: 'rgba(56, 189, 248, 0.1)',
                        fill: true,

        function renderRisk() {
            const revenue = getDecisionValue(2, currentMonth);
            const mainCost = getDecisionValue(18, currentMonth);
            const profit = getDecisionValue(54, currentMonth);
            const expense = getDecisionValue(26, currentMonth);
            const prevRevenue = currentMonth > 1 ? getDecisionValue(2, currentMonth - 1) : revenue;

            const mainGrossRate = revenue > 0 ? ((revenue - mainCost) / revenue * 100) : 0;
            const expenseRate = revenue > 0 ? (expense / revenue * 100) : 0;
            const revenueChange = prevRevenue > 0 ? ((revenue - prevRevenue) / prevRevenue * 100) : 0;

            // 现金流
            let cashflowNeg = false;
            if (cashflowData && cashflowData.sheet0 && cashflowData.sheet0[15]) {
                cashflowNeg = cashflowData.sheet0[15][currentMonth + 1] < 0;
            }

            const risks = [];

            if (mainGrossRate < 5) {
                risks.push({ level: 'critical', text: `毛利率 ${mainGrossRate.toFixed(2)}% 低于5%，盈利能力不足` });
            }
            if (profit < 0) {
                risks.push({ level: 'critical', text: `净利润为负 ${formatMoney(profit)}，经营亏损` });
            }
            if (cashflowNeg) {
                risks.push({ level: 'critical', text: `经营现金流为负，资金回流异常` });
            }
            if (expenseRate > 5) {
                risks.push({ level: 'warning', text: `费用率 ${expenseRate.toFixed(2)}% 超过5%，需关注费用控制` });
            }
            if (revenueChange < -20) {
                risks.push({ level: 'critical', text: `收入环比下降 ${Math.abs(revenueChange).toFixed(1)}%，降幅超20%` });
            }

            if (risks.length === 0) {
                risks.push({ level: 'success', text: '✅ 各项指标正常，未发现重大风险' });
            }

            document.getElementById('riskCards').innerHTML = risks.map(r => `
                <div class="warning-card ${r.level === 'warning' ? 'warning-level' : ''}">
                    <span class="icon">${r.level === 'critical' ? '🔴' : r.level === 'warning' ? '🟡' : '🟢'}</span>
                    <span class="text">${r.text}</span>
                </div>
            `).join('');
        }

        // 渲染完整报表
        function safeRender(name, fn) {
            try { fn(); } catch(e) { console.error('渲染' + name + '出错:', e); }
        }
        function renderReport() {
            safeRender('经营总览', renderOverview);
            safeRender('收入分析', renderRevenue);
            safeRender('成本分析', renderCost);
            safeRender('费用分析', renderExpense);
            safeRender('现金流', renderCashflow);
            safeRender('效率指标', renderEfficiency);
            safeRender('月度趋势', renderMonthlyTrend);
            safeRender('风险预警', renderRisk);
            document.getElementById('reportContainer').style.display = 'block';
            // 隐藏上传区，显示重新上传按钮
            document.getElementById('uploadZone').style.display = 'none';
            document.getElementById('reuploadBar').style.display = 'flex';
        }

        // 安全读取工作簿（多策略回退）
        function safeReadWorkbook(arrayBuffer) {
            // 策略1: Uint8Array + type:array
            try {
                const arr = new Uint8Array(arrayBuffer);
                return XLSX.read(arr, { type: 'array', cellDates: false });
            } catch(e) { console.warn('策略1(array)失败:', e.message); }

            // 策略2: binary string
            try {
                const bytes = new Uint8Array(arrayBuffer);
                let binary = '';
                for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
                return XLSX.read(binary, { type: 'binary', cellDates: false });
            } catch(e) { console.warn('策略2(binary)失败:', e.message); }

            // 策略3: base64
            try {
                const bytes = new Uint8Array(arrayBuffer);
                let binary = '';
                for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
                const b64 = btoa(binary);
                return XLSX.read(b64, { type: 'base64', cellDates: false });
            } catch(e) { console.warn('策略3(base64)失败:', e.message); }

            throw new Error('所有解析策略均失败');
        }

        // 处理文件上传
        function handleFiles(files) {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '';

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    let workbook = null;
                    // 阶段1: 文件解析（独立catch）
                    try {
                        workbook = safeReadWorkbook(e.target.result);
                    } catch (err) {
                        console.error('文件解析错误:', err);
                        const item = document.createElement('div');
                        item.className = 'file-item error';
                        item.textContent = '❌ ' + file.name + ' (文件解析失败: ' + err.message + ')';
                        fileList.appendChild(item);
                        return;
                    }

                    // 阶段2: 数据提取
                    const fileName = file.name.toLowerCase();
                    const item = document.createElement('div');
                    item.className = 'file-item';

                    if (fileName.includes('经营决算')) {
                        decisionData = parseDecisionTable(workbook);
                        if (decisionData) {
                            item.textContent = '✅ ' + file.name + ' (经营决算表)';
                            availableMonths = detectAvailableMonths();
                            currentMonth = availableMonths[availableMonths.length - 1];
                            renderMonthSelector();
                        } else {
                            item.className = 'file-item error';
                            item.textContent = '❌ ' + file.name + ' (解析失败-Sheet未找到)';
                        }
                    } else if (fileName.includes('现金流')) {
                        cashflowData = parseCashflowTable(workbook);
                        if (cashflowData) {
                            item.textContent = '✅ ' + file.name + ' (现金流量表)';
                        } else {
                            item.className = 'file-item error';
                            item.textContent = '❌ ' + file.name + ' (解析失败-Sheet未找到)';
                        }
                    } else {
                        item.className = 'file-item error';
                        item.textContent = '❓ ' + file.name + ' (无法识别类型)';
                    }
                    fileList.appendChild(item);

                    // 阶段3: 报告渲染（独立catch，不影响文件状态显示）
                    if (decisionData) {
                        try {
                            renderReport();
                        } catch (err) {
                            console.error('报告渲染错误:', err);
                            // 渲染失败不影响文件状态，显示错误区域
                            const errDiv = document.createElement('div');
                            errDiv.className = 'file-item error';
                            errDiv.textContent = '⚠️ 报告渲染出错: ' + err.message;
                            fileList.appendChild(errDiv);
                        }
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        }

        // 上传区域事件
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');

        uploadZone.addEventListener('click', () => fileInput.click());
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        // 重新上传
        function resetUpload() {
            decisionData = null;
            cashflowData = null;
            availableMonths = [];
            currentMonth = 1;
            document.getElementById('uploadZone').style.display = '';
            document.getElementById('reuploadBar').style.display = 'none';
            document.getElementById('monthSelector').style.display = 'none';
            document.getElementById('reportContainer').style.display = 'none';
            document.getElementById('fileList').innerHTML = '';
            document.getElementById('fileInput').value = '';
        }
    </script>
</body>
</html>
