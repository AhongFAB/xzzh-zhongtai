<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>采购成本计算器 V4 | 五主体年度规划</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--c1:#0ea5e9;--c2:#38bdf8;--bg:rgba(30,41,59,0.7);--bd:rgba(56,189,248,0.15);--t1:#e2e8f0;--t2:#94a3b8;--ok:#10b981;--ng:#ef4444;--wn:#f59e0b;--inf:#6366f1;--pu:#a78bfa}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);color:var(--t1);min-height:100vh;overflow-x:hidden}
.orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.12;pointer-events:none;z-index:0}
.o1{width:500px;height:500px;background:#0ea5e9;top:-100px;right:-100px;animation:a1 20s ease-in-out infinite}
.o2{width:400px;height:400px;background:#8b5cf6;bottom:-50px;left:-50px;animation:a2 25s ease-in-out infinite}
@keyframes a1{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,80px)}}
@keyframes a2{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,-60px)}}
.gl{background:var(--bg);backdrop-filter:blur(20px);border:1px solid var(--bd);border-radius:16px;padding:20px;margin-bottom:20px}
.gs{background:rgba(30,41,59,0.5);backdrop-filter:blur(12px);border:1px solid var(--bd);border-radius:10px;padding:14px}
input[type="number"],input[type="text"],select{background:rgba(15,23,42,.8);border:1px solid var(--bd);border-radius:8px;color:var(--t1);padding:8px 12px;font-size:14px;width:100%;outline:none;transition:all .2s}
input:focus,select:focus{border-color:var(--c1);box-shadow:0 0 0 3px rgba(14,165,233,.15)}
select option{background:#1e293b;color:var(--t1)}
.btn{padding:10px 24px;border-radius:10px;font-weight:600;cursor:pointer;transition:all .2s;border:none;font-size:14px}
.bp{background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff}
.bp:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(14,165,233,.4)}
label{font-size:12px;color:var(--t2);font-weight:500;display:block;margin-bottom:3px}
.ec{background:rgba(30,41,59,0.6);border:1px solid var(--bd);border-radius:12px;padding:14px;transition:all .2s}
.ec:hover{border-color:rgba(56,189,248,.3)}
.tb{width:100%;border-collapse:collapse;font-size:13px}
.tb th{background:rgba(14,165,233,.1);color:var(--c2);padding:10px 8px;text-align:center;font-weight:600;border-bottom:1px solid var(--bd);white-space:nowrap}
.tb td{padding:8px;text-align:right;border-bottom:1px solid rgba(56,189,248,.05);font-variant-numeric:tabular-nums}
.tb td:first-child{text-align:left;color:var(--t2);font-size:12px}
.tb tr.tt td{border-top:2px solid var(--bd);font-weight:700;color:var(--t1)}
.tb tr.tt td:first-child{color:var(--c2)}
.rc{background:rgba(30,41,59,.6);backdrop-filter:blur(12px);border-radius:12px;padding:16px;margin-bottom:12px}
.rc.dg{border:1px solid rgba(239,68,68,.4);background:rgba(239,68,68,.06)}
.rc.wn{border:1px solid rgba(245,158,11,.4);background:rgba(245,158,11,.06)}
.sb{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:16px;margin-top:16px}
.sb .tl{color:var(--ok);font-weight:700;font-size:15px;margin-bottom:10px}
.sb .it{margin-bottom:8px;padding-left:16px;position:relative;font-size:13px;line-height:1.7}
.sb .it::before{content:'\2192';position:absolute;left:0;color:var(--ok);font-weight:700}
.ib{background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.25);border-radius:10px;padding:14px 16px;margin:12px 0;font-size:13px;color:var(--t1);line-height:1.7}
.ib .tl{color:var(--inf);font-weight:600;margin-bottom:6px}
.sh{background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.3);border-radius:10px;padding:14px 16px;margin:12px 0;font-size:13px;line-height:1.7}
.sh .tl{color:var(--pu);font-weight:600;margin-bottom:6px}
.tab-b{padding:10px 24px;border:none;border-radius:10px 10px 0 0;cursor:pointer;font-weight:600;font-size:14px;transition:all .2s}
.tab-b.on{background:var(--bg);color:var(--c2);border:1px solid var(--bd);border-bottom:none}
.tab-b:not(.on){background:transparent;color:var(--t2)}
.tab-c{display:none}.tab-c.on{display:block}
.ft{text-align:center;padding:20px;color:var(--t2);font-size:12px}
.neg{color:var(--ng)}.pos{color:var(--ok)}
</style>
</head>
<body>
<div class="orb o1"></div><div class="orb o2"></div>
<div style="position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:20px;">
<div style="text-align:center;margin-bottom:20px;">
<h1 style="font-size:26px;font-weight:700;background:linear-gradient(135deg,#0ea5e9,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">采购成本计算器 V4</h1>
<p style="color:var(--t2);font-size:13px;margin-top:4px;">五主体年度规划 · 核定征收无票避风港 · 增值税+所得税+期间费用+动态风险</p>
</div>
<div style="display:flex;gap:0;margin-bottom:0;">
<button class="tab-b on" onclick="stab('plan',this)">🏢 五主体年度规划</button>
<button class="tab-b" onclick="stab('product',this)">📦 单品方案对比</button>
</div>

<div id="tab-plan" class="tab-c on gl" style="border-radius:0 16px 16px 16px;">
<h2 style="font-size:16px;font-weight:600;color:var(--c2);margin-bottom:14px;">📊 五家主体配置</h2>
<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px;" id="eCards"></div>
<div class="gs" style="border-color:rgba(245,158,11,.2);margin-bottom:16px;">
<div style="font-size:13px;color:var(--wn);font-weight:600;margin-bottom:10px;">🎯 年度经营参数</div>
<div style="display:grid;grid-template-columns:repeat(3,1fr) 1.5fr;gap:12px;">
<div><label>年度销售目标(万元)</label><input type="number" id="tSales" value="7000" step="100"></div>
<div><label>成本率(%) <span style="font-size:10px;color:var(--t2)">成本/含税收入</span></label><input type="number" id="cRate" value="80" step="1"></div>
<div><label>无票采购占比(%) <span style="font-size:10px;color:var(--ng)">仅影响公司类</span></label><input type="number" id="niR" value="50" step="5"></div>
<div><label>企业所得税类型(公司类)</label><select id="citT"><option value="5">小微企业 5%</option><option value="9">西藏鼓励类 9%</option><option value="15">西部鼓励类 15%</option><option value="25">一般企业 25%</option></select></div>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px;">
<div><label>期间费用率(%) <span style="font-size:10px;color:var(--t2)">管理+销售+财务</span></label><input type="number" id="eRate" value="15" step="1"></div>
<div><label>个体户核定应税所得率(%) <span style="font-size:10px;color:var(--t2)">核定征收用</span></label><input type="number" id="dRate" value="10" step="1"></div>
</div>
<div style="font-size:11px;color:var(--t2);margin-top:8px;line-height:1.6;">
💡 个体户核定征收：<strong style="color:var(--pu)">不需要成本票</strong>，税=收入×应税所得率×累进税率，无票采购完全不是问题<br>
💡 无票占比仅影响一般纳税人和小规模：无票成本不能税前扣除→纳税调增→推高应纳税所得额
</div>
</div>
<div style="text-align:center;margin-bottom:20px;">
<button class="btn bp" onclick="calcPlan()" style="font-size:16px;padding:12px 48px;">🧮 开始规划</button>
</div>
<div id="pRes" style="display:none;">
<div id="sAlloc"></div><div id="sPnL"></div><div id="sHarbor"></div><div id="sImpact"></div><div id="sRisk"></div><div id="sStrat"></div>
</div>
</div>

<div id="tab-product" class="tab-c gl" style="border-radius:0 16px 16px 16px;">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
<h2 style="font-size:16px;font-weight:600;color:var(--c2);">📦 单品方案对比</h2>
<button class="btn bp" onclick="addP()" style="font-size:13px;padding:6px 16px;">+ 添加品种</button>
</div>
<div class="gs" style="padding:14px;margin-bottom:16px;">
<div style="font-size:13px;color:var(--c2);font-weight:600;margin-bottom:10px;">税率参数</div>
<div style="display:grid;grid-template-columns:repeat(4,1fr) 1.5fr;gap:12px;">
<div><label>专票加价(%)</label><input type="number" id="vm" value="12" step="1"></div>
<div><label>普票加价(%)</label><input type="number" id="nm" value="3" step="1"></div>
<div><label>一般纳税人增值税率(%)</label><input type="number" id="vrg" value="13" step="1"></div>
<div><label>小规模征收率(%)</label><input type="number" id="vrs" value="1" step="0.5"></div>
<div><label>企业所得税类型</label><select id="cit2"><option value="5">小微企业(5%)</option><option value="9">西藏(9%)</option><option value="15">西部(15%)</option><option value="25">一般(25%)</option></select></div>
</div>
</div>
<div style="font-size:13px;color:var(--ok);font-weight:600;margin-bottom:8px;">📦 品种价格（填这里 ↓）</div>
<div id="pList"><div style="display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 1fr 40px;gap:10px;padding:0 4px 8px;font-size:12px;color:var(--t2);font-weight:600;"><span>品种名称</span><span>不含税单价<br><span style="font-size:10px">(有票基价)</span></span><span>无票采购价<br><span style="font-size:10px">(实际进货价)</span></span><span>含税售价</span><span>数量</span><span></span></div></div>
<div style="text-align:center;margin:20px 0;"><button class="btn bp" onclick="calcProd()" style="font-size:16px;padding:12px 48px;">计 算</button></div>
<div id="pRes2" style="display:none;"></div>
</div>
</div>
<div class="ft">开发者：张洪杰 | 西藏中合五金供应链科技有限公司 财务部</div>

<script>
const EN=[
{n:'中合五金',t:'general',lb:'一般纳税人',vr:.13,sl:0,ml:0},
{n:'小规模公司',t:'small',lb:'小规模纳税人',vr:.01,sl:500,ml:0},
{n:'个体户1',t:'individual',lb:'个体户(核定)',vr:0,sl:90,ml:7.5},
{n:'个体户2',t:'individual',lb:'个体户(核定)',vr:0,sl:72,ml:6},
{n:'个体户3',t:'individual',lb:'个体户(核定)',vr:0,sl:72,ml:6}
];
const PIT=[{l:3e4,r:.05,d:0},{l:9e4,r:.1,d:1500},{l:3e5,r:.2,d:10500},{l:5e5,r:.3,d:40500},{l:Infinity,r:.35,d:65500}];
function pitP(y){for(let t of PIT)if(y<=t.l)return Math.max(0,y*t.r-t.d);return 0}
function gCR(c,w){if(c==='5')return w<=300?.05:.25;if(c==='9')return.09;if(c==='15')return.15;return.25}
function gCL(c,w){if(c==='5')return w<=300?'5%':'25%悬崖!';if(c==='9')return '9%';if(c==='15')return '15%';return '25%'}
function fW(n){return n==null||isNaN(n)?'-':n.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fP(n){return(n*100).toFixed(2)+'%'}

function stab(id,b){document.querySelectorAll('.tab-c').forEach(c=>c.classList.remove('on'));document.querySelectorAll('.tab-b').forEach(x=>x.classList.remove('on'));document.getElementById('tab-'+id).classList.add('on');b.classList.add('on')}

function rCards(){
const tc={general:'background:rgba(14,165,233,.15);color:#38bdf8',small:'background:rgba(16,185,129,.15);color:#34d399',individual:'background:rgba(139,92,246,.15);color:#a78bfa'};
document.getElementById('eCards').innerHTML=EN.map(e=>{
const lim=e.sl>0?e.sl+'万/年':'无上限';const ml=e.ml>0?`(${e.ml}万/月)`:'';
const vt=e.t==='general'?'增值税13%':e.t==='small'?'征收率1%':'月≤10万免征';
const tx=e.t==='individual'?'个税(核定征收)':'企业所得税';
const sp=e.t==='individual'?'✅ 不需要成本票':'⚠️ 无票不能扣除';
const sc=e.t==='individual'?'var(--pu)':'var(--wn)';
const up=e.t==='small'?'<div style="color:var(--ng)">⚠️ 超500万强制升级</div>':'';
return`<div class="ec"><div style="${tc[e.t]};display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-bottom:6px">${e.lb}</div><div style="font-weight:600;font-size:14px;margin-bottom:6px">${e.n}</div><div style="font-size:11px;color:var(--t2);line-height:1.7"><div>📊 ${vt}</div><div>📈 ${lim}${ml}</div><div>💰 ${tx}</div><div style="color:${sc}">${sp}</div>${up}</div></div>`
}).join('')}

function gP(){return{ts:parseFloat(document.getElementById('tSales').value)||0,cr:(parseFloat(document.getElementById('cRate').value)||0)/100,nr:(parseFloat(document.getElementById('niR').value)||0)/100,er:(parseFloat(document.getElementById('eRate').value)||0)/100,dr:(parseFloat(document.getElementById('dRate').value)||10)/100,ct:document.getElementById('citT').value}}

function alloc(p){const a=[0,0,0,0,0];let r=p.ts;for(let i=4;i>=2;i--){if(r<=0)break;a[i]=Math.min(EN[i].sl,r);r-=a[i]}if(r>0){a[1]=Math.min(EN[1].sl,r);r-=a[1]}if(r>0)a[0]=r;return a}

function cE(idx,sw,p){
const e=EN[idx],cr=p.cr,nr=p.nr,er=p.er;
const R={sw,type:e.t,name:e.n,wl:true};
if(e.t==='general'){
const ri=sw,re=sw/1.13,ov=re*.13,tc=sw*cr,ic=tc*(1-nr),ni=tc*nr,ice=ic/1.13,iv=ice*.13,vd=ov-iv;
const cogs=ice+ni,gp=re-cogs,opex=sw*er,opl=gp-opex,ta=ni,ti=opl+ta,crate=gCR(p.ct,ti),cit=Math.max(0,ti*crate),np=opl-cit;
Object.assign(R,{ri,re,ov,tc,ic,ice,ni,iv,vd,cogs,gp,gm:re?gp/re:0,opex,opl,ta,ti,crate,cit,np,nm:re?np/re:0,tl:'企业所得税'});
}else if(e.t==='small'){
const ri=sw,re=sw/1.01,vat=re*.01,tc=sw*cr,ic=tc*(1-nr),ni=tc*nr,cogs=tc,gp=re-cogs,opex=sw*er,opl=gp-opex;
const ta=ni,ti=opl+ta,crate=gCR(p.ct,ti),cit=Math.max(0,ti*crate),np=opl-cit;
R.wl=sw<=e.sl;
Object.assign(R,{ri,re,vat,tc,ic,ni,cogs,gp,gm:re?gp/re:0,opex,opl,ta,ti,crate,cit,np,nm:re?np/re:0,tl:'企业所得税',ur:sw>0&&sw>=e.sl*.8});
}else{
const ri=sw,ms=sw/12,ve=ms<=10,vat=ve?0:(sw/1.01*.01),re=ve?sw:(sw/1.01);
const tc=sw*cr,opex=sw*er,ap=re-tc-opex;
R.wl=sw<=e.sl;
let ti,pit;
if(R.wl){ti=ri*p.dr;pit=pitP(ti*1e4)/1e4;if(ti<=200)pit*=.5}
else{ti=Math.max(0,ap);pit=pitP(ti*1e4)/1e4;if(ti<=200)pit*=.5}
const np=ap-pit;
Object.assign(R,{ri,re,vat,ve,tc,opex,ap,ti,pit,np,nm:re?np/re:0,tl:'个人所得税(核定)',dc:R.wl,niI:'无需票',ni:0,ta:0});
}
return R;
}

function cons(pnls){const c={ri:0,vat:0,cogs:0,gp:0,opex:0,opl:0,ta:0,ti:0,tax:0,np:0};pnls.forEach(p=>{c.ri+=p.ri||0;c.vat+=p.vd||p.vat||0;c.cogs+=p.cogs||p.tc||0;c.gp+=p.gp||0;c.opex+=p.opex||0;c.opl+=p.opl||p.ap||0;c.ta+=p.ta||0;c.ti+=p.ti||0;c.tax+=p.cit||p.pit||0;c.np+=p.np||0});c.gmm=c.ri?c.gp/(c.ri/1.13):0;c.nmm=c.ri?c.np/(c.ri/1.13):0;return c}

function calcPlan(){
const p=gP(),a=alloc(p),pnls=a.map((s,i)=>cE(i,s,p)),c=cons(pnls);
document.getElementById('pRes').style.display='block';
rAlloc(a,p,pnls,c);rPnL(pnls,c,p);rHarbor(pnls,p);rImpact(p);rRisk(pnls,a,p);rStrat(pnls,c,p);
document.getElementById('pRes').scrollIntoView({behavior:'smooth'});
}

function rAlloc(a,p,pnls,c){
const sc={general:'#38bdf8',small:'#34d399',individual:'#a78bfa'};
const sl=(s,i)=>{const e=EN[i];if(!s)return'<span style="color:var(--t2)">未分配</span>';if(e.t==='individual')return s<=e.sl?'<span style="color:var(--pu)">✅ 核定(无需票)</span>':'<span style="color:var(--ng)">⚠️ 超限→查账</span>';if(e.t==='small')return s>=e.sl?'<span style="color:var(--ng)">⚠️ 触发升级</span>':s>=e.sl*.8?'<span style="color:var(--wn)">⚡ 接近升级线</span>':'<span style="color:var(--ok)">✅ 安全</span>';return'<span style="color:var(--c2)">📌 承担剩余</span>'};
let h=`<h3 style="font-size:15px;font-weight:600;color:var(--c2);margin-bottom:12px">📋 智能分配方案（个体户优先→小规模→一般纳税人）</h3>`;
h+=`<div style="overflow-x:auto"><table class="tb" style="min-width:750px"><thead><tr><th style="text-align:left;width:120px">主体</th><th>类型</th><th>分配(万)</th><th>占比</th><th>限额(万/年)</th><th>无票影响</th><th>状态</th></tr></thead><tbody>`;
a.forEach((s,i)=>{const e=EN[i];const pct=p.ts>0?(s/p.ts*100).toFixed(1)+'%':'-';const lim=e.sl>0?e.sl:'无上限';
const ni=e.t==='individual'?'<span style="color:var(--pu);font-weight:600">无需票</span>':'<span style="color:var(--ng)">有影响</span>';
h+=`<tr><td style="text-align:left;font-weight:600;color:${sc[e.t]}">${e.n}</td><td>${e.lb}</td><td style="font-weight:600">${fW(s)}</td><td>${pct}</td><td>${lim}</td><td>${ni}</td><td>${sl(s,i)}</td></tr>`});
h+=`<tr class="tt"><td style="text-align:left">合计</td><td></td><td>${fW(p.ts)}</td><td>100%</td><td></td><td></td><td></td></tr></tbody></table></div>`;
h+=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px">
<div style="text-align:center;padding:14px;background:rgba(14,165,233,.08);border:1px solid rgba(14,165,233,.2);border-radius:10px"><div style="font-size:11px;color:var(--t2)">总销售收入</div><div style="font-size:22px;font-weight:700;color:var(--c2)">${fW(c.ri)}万</div></div>
<div style="text-align:center;padding:14px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px"><div style="font-size:11px;color:var(--t2)">总税负</div><div style="font-size:22px;font-weight:700;color:var(--ng)">${fW(c.vat+c.tax)}万</div></div>
<div style="text-align:center;padding:14px;background:${c.np>=0?'rgba(16,185,129,.08)':'rgba(239,68,68,.08)'};border:1px solid ${c.np>=0?'rgba(16,185,129,.2)':'rgba(239,68,68,.2)'};border-radius:10px"><div style="font-size:11px;color:var(--t2)">总净利润</div><div style="font-size:22px;font-weight:700;color:${c.np>=0?'var(--ok)':'var(--ng)'}">${fW(c.np)}万</div></div>
<div style="text-align:center;padding:14px;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:10px"><div style="font-size:11px;color:var(--t2)">综合净利率</div><div style="font-size:22px;font-weight:700;color:var(--inf)">${fP(c.nmm)}</div></div></div>`;
document.getElementById('sAlloc').innerHTML=h;
}

function rPnL(pnls,c,p){
const types=EN.map(e=>e.t);
const tbg={general:'rgba(14,165,233,.08)',small:'rgba(16,185,129,.08)',individual:'rgba(139,92,246,.08)'};
const rows=[
