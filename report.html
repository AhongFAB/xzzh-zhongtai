<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>汇报工具箱</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'PingFang SC','Microsoft YaHei',-apple-system,BlinkMacSystemFont,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;overflow-x:hidden}

        .bg-particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
        .bg-particles span{position:absolute;border-radius:50%;background:rgba(249,115,22,.12);animation:float linear infinite}
        @keyframes float{0%{transform:translateY(100vh) scale(0);opacity:0}50%{opacity:1}100%{transform:translateY(-10vh) scale(1);opacity:0}}

        .header{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;max-width:1000px;margin:0 auto;padding:24px 20px 0}
.hero{position:relative;z-index:1;text-align:center;padding:40px 20px 30px}
        .hero-icon{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,#f97316,#ef4444);font-size:32px;margin-bottom:20px;box-shadow:0 8px 32px rgba(249,115,22,.3)}
        .hero h1{font-size:32px;font-weight:800;color:#fb923c;letter-spacing:2px;margin-bottom:8px}
        .hero .subtitle{font-size:15px;color:#94a3b8;letter-spacing:3px}

        .main{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:30px 20px 60px}
        .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:28px}
        @media(max-width:900px){.cards{grid-template-columns:1fr;gap:20px}.hero h1{font-size:24px}}

        .card{background:linear-gradient(145deg,rgba(30,41,59,.8),rgba(15,23,42,.9));border:1px solid rgba(148,163,184,.1);border-radius:20px;padding:36px 28px;cursor:pointer;transition:all .4s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;backdrop-filter:blur(10px);text-decoration:none;display:block}
        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:20px 20px 0 0;background:linear-gradient(90deg,#f97316,#ef4444);opacity:0;transition:opacity .4s}
        .card:hover{transform:translateY(-6px);border-color:rgba(249,115,22,.25);box-shadow:0 16px 48px rgba(0,0,0,.3)}
        .card:hover::before{opacity:1}
        .card:active{transform:translateY(-2px)}

        .card .glow{position:absolute;top:-50%;left:-50%;width:200%;height:200%;border-radius:50%;background:radial-gradient(circle,rgba(249,115,22,.05),transparent 60%);opacity:0;transition:opacity .4s;pointer-events:none}
        .card:hover .glow{opacity:1}

        .card-icon{font-size:48px;margin-bottom:20px;display:block}
        .card-title{font-size:20px;font-weight:700;color:#f1f5f9;margin-bottom:8px;letter-spacing:1px}
        .card-desc{font-size:13px;color:#94a3b8;line-height:1.7;margin-bottom:20px}
        .card-link{display:inline-flex;align-items:center;gap:6px;font-weight:600;font-size:14px;color:#fb923c;transition:all .3s}
        .card-link .arrow{display:inline-block;transition:transform .3s}.card:hover .card-link .arrow{transform:translateX(5px)}

        .card.dev{cursor:default;opacity:.55;pointer-events:none}
        .dev-badge{display:inline-block;background:rgba(148,163,184,.15);color:#94a3b8;font-size:12px;font-weight:600;padding:6px 16px;border-radius:20px;letter-spacing:1px;border:1px solid rgba(148,163,184,.2)}

        footer{position:relative;z-index:1;text-align:center;padding:40px 20px 24px;color:#475569;font-size:12px;letter-spacing:1px;line-height:1.8}
        footer .copyright-line1{color:#64748b}
        footer .copyright-line2{margin-top:4px;font-size:11px;opacity:.7}
/* 统一返回按钮样式 - 深色液态玻璃 */
.back-btn {
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 9999;
  padding: 8px 20px;
  border-radius: 20px;
  border: 1px solid rgba(56, 189, 248, 0.3);
  background: rgba(15, 23, 42, 0.8);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: #38bdf8;
  font-size: 14px;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
}
.back-btn:hover {
  background: rgba(56, 189, 248, 0.15);
  border-color: rgba(56, 189, 248, 0.6);
  box-shadow: 0 4px 20px rgba(56, 189, 248, 0.2);
}
    </style>
</head>
<body>

<div class="bg-particles" id="particles"></div>

<div class="header">
    <a class="back-btn" onclick="if(window.history.length>1){history.back()}else{location.href='index.html'}" href="javascript:void(0)">← 返回主页</a>
</div>

<div class="hero">
    <div class="hero-icon">📈</div>
    <h1>汇报工具箱</h1>
    <p class="subtitle">日报 · 周报 · 月报</p>
</div>

<div class="main">
    <div class="cards">
        <a class="card" href="https://ahongfab.github.io/xzzh-xiaoshou/" target="_blank">
            <div class="glow"></div>
            <span class="card-icon">📊</span>
            <div class="card-title">日报生成器</div>
            <div class="card-desc">每日销售数据自动汇总，核心指标卡片与可视化图表，一键生成日报看板。</div>
            <span class="card-link">进入工具 <span class="arrow">→</span></span>
        </a>
        <div class="card dev">
            <div class="glow"></div>
            <span class="card-icon">📑</span>
            <div class="card-title">周报生成器</div>
            <div class="card-desc">每周经营数据汇总分析，预算对比与趋势追踪。</div>
            <span class="dev-badge">开发中</span>
        </div>
        <div class="card dev">
            <div class="glow"></div>
            <span class="card-icon">📑</span>
            <div class="card-title">月报生成器</div>
            <div class="card-desc">月度经营分析报表，预算执行与现金流全景。</div>
            <span class="dev-badge">开发中</span>
        </div>
    </div>
</div>

<footer>
    <div class="copyright-line1">© 2026 财务工具箱 · 开发者：张洪杰</div>
    <div class="copyright-line2">版权所有 · 未经授权禁止复制、传播或商业使用 · 侵权必究</div>
</footer>

<script>
const pc=document.getElementById('particles');
for(let i=0;i<15;i++){
    const s=document.createElement('span');
    const size=Math.random()*4+2;
    s.style.cssText=`left:${Math.random()*100}%;width:${size}px;height:${size}px;animation-duration:${Math.random()*15+10}s;animation-delay:${Math.random()*10}s`;
    pc.appendChild(s);
}
</script>
</body>
</html>
