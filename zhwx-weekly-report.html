<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中合五金经营周报生成器</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,"Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#0a0e1a 0%,#111827 100%);min-height:100vh;color:#e2e8f0;line-height:1.6}
.container{max-width:1440px;margin:0 auto;padding:20px}
.upload-section{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;padding:40px}
.upload-box{border:2px dashed rgba(14,165,233,0.5);border-radius:20px;padding:60px 80px;text-align:center;cursor:pointer;transition:all 0.3s;background:rgba(30,58,138,0.1)}
.upload-box:hover{border-color:#0ea5e9;background:rgba(30,58,138,0.2);transform:translateY(-2px)}
.upload-icon{font-size:64px;margin-bottom:20px;pointer-events:none}
.upload-title{font-size:24px;font-weight:600;color:#38bdf8;margin-bottom:12px;pointer-events:none}
.upload-hint{font-size:14px;color:#94a3b8;pointer-events:none}
.report-section{display:none}
.report-section.active{display:block}
.report-header{background:rgba(30,58,138,0.3);backdrop-filter:blur(20px);border:1px solid rgba(56,189,248,0.2);border-radius:16px;padding:20px 28px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.report-title{font-size:24px;font-weight:700;color:#38bdf8}
.report-info{display:flex;gap:20px;font-size:14px;color:#94a3b8}
.tab-nav{display:flex;gap:3px;margin-bottom:20px;background:rgba(30,58,138,0.2);border-radius:12px;padding:4px;flex-wrap:wrap}
.tab-btn{flex:1;min-width:100px;padding:10px 12px;border:none;background:transparent;color:#94a3b8;font-size:14px;font-weight:500;cursor:pointer;border-radius:10px;transition:all 0.3s;white-space:nowrap}
.tab-btn:hover{color:#e2e8f0;background:rgba(56,189,248,0.1)}
.tab-btn.active{background:rgba(14,165,233,0.25);color:#38bdf8;font-weight:600}
.tab-content{display:none}.tab-content.active{display:block}
.card{background:rgba(30,58,138,0.15);backdrop-filter:blur(20px);border:1px solid rgba(56,189,248,0.2);border-radius:16px;padding:24px;margin-bottom:20px}
.card-title{font-size:17px;font-weight:600;color:#38bdf8;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid rgba(56,189,248,0.2)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.kpi-card{background:rgba(30,58,138,0.25);border:1px solid rgba(56,189,248,0.15);border-radius:12px;padding:16px;text-align:center}
.kpi-label{font-size:12px;color:#94a3b8;margin-bottom:6px}
.kpi-value{font-size:24px;font-weight:700;margin-bottom:6px}
.kpi-value.blue{color:#38bdf8}.kpi-value.green{color:#4ade80}.kpi-value.red{color:#f87171}.kpi-value.yellow{color:#fbbf24}
.kpi-sub{font-size:11px;color:#64748b}
.kpi-extra{font-size:11px;color:#94a3b8;margin-top:4px;padding-top:4px;border-top:1px solid rgba(148,163,184,0.1)}
.progress-bar{height:5px;background:rgba(148,163,184,0.2);border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:3px;transition:width 0.5s}
.progress-fill.high{background:linear-gradient(90deg,#4ade80,#22c55e)}
.progress-fill.mid{background:linear-gradient(90deg,#fbbf24,#f59e0b)}
.progress-fill.low{background:linear-gradient(90deg,#f87171,#ef4444)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:rgba(14,165,233,0.15);color:#94a3b8;font-weight:500;padding:8px 10px;text-align:left;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid rgba(148,163,184,0.1)}
tr:hover{background:rgba(14,165,233,0.05)}
.text-right{text-align:right}
.text-center{text-align:center}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600}
.badge-green{background:rgba(74,222,128,0.15);color:#4ade80}
.badge-yellow{background:rgba(251,191,36,0.15);color:#fbbf24}
.badge-red{background:rgba(248,113,113,0.15);color:#f87171}
.badge-blue{background:rgba(56,189,248,0.15);color:#38bdf8}
.chart-container{position:relative;height:280px;margin:10px 0}
.chart-container.small{height:200px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
.summary-item{background:rgba(30,58,138,0.25);border:1px solid rgba(56,189,248,0.1);border-radius:10px;padding:12px;text-align:center}
.summary-item .label{font-size:11px;color:#94a3b8;margin-bottom:4px}
.summary-item .value{font-size:16px;font-weight:700;color:#38bdf8}
.list-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(148,163,184,0.08)}
.list-dot{width:8px;height:8px;border-radius:50%;margin-top:7px;flex-shrink:0}
.dot-green{background:#4ade80}.dot-blue{background:#38bdf8}
.customer-card{background:rgba(30,58,138,0.2);padding:12px 14px;border-radius:8px;margin-bottom:8px;border-left:3px solid}
.customer-card.normal{border-left-color:#4ade80}.customer-card.urgent{border-left-color:#fbbf24}.customer-card.critical{border-left-color:#f87171}
.risk-card{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:10px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.risk-card.warn{background:rgba(251,191,36,0.1);border-color:rgba(251,191,36,0.3)}
.risk-icon{font-size:24px}
.risk-title{font-weight:600;color:#f87171;margin-bottom:2px}
.risk-card.warn .risk-title{color:#fbbf24}
.risk-desc{font-size:13px;color:#94a3b8}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:700}
.rank-1{background:rgba(250,204,21,0.3);color:#facc15}.rank-2{background:rgba(148,163,184,0.3);color:#cbd5e1}.rank-3{background:rgba(194,120,59,0.3);color:#d97706}.rank-default{background:rgba(56,189,248,0.1);color:#64748b}
.footer{text-align:center;padding:20px;color:#475569;font-size:12px;border-top:1px solid rgba(56,189,248,0.1);margin-top:20px}
.budget-gap{color:#f87171;font-weight:600}
.budget-ok{color:#4ade80;font-weight:600}
.sub-title{font-size:14px;color:#94a3b8;margin:16px 0 8px;font-weight:600}
.scroll-table{overflow-x:auto}
</style>
</head>
<body>
<div class="container">
<div id="uploadSection" class="upload-section">
<input type="file" id="fileInput" accept=".xlsx,.xls" style="position:fixed;top:-9999px;left:-9999px;opacity:0">
<div class="upload-box" id="uploadBox">
<div class="upload-icon">&#128202;</div>
<div class="upload-title">中合五金经营周报生成器</div>
<div class="upload-hint">拖拽或点击上传标准模板Excel文件 · 支持 .xlsx</div>
<div style="margin-top:24px;pointer-events:none">
<button id="selectFileBtn" style="background:linear-gradient(135deg,#0ea5e9,#2563eb);color:#fff;border:none;padding:12px 36px;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;pointer-events:auto">选择文件</button>
</div>
</div>
<div id="uploadStatus" style="margin-top:16px;color:#94a3b8;font-size:14px;display:none"></div>
</div>
<div id="reportSection" class="report-section">
<div class="report-header">
<div style="display:flex;align-items:center;gap:12px"><a href="report.html" style="color:#38bdf8;text-decoration:none;font-size:14px">&#8592; 返回</a><div class="report-title" id="reportTitle">中合五金 经营周报</div></div>
<div class="report-info" id="reportInfo"></div>
</div>
<div class="tab-nav">
<button class="tab-btn active" onclick="switchTab('overview')">&#128200; 经营总览</button>
<button class="tab-btn" onclick="switchTab('sales')">&#128176; 销售与回款</button>
<button class="tab-btn" onclick="switchTab('cost')">&#127981; 成本分析</button>
<button class="tab-btn" onclick="switchTab('expense')">&#128184; 费用分析</button>
<button class="tab-btn" onclick="switchTab('ar')">&#128179; 应收账款</button>
<button class="tab-btn" onclick="switchTab('approval')">&#128203; 审批分析</button>
<button class="tab-btn" onclick="switchTab('report')">&#128197; 周报事项</button>
</div>
<div id="tab-overview" class="tab-content active"></div>
<div id="tab-sales" class="tab-content"></div>
<div id="tab-cost" class="tab-content"></div>
<div id="tab-expense" class="tab-content"></div>
<div id="tab-ar" class="tab-content"></div>
<div id="tab-approval" class="tab-content"></div>
<div id="tab-report" class="tab-content"></div>
<div class="footer">&copy; 2026 中台-财务工具箱 · 开发者：张洪杰，侵权必究</div>
</div>
</div>
<script>
// ===== 工具函数 =====
const chartInstances = {};
function createChart(id, canvas, config) {
    if(chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
    chartInstances[id] = new Chart(canvas, config);
}
function v(s,r,c) { const cell = s[XLSX.utils.encode_cell({r:r-1,c:c-1})]; return cell ? (cell.w !== undefined ? cell.w : cell.v) : ''; }
function n(s,r,c) { const cell = s[XLSX.utils.encode_cell({r:r-1,c:c-1})]; return cell ? (Number(cell.v)||0) : 0; }
function fmt(v) { if(v===null||v===undefined||v===0) return '0.00'; return Number(v).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function pct(v) { return (v*100).toFixed(1)+'%'; }
function fmtRatio(v) { if(typeof v==='string') { if(v.includes('%')) return v; v=parseFloat(v); } if(isNaN(v)) return '-'; return (v*100).toFixed(1)+'%'; }
function progressClass(rate) { return rate>=0.8?'high':rate>=0.5?'mid':'low'; }
function rollingBudget(monthBudget, achieved, totalDays, elapsedDays) {
    const dailyBudget = monthBudget / totalDays;
    const shouldAchieve = dailyBudget * elapsedDays;
    const remaining = monthBudget - achieved;
    const remainDays = Math.max(totalDays - elapsedDays, 1);
    const dailyNeed = remaining > 0 ? remaining / remainDays : 0;
    const progressRate = monthBudget > 0 ? achieved / monthBudget : 0;
    const timeRate = elapsedDays / totalDays;
    const onTrack = progressRate >= timeRate;
    return { dailyBudget, shouldAchieve, achieved, remaining, remainDays, dailyNeed, progressRate, timeRate, onTrack };
}
function huanbi(curr, prev) { if(!prev || prev===0) return curr>0?'+&#8734;':'-'; const r=((curr-prev)/prev*100); return (r>=0?'+':'')+r.toFixed(1)+'%'; }
function huanbiClass(curr, prev, lowerBetter) { if(!prev||prev===0) return ''; const r=(curr-prev)/prev; if(lowerBetter) return r<=0?'badge-green':'badge-red'; return r>=0?'badge-green':'badge-red'; }
function parseDaysInWeek(dateStr) {
    if(!dateStr) return 0;
    const s = String(dateStr);
    if(s.includes('-')) { const parts=s.split('-'); const e=parseInt(parts[1].split('.')[1]); const b=parseInt(parts[0].split('.')[1]); return e-b+1; }
    return 1;
}

// ===== 文件上传 =====
const fileInput = document.getElementById('fileInput');
const uploadBox = document.getElementById('uploadBox');
const selectBtn = document.getElementById('selectFileBtn');
const statusEl = document.getElementById('uploadStatus');

uploadBox.addEventListener('click', e => { e.stopPropagation(); fileInput.click(); });
selectBtn.addEventListener('click', e => { e.stopPropagation(); e.preventDefault(); fileInput.click(); });
fileInput.addEventListener('change', e => { if(e.target.files.length) handleFile(e.target.files[0]); });
uploadBox.addEventListener('dragover', e => { e.preventDefault(); uploadBox.style.borderColor='#38bdf8'; });
uploadBox.addEventListener('dragleave', () => { uploadBox.style.borderColor=''; });
uploadBox.addEventListener('drop', e => { e.preventDefault(); uploadBox.style.borderColor=''; if(e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });

function handleFile(file) {
    statusEl.style.display='block'; statusEl.textContent='正在解析...';
    const reader = new FileReader();
    reader.onload = e => {
        try {
            const wb = XLSX.read(e.target.result, {type:'array'});
            const d = parseWorkbook(wb);
            renderReport(d);
            statusEl.textContent='';
        } catch(err) { statusEl.textContent='解析失败: '+err.message; }
    };
    reader.readAsArrayBuffer(file);
}

// ===== 解析Excel =====
function parseWorkbook(wb) {
    const sheets = {};
    wb.SheetNames.forEach(name => { sheets[name] = wb.Sheets[name]; });
    const s1 = sheets['月度预算'] || wb.Sheets[wb.SheetNames[0]];
    const s2 = sheets['周度数据'] || wb.Sheets[wb.SheetNames[1]];
    const s3 = sheets['应收账款'] || wb.Sheets[wb.SheetNames[2]];
    const s4 = sheets['审批数据'] || wb.Sheets[wb.SheetNames[3]];
    const s5 = sheets['周报文本'] || wb.Sheets[wb.SheetNames[4]];

    const d = {basic:{},budget:{income:[],cost:[],expense:[]},weekly:{sales:[],cost:[],expense:[]},ar:{staff:[],aging:[],top10:[]},approval:{basic:{},categories:[],flowTypes:[],expenseTypes:[],topApplicants:[]},report:{period:'',week:'',completed:[],nextWeek:[],special:''}};

    // ===== Sheet1 月度预算 =====
    if(s1) {
        d.basic = {year:v(s1,5,2), month:v(s1,6,2), company:v(s1,7,2), reporter:v(s1,8,2), dept:v(s1,9,2), headcount:n(s1,10,2)};
        d.cumulativeSales = n(s1,12,2);
        d.cumulativeReturn = n(s1,13,2);
        for(let r=16;r<=21;r++) d.budget.income.push({item:v(s1,r,1), amount:n(s1,r,2)});
        for(let r=25;r<=29;r++) d.budget.cost.push({item:v(s1,r,1), amount:n(s1,r,2)});
        for(let r=33;r<=41;r++) d.budget.expense.push({item:v(s1,r,1), amount:n(s1,r,2)});
    }

    // ===== Sheet2 周度数据 =====
    if(s2) {
        for(let r=6;r<=11;r++) { const week=v(s2,r,1); if(week) d.weekly.sales.push({week,date:v(s2,r,2),bSales:n(s2,r,3),cSales:n(s2,r,4),lyhSales:n(s2,r,5),totalSales:n(s2,r,6),totalReturn:n(s2,r,7),monthReturn:n(s2,r,8)}); }
        for(let r=16;r<=21;r++) { const week=v(s2,r,1); if(week) d.weekly.cost.push({week,mainCost:n(s2,r,2),logistics:n(s2,r,3),depreciation:n(s2,r,4),rent:n(s2,r,5),labor:n(s2,r,6),otherFixed:n(s2,r,7),total:n(s2,r,8)}); }
        for(let r=25;r<=30;r++) { const week=v(s2,r,1); if(week) d.weekly.expense.push({week,entertainment:n(s2,r,2),maintenance:n(s2,r,3),travel:n(s2,r,4),transport:n(s2,r,5),vehicle:n(s2,r,6),office:n(s2,r,7),service:n(s2,r,8),welfare:n(s2,r,9),telecom:n(s2,r,10),otherExp:n(s2,r,11),total:n(s2,r,12)}); }
    }

    // ===== Sheet3 应收账款 =====
    if(s3) {
        for(let r=7;r<=20;r++) { const name=v(s3,r,1); if(name) d.ar.staff.push({name,customers:n(s3,r,2),unsettled:n(s3,r,3),d0_30:n(s3,r,4),d31_90:n(s3,r,5),d91_180:n(s3,r,6),d180plus:n(s3,r,7),over30Rate:v(s3,r,8)}); }
        for(let r=25;r<=29;r++) { const range=v(s3,r,1); if(range) d.ar.aging.push({range,count:n(s3,r,2),amount:n(s3,r,3),ratio:v(s3,r,4)}); }
        for(let r=33;r<=42;r++) { const rank=v(s3,r,1); if(rank) d.ar.top10.push({rank,customer:v(s3,r,2),salesman:v(s3,r,3),amount:n(s3,r,4),agingRange:v(s3,r,5),docCount:n(s3,r,6),earliest:v(s3,r,7),latest:v(s3,r,8)}); }
    }

    // ===== Sheet4 审批数据 =====
    if(s4) {
        d.approval.basic = {period:v(s4,5,2),totalCount:n(s4,6,2),validCount:n(s4,7,2),validAmount:n(s4,8,2),approvedAmount:n(s4,9,2),pendingAmount:n(s4,10,2)};
        for(let r=15;r<=18;r++) { const cat=v(s4,r,1); if(cat) d.approval.categories.push({category:cat,count:n(s4,r,2),amount:n(s4,r,3),ratio:v(s4,r,4)}); }
        for(let r=23;r<=26;r++) { const type=v(s4,r,1); if(type) d.approval.flowTypes.push({type,count:n(s4,r,2),amount:n(s4,r,3),ratio:v(s4,r,4)}); }
        for(let r=30;r<=40;r++) { const item=v(s4,r,1); if(item) d.approval.expenseTypes.push({item,count:n(s4,r,2),amount:n(s4,r,3),ratio:v(s4,r,4)}); }
        for(let r=48;r<=57;r++) { const rank=v(s4,r,1); if(rank) d.approval.topApplicants.push({rank,applicant:v(s4,r,2),count:n(s4,r,3),amount:n(s4,r,4)}); }
    }

    // ===== Sheet5 周报文本 =====
    if(s5) {
        d.report.period = v(s5,5,2);
        d.report.week = v(s5,6,2);
        for(let r=7;r<=13;r++) { const val=v(s5,r,2); if(val) d.report.completed.push(val); }
        for(let r=14;r<=18;r++) { const val=v(s5,r,2); if(val) d.report.nextWeek.push(val); }
        d.report.special = v(s5,19,2);
    }

    // ===== 派生计算 =====
    const month = parseInt(d.basic.month) || 5;
    const year = parseInt(d.basic.year) || 2026;
    const totalDays = new Date(year, month, 0).getDate();

    let elapsedDays = totalDays;
    if(d.report.period) {
        const parts = String(d.report.period).split('-');
        if(parts.length>=2) { const endDay=parseInt(parts[1].split('.')[1]); if(endDay>0) elapsedDays=Math.min(endDay,totalDays); }
    }

    d.totalDays = totalDays;
    d.elapsedDays = elapsedDays;

    // 应收余额直读Sheet1
    d.arBalance = d.budget.income.find(i=>i.item&&i.item.includes('应收')&&i.item.includes('实际'))?.amount || 0;
    d.arTarget = d.budget.income.find(i=>i.item&&i.item.includes('应收')&&i.item.includes('目标'))?.amount || 0;

    // 预算目标
    d.salesTarget = d.budget.income.find(i=>i.item&&i.item.includes('合计'))?.amount || 0;
    d.bTarget = d.budget.income.find(i=>i.item&&i.item.includes('B端'))?.amount || 0;
    d.cTarget = d.budget.income.find(i=>i.item&&i.item.includes('C端'))?.amount || 0;
    d.lyhTarget = d.budget.income.find(i=>i.item&&i.item==='刘义虎')?.amount || 0;

    // 周度汇总
    d.monthTotalSales = d.weekly.sales.reduce((s,w)=>s+w.totalSales,0);
    d.monthTotalReturn = d.weekly.sales.reduce((s,w)=>s+w.totalReturn,0);
    d.monthSalesReturn = d.weekly.sales.reduce((s,w)=>s+w.monthReturn,0);
    d.monthBSales = d.weekly.sales.reduce((s,w)=>s+w.bSales,0);
    d.monthCSales = d.weekly.sales.reduce((s,w)=>s+w.cSales,0);
    d.monthLyhSales = d.weekly.sales.reduce((s,w)=>s+w.lyhSales,0);

    // 双回款率
    d.monthReturnRate = d.monthTotalSales > 0 ? d.monthSalesReturn / d.monthTotalSales : 0;
    d.overallReturnRate = d.cumulativeSales > 0 ? d.cumulativeReturn / d.cumulativeSales : 0;

    // 成本费用汇总
    d.monthTotalCost = d.weekly.cost.reduce((s,w)=>s+w.total,0);
    d.monthTotalExpense = d.weekly.expense.reduce((s,w)=>s+w.total,0);

    // 每周天数（用于预算分配）
    d.weekly.sales.forEach(w => { w.days = parseDaysInWeek(w.date); });

    return d;
}

// ===== Tab切换 =====
function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    document.querySelector('.tab-btn[onclick*="'+name+'"]').classList.add('active');
    document.getElementById('tab-'+name).classList.add('active');
}

function renderReport(d) {
    document.getElementById('uploadSection').style.display='none';
    document.getElementById('reportSection').classList.add('active');
    document.getElementById('reportTitle').textContent=(d.basic.company||'中合五金')+' 经营周报';
    document.getElementById('reportInfo').innerHTML='<span>&#128197; '+d.basic.year+'年'+d.basic.month+'月</span><span>&#128100; '+(d.basic.reporter||'')+'</span><span>&#127968; '+d.basic.dept+'</span><span>&#128101; '+d.basic.headcount+'人</span><span>第'+d.elapsedDays+'/'+d.totalDays+'天</span>';
    renderOverview(d);renderSales(d);renderCost(d);renderExpense(d);renderAR(d);renderApproval(d);renderReportTab(d);
}

// ===== Tab1: 经营总览 =====
function renderOverview(d) {
    const td=d.totalDays,ed=d.elapsedDays;
    const salesRoll=rollingBudget(d.salesTarget,d.monthTotalSales,td,ed);
    const costBudgetTotal=d.budget.cost.reduce((s,i)=>s+i.amount,0);
    const expBudgetTotal=d.budget.expense.reduce((s,i)=>s+i.amount,0);
    const costRoll=rollingBudget(costBudgetTotal,d.monthTotalCost,td,ed);
    const expRoll=rollingBudget(expBudgetTotal,d.monthTotalExpense,td,ed);

    let html='<div class="kpi-grid">';
    html+='<div class="kpi-card"><div class="kpi-label">销售达成率</div><div class="kpi-value '+(salesRoll.onTrack?'green':'red')+'">'+pct(salesRoll.progressRate)+'</div><div class="kpi-sub">目标'+fmt(d.salesTarget)+' | 达成'+fmt(d.monthTotalSales)+'</div><div class="kpi-extra">时间进度'+pct(salesRoll.timeRate)+' '+(salesRoll.onTrack?'&#9989; 超前':'&#9888;&#65039; 落后')+'<br>剩余每天需'+fmt(salesRoll.dailyNeed)+'</div><div class="progress-bar"><div class="progress-fill '+progressClass(salesRoll.progressRate)+'" style="width:'+Math.min(salesRoll.progressRate*100,100)+'%"></div></div></div>';

    html+='<div class="kpi-card"><div class="kpi-label">当月回款率</div><div class="kpi-value '+(d.monthReturnRate>=0.5?'green':d.monthReturnRate>=0.3?'yellow':'red')+'">'+pct(d.monthReturnRate)+'</div><div class="kpi-sub">销售回款'+fmt(d.monthSalesReturn)+' / 销售'+fmt(d.monthTotalSales)+'</div><div class="kpi-extra">总体回款率'+pct(d.overallReturnRate)+'</div><div class="progress-bar"><div class="progress-fill '+progressClass(d.monthReturnRate)+'" style="width:'+Math.min(d.monthReturnRate*100,100)+'%"></div></div></div>';

    html+='<div class="kpi-card"><div class="kpi-label">应收余额</div><div class="kpi-value '+(d.arBalance<=d.arTarget?'green':'red')+'">'+fmt(d.arBalance)+'</div><div class="kpi-sub">控制目标 '+fmt(d.arTarget)+'</div><div class="kpi-extra">超标 '+fmt(d.arBalance-d.arTarget)+'</div><div class="progress-bar"><div class="progress-fill '+(d.arBalance<=d.arTarget?'high':'low')+'" style="width:'+Math.min(d.arTarget>0?d.arBalance/d.arTarget*100:0,100)+'%"></div></div></div>';

    html+='<div class="kpi-card"><div class="kpi-label">成本进度</div><div class="kpi-value '+(costRoll.onTrack?'green':'red')+'">'+pct(costRoll.progressRate)+'</div><div class="kpi-sub">预算'+fmt(costBudgetTotal)+' | 实际'+fmt(d.monthTotalCost)+'</div><div class="kpi-extra">剩余每天需'+fmt(costRoll.dailyNeed)+'</div></div>';

    html+='<div class="kpi-card"><div class="kpi-label">费用进度</div><div class="kpi-value '+(expRoll.onTrack?'green':'red')+'">'+pct(expRoll.progressRate)+'</div><div class="kpi-sub">预算'+fmt(expBudgetTotal)+' | 实际'+fmt(d.monthTotalExpense)+'</div><div class="kpi-extra">剩余每天需'+fmt(expRoll.dailyNeed)+'</div></div>';

    html+='<div class="kpi-card"><div class="kpi-label">毛利率</div><div class="kpi-value blue">'+pct(d.monthTotalSales>0?(d.monthTotalSales-d.monthTotalCost)/d.monthTotalSales:0)+'</div><div class="kpi-sub">销售'+fmt(d.monthTotalSales)+' - 成本'+fmt(d.monthTotalCost)+'</div></div>';
    html+='</div>';

    // 滚动预算达成表 - 收入
    html+='<div class="card"><div class="card-title">&#128202; 收入滚动预算达成（第'+ed+'/'+td+'天）</div><div class="scroll-table"><table><thead><tr><th>类别</th><th class="text-right">月目标</th><th class="text-right">日均目标</th><th class="text-right">应达成</th><th class="text-right">实际达成</th><th class="text-center">达成率</th><th class="text-center">时间进度</th><th class="text-center">状态</th><th class="text-right">剩余每天需</th></tr></thead><tbody>';
    const incomeRows=[
        {name:'B端销售',target:d.bTarget,actual:d.monthBSales},
        {name:'C端销售',target:d.cTarget,actual:d.monthCSales},
        {name:'刘义虎',target:d.lyhTarget,actual:d.monthLyhSales},
        {name:'<strong>合计</strong>',target:d.salesTarget,actual:d.monthTotalSales}
    ];
    incomeRows.forEach(r=>{
        const roll=rollingBudget(r.target,r.actual,td,ed);
        html+='<tr><td>'+r.name+'</td><td class="text-right">'+fmt(r.target)+'</td><td class="text-right">'+fmt(roll.dailyBudget)+'</td><td class="text-right">'+fmt(roll.shouldAchieve)+'</td><td class="text-right" style="'+(roll.onTrack?'color:#4ade80':'color:#f87171')+';font-weight:600">'+fmt(roll.achieved)+'</td><td class="text-center"><span class="badge '+(roll.progressRate>=roll.timeRate?'badge-green':'badge-red')+'">'+pct(roll.progressRate)+'</span></td><td class="text-center">'+pct(roll.timeRate)+'</td><td class="text-center">'+(roll.onTrack?'&#9989;':'&#9888;&#65039;')+'</td><td class="text-right '+(roll.onTrack?'budget-ok':'budget-gap')+'">'+(roll.remaining>0?fmt(roll.dailyNeed):'已完成')+'</td></tr>';
    });
    html+='</tbody></table></div></div>';

    // 风险预警
    const warnings=[];
    if(!salesRoll.onTrack) warnings.push({icon:'&#128308;',title:'销售进度落后',desc:'达成'+pct(salesRoll.progressRate)+'，时间进度'+pct(salesRoll.timeRate)+'，剩余每天需'+fmt(salesRoll.dailyNeed),level:'risk'});
    const bRoll=rollingBudget(d.bTarget,d.monthBSales,td,ed);
    const cRoll=rollingBudget(d.cTarget,d.monthCSales,td,ed);
    if(!bRoll.onTrack) warnings.push({icon:'&#9888;&#65039;',title:'B端销售落后',desc:'达成'+pct(bRoll.progressRate)+'，剩余每天需'+fmt(bRoll.dailyNeed),level:'warn'});
    if(!cRoll.onTrack) warnings.push({icon:'&#9888;&#65039;',title:'C端销售落后',desc:'达成'+pct(cRoll.progressRate)+'，剩余每天需'+fmt(cRoll.dailyNeed),level:'warn'});
    if(d.arBalance>d.arTarget) warnings.push({icon:'&#128308;',title:'应收余额超标',desc:'应收'+fmt(d.arBalance)+'，超出目标'+fmt(d.arBalance-d.arTarget),level:'risk'});
    if(d.monthReturnRate<0.3) warnings.push({icon:'&#9888;&#65039;',title:'当月回款率偏低',desc:'仅'+pct(d.monthReturnRate),level:'warn'});

    if(warnings.length>0) {
        html+='<div class="card"><div class="card-title">&#9888;&#65039; 风险预警</div>';
        warnings.forEach(w=>{html+='<div class="risk-card '+(w.level==='warn'?'warn':'')+'"><div class="risk-icon">'+w.icon+'</div><div><div class="risk-title">'+w.title+'</div><div class="risk-desc">'+w.desc+'</div></div></div>';});
        html+='</div>';
    }

    document.getElementById('tab-overview').innerHTML=html;
}

// ===== Tab3: 成本分析 =====
function renderCost(d) {
    let html='';
    const td=d.totalDays,ed=d.elapsedDays;
    const costBudgetTotal=d.budget.cost.reduce((s,i)=>s+i.amount,0);
    const costRoll=rollingBudget(costBudgetTotal,d.monthTotalCost,td,ed);
    const dailyRate=td>0?costBudgetTotal/td:0;

    // 成本预算子项映射到周度数据
    const costMapping=[
        {budgetItem:'主营业务成本',weeklyKey:'mainCost'},
        {budgetItem:'物流费',weeklyKey:'logistics'},
        {budgetItem:'折旧',weeklyKey:'depreciation'},
        {budgetItem:'租金',weeklyKey:'rent'},
        {budgetItem:'人工',weeklyKey:'labor'}
    ];

    // KPI
    html+='<div class="kpi-grid">';
    html+='<div class="kpi-card"><div class="kpi-label">成本总预算</div><div class="kpi-value blue">'+fmt(costBudgetTotal)+'</div></div>';
    html+='<div class="kpi-card"><div class="kpi-label">成本累计</div><div class="kpi-value '+(costRoll.onTrack?'green':'red')+'">'+fmt(d.monthTotalCost)+'</div><div class="kpi-sub">达成率'+pct(costRoll.progressRate)+' | 时间进度'+pct(costRoll.timeRate)+'</div></div>';
    html+='<div class="kpi-card"><div class="kpi-label">剩余预算</div><div class="kpi-value yellow">'+fmt(costRoll.remaining)+'</div><div class="kpi-sub">剩余每天需'+fmt(costRoll.dailyNeed)+'</div></div>';
    html+='<div class="kpi-card"><div class="kpi-label">毛利率</div><div class="kpi-value blue">'+pct(d.monthTotalSales>0?(d.monthTotalSales-d.monthTotalCost)/d.monthTotalSales:0)+'</div><div class="kpi-sub">销售'+fmt(d.monthTotalSales)+' - 成本'+fmt(d.monthTotalCost)+'</div></div>';
    html+='</div>';

    // 成本结构图
    html+='<div class="two-col"><div class="card"><div class="card-title">&#127981; 成本结构（预算）</div><div class="chart-container small"><canvas id="costPieChart"></canvas></div></div>';
    html+='<div class="card"><div class="card-title">&#128200; 周度成本趋势</div><div class="chart-container small"><canvas id="costTrendChart"></canvas></div></div></div>';

    // 成本滚动预算 - 含子项实际达成
    html+='<div class="card"><div class="card-title">&#128202; 成本滚动预算达成（第'+ed+'/'+td+'天）</div><div class="scroll-table"><table><thead><tr><th>科目</th><th class="text-right">月预算</th><th class="text-right">日均</th><th class="text-right">应达成</th><th class="text-right">实际达成</th><th class="text-center">达成率</th><th class="text-center">时间进度</th><th class="text-right">剩余每天需</th></tr></thead><tbody>';
    costMapping.forEach(m=>{
        const budgetItem=d.budget.cost.find(b=>b.item===m.budgetItem);
        const budget=budgetItem?budgetItem.amount:0;
        const actual=d.weekly.cost.reduce((s,w)=>s+(w[m.weeklyKey]||0),0);
        const roll=rollingBudget(budget,actual,td,ed);
        html+='<tr><td>'+m.budgetItem+'</td><td class="text-right">'+fmt(budget)+'</td><td class="text-right">'+fmt(roll.dailyBudget)+'</td><td class="text-right">'+fmt(roll.shouldAchieve)+'</td><td class="text-right" style="'+(roll.progressRate<=roll.timeRate?'color:#4ade80':'color:#f87171')+';font-weight:600">'+fmt(roll.achieved)+'</td><td class="text-center"><span class="badge '+(roll.progressRate<=roll.timeRate?'badge-green':'badge-red')+'">'+pct(roll.progressRate)+'</span></td><td class="text-center">'+pct(roll.timeRate)+'</td><td class="text-right '+(roll.progressRate<=roll.timeRate?'budget-ok':'budget-gap')+'">'+(roll.remaining>0?fmt(roll.dailyNeed):'已完成')+'</td></tr>';
    });
    // 其他固定（无预算，只有实际）
    const otherFixedTotal=d.weekly.cost.reduce((s,w)=>s+(w.otherFixed||0),0);
    html+='<tr><td>其他固定</td><td class="text-right">-</td><td class="text-right">-</td><td class="text-right">-</td><td class="text-right">'+fmt(otherFixedTotal)+'</td><td class="text-center">-</td><td class="text-center">-</td><td class="text-right">-</td></tr>';
    // 合计
    html+='<tr style="background:rgba(14,165,233,0.1);font-weight:600"><td>成本合计</td><td class="text-right">'+fmt(costBudgetTotal)+'</td><td class="text-right">'+fmt(costRoll.dailyBudget)+'</td><td class="text-right">'+fmt(costRoll.shouldAchieve)+'</td><td class="text-right" style="'+(costRoll.onTrack?'color:#4ade80':'color:#f87171')+'">'+fmt(d.monthTotalCost)+'</td><td class="text-center"><span class="badge '+(costRoll.onTrack?'badge-green':'badge-red')+'">'+pct(costRoll.progressRate)+'</span></td><td class="text-center">'+pct(costRoll.timeRate)+'</td><td class="text-right '+(costRoll.onTrack?'budget-ok':'budget-gap')+'">'+(costRoll.remaining>0?fmt(costRoll.dailyNeed):'已完成')+'</td></tr>';
    html+='</tbody></table></div></div>';

    // 周度成本明细 + 环比
    html+='<div class="card"><div class="card-title">&#128203; 周度成本明细（含环比）</div><div class="scroll-table"><table><thead><tr><th>周次</th><th class="text-right">周预算</th><th class="text-right">主营成本</th><th class="text-right">运杂物流费</th><th class="text-right">折旧</th><th class="text-right">租金</th><th class="text-right">人工</th><th class="text-right">其他固定</th><th class="text-right">合计</th><th class="text-center">达成率</th><th class="text-center">环比</th></tr></thead><tbody>';
    let prevCost=0;
    d.weekly.cost.forEach(w=>{
        const weekBudget=dailyRate*(d.weekly.sales.find(s=>s.week===w.week)?.days||7);
        const achieveRate=weekBudget>0?w.total/weekBudget:0;

// ===== Tab4: 费用分析 =====
function renderExpense(d) {
    let html='';
    const td=d.totalDays,ed=d.elapsedDays;
    const expBudgetTotal=d.budget.expense.reduce((s,i)=>s+i.amount,0);
    const expRoll=rollingBudget(expBudgetTotal,d.monthTotalExpense,td,ed);
    const dailyRate=td>0?expBudgetTotal/td:0;

    // 费用预算子项映射到周度数据（注意：名称不完全对应）
    const expMapping=[
        {budgetItem:'业务招待费',weeklyKey:'entertainment'},
        {budgetItem:'差旅费',weeklyKey:'travel'},
        {budgetItem:'车辆费',weeklyKey:'vehicle'},  // 车辆费→车辆使用费
        {budgetItem:'办公用品',weeklyKey:'office'},
        {budgetItem:'通讯费',weeklyKey:'telecom'}
    ];
    // 周度有但预算没有的费用项
    const weeklyOnlyKeys=[
        {key:'maintenance',label:'维修维护费'},
        {key:'transport',label:'交通费'},
        {key:'service',label:'服务费'},
        {key:'welfare',label:'福利费'},
        {key:'otherExp',label:'其它'}
    ];
    // 预算有但周度没有的费用项
    const budgetOnlyItems=['生活费','宿舍费','其他费用','水电费'];

    // KPI
    html+='<div class="kpi-grid">';
    html+='<div class="kpi-card"><div class="kpi-label">费用总预算</div><div class="kpi-value blue">'+fmt(expBudgetTotal)+'</div></div>';
    html+='<div class="kpi-card"><div class="kpi-label">费用累计</div><div class="kpi-value '+(expRoll.onTrack?'green':'yellow')+'">'+fmt(d.monthTotalExpense)+'</div><div class="kpi-sub">达成率'+pct(expRoll.progressRate)+' | 时间进度'+pct(expRoll.timeRate)+'</div></div>';
    html+='<div class="kpi-card"><div class="kpi-label">剩余预算</div><div class="kpi-value yellow">'+fmt(expRoll.remaining)+'</div><div class="kpi-sub">剩余每天需'+fmt(expRoll.dailyNeed)+'</div></div>';
    html+='<div class="kpi-card"><div class="kpi-label">费用占销售比</div><div class="kpi-value blue">'+pct(d.monthTotalSales>0?d.monthTotalExpense/d.monthTotalSales:0)+'</div></div>';
    html+='</div>';

    // 费用结构图
    html+='<div class="two-col"><div class="card"><div class="card-title">&#128184; 费用结构（预算）</div><div class="chart-container small"><canvas id="expensePieChart"></canvas></div></div>';
    html+='<div class="card"><div class="card-title">&#128200; 周度费用趋势</div><div class="chart-container small"><canvas id="expenseTrendChart"></canvas></div></div></div>';

    // 费用滚动预算 - 含子项
    html+='<div class="card"><div class="card-title">&#128202; 费用滚动预算达成（第'+ed+'/'+td+'天）</div><div class="scroll-table"><table><thead><tr><th>科目</th><th class="text-right">月预算</th><th class="text-right">日均</th><th class="text-right">应达成</th><th class="text-right">实际达成</th><th class="text-center">达成率</th><th class="text-center">时间进度</th><th class="text-right">剩余每天需</th></tr></thead><tbody>';
    expMapping.forEach(m=>{
        const budgetItem=d.budget.expense.find(b=>b.item===m.budgetItem);
        const budget=budgetItem?budgetItem.amount:0;
        const actual=d.weekly.expense.reduce((s,w)=>s+(w[m.weeklyKey]||0),0);
        const roll=rollingBudget(budget,actual,td,ed);
        html+='<tr><td>'+m.budgetItem+'</td><td class="text-right">'+fmt(budget)+'</td><td class="text-right">'+fmt(roll.dailyBudget)+'</td><td class="text-right">'+fmt(roll.shouldAchieve)+'</td><td class="text-right" style="'+(roll.progressRate<=roll.timeRate?'color:#4ade80':'color:#f87171')+';font-weight:600">'+fmt(roll.achieved)+'</td><td class="text-center"><span class="badge '+(roll.progressRate<=roll.timeRate?'badge-green':'badge-red')+'">'+pct(roll.progressRate)+'</span></td><td class="text-center">'+pct(roll.timeRate)+'</td><td class="text-right '+(roll.progressRate<=roll.timeRate?'budget-ok':'budget-gap')+'">'+(roll.remaining>0?fmt(roll.dailyNeed):'已完成')+'</td></tr>';
    });
    // 预算有但周度没有的
    budgetOnlyItems.forEach(name=>{
        const budgetItem=d.budget.expense.find(b=>b.item===name);
        const budget=budgetItem?budgetItem.amount:0;
        const roll=rollingBudget(budget,0,td,ed);
        html+='<tr><td>'+name+'</td><td class="text-right">'+fmt(budget)+'</td><td class="text-right">'+fmt(roll.dailyBudget)+'</td><td class="text-right">'+fmt(roll.shouldAchieve)+'</td><td class="text-right">-</td><td class="text-center">-</td><td class="text-center">'+pct(roll.timeRate)+'</td><td class="text-right">-</td></tr>';
    });
    // 周度有但预算没有的
    weeklyOnlyKeys.forEach(wk=>{
        const actual=d.weekly.expense.reduce((s,w)=>s+(w[wk.key]||0),0);
        if(actual>0) html+='<tr><td>'+wk.label+'（无预算）</td><td class="text-right">-</td><td class="text-right">-</td><td class="text-right">-</td><td class="text-right">'+fmt(actual)+'</td><td class="text-center">-</td><td class="text-center">-</td><td class="text-right">-</td></tr>';
    });
    // 合计
    html+='<tr style="background:rgba(14,165,233,0.1);font-weight:600"><td>费用合计</td><td class="text-right">'+fmt(expBudgetTotal)+'</td><td class="text-right">'+fmt(expRoll.dailyBudget)+'</td><td class="text-right">'+fmt(expRoll.shouldAchieve)+'</td><td class="text-right" style="'+(expRoll.onTrack?'color:#4ade80':'color:#f87171')+'">'+fmt(d.monthTotalExpense)+'</td><td class="text-center"><span class="badge '+(expRoll.onTrack?'badge-green':'badge-red')+'">'+pct(expRoll.progressRate)+'</span></td><td class="text-center">'+pct(expRoll.timeRate)+'</td><td class="text-right '+(expRoll.onTrack?'budget-ok':'budget-gap')+'">'+(expRoll.remaining>0?fmt(expRoll.dailyNeed):'已完成')+'</td></tr>';
    html+='</tbody></table></div></div>';

    // 周度费用明细 + 环比
    html+='<div class="card"><div class="card-title">&#128203; 周度费用明细（含环比）</div><div class="scroll-table"><table><thead><tr><th>周次</th><th class="text-right">周预算</th><th class="text-right">业务招待费</th><th class="text-right">维修维护费</th><th class="text-right">差旅费</th><th class="text-right">交通费</th><th class="text-right">车辆使用费</th><th class="text-right">办公费</th><th class="text-right">服务费</th><th class="text-right">福利费</th><th class="text-right">通讯费</th><th class="text-right">其它</th><th class="text-right">合计</th><th class="text-center">环比</th></tr></thead><tbody>';
    let prevExpense=0;
    d.weekly.expense.forEach(w=>{
        const weekBudget=dailyRate*(d.weekly.sales.find(s=>s.week===w.week)?.days||7);
        html+='<tr><td>'+w.week+'</td><td class="text-right">'+fmt(weekBudget)+'</td><td class="text-right">'+fmt(w.entertainment)+'</td><td class="text-right">'+fmt(w.maintenance)+'</td><td class="text-right">'+fmt(w.travel)+'</td><td class="text-right">'+fmt(w.transport)+'</td><td class="text-right">'+fmt(w.vehicle)+'</td><td class="text-right">'+fmt(w.office)+'</td><td class="text-right">'+fmt(w.service)+'</td><td class="text-right">'+fmt(w.welfare)+'</td><td class="text-right">'+fmt(w.telecom)+'</td><td class="text-right">'+fmt(w.otherExp)+'</td><td class="text-right" style="font-weight:600;color:#38bdf8">'+fmt(w.total)+'</td><td class="text-center"><span class="badge '+huanbiClass(w.total,prevExpense,true)+'">'+huanbi(w.total,prevExpense)+'</span></td></tr>';
        if(w.total>0) prevExpense=w.total;
    });
    html+='<tr style="background:rgba(14,165,233,0.1);font-weight:600"><td>合计</td><td class="text-right">'+fmt(expBudgetTotal)+'</td><td class="text-right">'+fmt(d.weekly.expense.reduce((s,w)=>s+w.entertainment,0))+'</td><td class="text-right">'+fmt(d.weekly.expense.reduce((s,w)=>s+w.maintenance,0))+'</td><td class="text-right">'+fmt(d.weekly.expense.reduce((s,w)=>s+w.travel,0))+'</td><td class="text-right">'+fmt(d.weekly.expense.reduce((s,w)=>s+w.transport,0))+'</td><td class="text-right">'+fmt(d.weekly.expense.reduce((s,w)=>s+w.vehicle,0))+'</td><td class="text-right">'+fmt(d.weekly.expense.reduce((s,w)=>s+w.office,0))+'</td><td class="text-right">'+fmt(d.weekly.expense.reduce((s,w)=>s+w.service,0))+'</td><td class="text-right">'+fmt(d.weekly.expense.reduce((s,w)=>s+w.welfare,0))+'</td><td class="text-right">'+fmt(d.weekly.expense.reduce((s,w)=>s+w.telecom,0))+'</td><td class="text-right">'+fmt(d.weekly.expense.reduce((s,w)=>s+w.otherExp,0))+'</td><td class="text-right" style="color:#38bdf8">'+fmt(d.monthTotalExpense)+'</td><td></td></tr>';
    html+='</tbody></table></div></div>';

    document.getElementById('tab-expense').innerHTML=html;

    setTimeout(()=>{
        const ep=document.getElementById('expensePieChart');
        if(ep) {
            const filtered=d.budget.expense.filter(i=>i.amount>0);
            createChart('expensePieChart',ep,{type:'doughnut',data:{labels:filtered.map(i=>i.item),datasets:[{data:filtered.map(i=>i.amount),backgroundColor:['#0ea5e9','#f59e0b','#ef4444','#10b981','#8b5cf6','#64748b','#f97316','#06b6d4','#a855f7']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#94a3b8',font:{size:11}}}}}});
        }
        const et=document.getElementById('expenseTrendChart');
        if(et) createChart('expenseTrendChart',et,{type:'bar',data:{labels:d.weekly.expense.map(w=>w.week),datasets:[
            {label:'业务招待费',data:d.weekly.expense.map(w=>w.entertainment),backgroundColor:'rgba(14,165,233,0.7)'},
            {label:'维修维护费',data:d.weekly.expense.map(w=>w.maintenance),backgroundColor:'rgba(245,158,11,0.7)'},
            {label:'车辆使用费',data:d.weekly.expense.map(w=>w.vehicle),backgroundColor:'rgba(239,68,68,0.7)'},
            {label:'办公费',data:d.weekly.expense.map(w=>w.office),backgroundColor:'rgba(16,185,129,0.7)'},
            {label:'其他',data:d.weekly.expense.map(w=>w.travel+w.transport+w.service+w.welfare+w.telecom+w.otherExp),backgroundColor:'rgba(100,116,139,0.7)'}
        ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#94a3b8'}}},scales:{x:{stacked:true,grid:{color:'rgba(148,163,184,0.1)'},ticks:{color:'#94a3b8'}},y:{stacked:true,grid:{color:'rgba(148,163,184,0.1)'},ticks:{color:'#94a3b8'}}}}});
    },100);
}

    html+='<div class="summary-item"><div class="label">超标金额</div><div class="value" style="color:'+(d.arBalance>d.arTarget?'#f87171':'#4ade80')+'">'+fmt(d.arBalance-d.arTarget)+'</div></div>';
    html+='<div class="summary-item"><div class="label">总体回款率</div><div class="value" style="color:'+(d.overallReturnRate>=0.5?'#4ade80':'#fbbf24')+'">'+pct(d.overallReturnRate)+'</div></div>';

    html+='</div></div>';

    // 业务员排名
    html+='<div class="card"><div class="card-title">&#128101; 业务员未结算排名</div><div class="scroll-table"><table><thead><tr><th>排名</th><th>业务员</th><th class="text-right">客户数</th><th class="text-right">未结算</th><th class="text-right">0-30天</th><th class="text-right">31-90天</th><th class="text-right">91-180天</th><th class="text-right">180天+</th><th class="text-center">30天以上占比</th></tr></thead><tbody>';
    const sorted=[...d.ar.staff].sort((a,b)=>b.unsettled-a.unsettled);
    sorted.forEach((s,i)=>{
        const over30=parseFloat(s.over30Rate)||0;
        html+='<tr><td><span class="rank-badge rank-'+(i<3?i+1:'default')+'">'+(i+1)+'</span></td><td><strong>'+s.name+'</strong></td><td class="text-right">'+s.customers+'</td><td class="text-right" style="color:#f87171;font-weight:600">'+fmt(s.unsettled)+'</td><td class="text-right">'+fmt(s.d0_30)+'</td><td class="text-right">'+fmt(s.d31_90)+'</td><td class="text-right">'+fmt(s.d91_180)+'</td><td class="text-right">'+fmt(s.d180plus)+'</td><td class="text-center"><span class="badge '+(over30>50?'badge-red':over30>20?'badge-yellow':'badge-green')+'">'+(s.over30Rate||'-')+'</span></td></tr>';
    });
    html+='</tbody></table></div></div>';

    // 两栏：账龄 + TOP10
    html+='<div class="two-col">';
    html+='<div class="card"><div class="card-title">&#129472; 账龄分布</div><div class="chart-container small"><canvas id="agingChart"></canvas></div>';
    if(d.ar.aging.length) {
        html+='<table style="margin-top:12px"><thead><tr><th>区间</th><th class="text-right">单据数</th><th class="text-right">金额</th><th class="text-center">占比</th></tr></thead><tbody>';
        d.ar.aging.forEach(a=>{html+='<tr><td>'+a.range+'</td><td class="text-right">'+a.count+'</td><td class="text-right">'+fmt(a.amount)+'</td><td class="text-center">'+(a.ratio||'-')+'</td></tr>';});
        html+='</tbody></table>';
    }
    html+='</div>';

    // TOP10客户
    html+='<div class="card"><div class="card-title">&#128286; 欠款TOP10客户</div>';
    d.ar.top10.forEach(c=>{
        const isUrgent=c.agingRange&&(c.agingRange.includes('91')||c.agingRange.includes('180'));
        const isWarning=c.agingRange&&c.agingRange.includes('31-90');
        const cls=isUrgent?'critical':isWarning?'urgent':'normal';
        html+='<div class="customer-card '+cls+'"><div style="display:flex;justify-content:space-between;align-items:center"><div><strong>'+c.customer+'</strong></div><span style="color:#38bdf8;font-weight:700">'+fmt(c.amount)+'</span></div><div style="font-size:12px;color:#64748b;margin-top:4px">'+c.salesman+' &middot; '+c.agingRange+' &middot; '+c.docCount+'单 &middot; '+(c.earliest||'')+' ~ '+(c.latest||'')+'</div></div>';
    });
    html+='</div></div>';

    document.getElementById('tab-ar').innerHTML=html;

    setTimeout(()=>{
        const ac=document.getElementById('agingChart');
        if(ac) {
            const filtered=d.ar.aging.filter(a=>!a.range.includes('合计'));
            createChart('agingChart',ac,{type:'doughnut',data:{labels:filtered.map(a=>a.range),datasets:[{data:filtered.map(a=>a.amount),backgroundColor:['#4ade80','#fbbf24','#f87171','#64748b']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#94a3b8',font:{size:11}}}}}});
        }
    },100);
}

    html+='<div class="card"><div class="card-title">&#128260; 流程类型</div><div class="chart-container small"><canvas id="flowTypeChart"></canvas></div>';
    if(d.approval.flowTypes.length) {
        html+='<table><thead><tr><th>类型</th><th class="text-right">笔数</th><th class="text-right">金额</th><th class="text-center">占比</th></tr></thead><tbody>';
        d.approval.flowTypes.forEach(f=>{html+='<tr><td>'+f.type+'</td><td class="text-right">'+f.count+'</td><td class="text-right">'+fmt(f.amount)+'</td><td class="text-center">'+fmtRatio(f.ratio)+'</td></tr>';});
        html+='</tbody></table>';
    }
    html+='</div></div>';

    // 费用分类明细
    if(d.approval.expenseTypes.length) {
        html+='<div class="card"><div class="card-title">&#128184; 费用分类明细</div><div class="two-col"><div class="chart-container small"><canvas id="approvalExpChart"></canvas></div><div>';
        html+='<table><thead><tr><th>科目</th><th class="text-right">笔数</th><th class="text-right">金额</th><th class="text-center">占比</th></tr></thead><tbody>';
        d.approval.expenseTypes.forEach(e=>{html+='<tr><td>'+e.item+'</td><td class="text-right">'+e.count+'</td><td class="text-right">'+fmt(e.amount)+'</td><td class="text-center">'+fmtRatio(e.ratio)+'</td></tr>';});
        html+='</tbody></table></div></div></div>';
    }

    // TOP10申请人
    if(d.approval.topApplicants.length) {
        html+='<div class="card"><div class="card-title">&#127942; TOP10申请人</div><div class="scroll-table"><table><thead><tr><th>排名</th><th>申请人</th><th class="text-right">笔数</th><th class="text-right">金额</th></tr></thead><tbody>';
        d.approval.topApplicants.forEach(a=>{html+='<tr><td><span class="rank-badge rank-'+(a.rank<=3?a.rank:'default')+'">'+a.rank+'</span></td><td>'+a.applicant+'</td><td class="text-right">'+a.count+'</td><td class="text-right">'+fmt(a.amount)+'</td></tr>';});
        html+='</tbody></table></div></div>';
    }

    document.getElementById('tab-approval').innerHTML=html;

    setTimeout(()=>{
        if(d.approval.categories.length) {
            const acc=document.getElementById('approvalCatChart');
            if(acc) createChart('approvalCatChart',acc,{type:'doughnut',data:{labels:d.approval.categories.map(c=>c.category),datasets:[{data:d.approval.categories.map(c=>c.amount),backgroundColor:['#ef4444','#0ea5e9','#f59e0b','#8b5cf6']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#94a3b8',font:{size:11}}}}}});
        }
        if(d.approval.flowTypes.length) {
            const ft=document.getElementById('flowTypeChart');
            if(ft) createChart('flowTypeChart',ft,{type:'doughnut',data:{labels:d.approval.flowTypes.map(f=>f.type),datasets:[{data:d.approval.flowTypes.map(f=>f.amount),backgroundColor:['#0ea5e9','#ef4444','#f59e0b','#8b5cf6']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#94a3b8',font:{size:11}}}}}});
        }
        if(d.approval.expenseTypes.length) {
            const ae=document.getElementById('approvalExpChart');
            if(ae) createChart('approvalExpChart',ae,{type:'doughnut',data:{labels:d.approval.expenseTypes.map(e=>e.item),datasets:[{data:d.approval.expenseTypes.map(e=>e.amount),backgroundColor:['#0ea5e9','#f59e0b','#ef4444','#10b981','#8b5cf6','#64748b','#f97316','#06b6d4','#a855f7','#ec4899','#14b8a6']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#94a3b8',font:{size:10}}}}}});
        }
    },100);
}

// ===== Tab7: 周报事项 =====
function renderReportTab(d) {
    let html='';
    html+='<div class="card"><div class="card-title">&#128197; 汇报信息</div><div style="display:flex;gap:20px;font-size:15px"><span>汇报期间：<strong style="color:#38bdf8">'+(d.report.period||'-')+'</strong></span><span>周次：<strong style="color:#38bdf8">'+(d.report.week||'-')+'</strong></span></div></div>';

    if(d.report.completed.length) {
        html+='<div class="card"><div class="card-title">&#9989; 上周完成事项</div>';
        d.report.completed.forEach(item=>{html+='<div class="list-item"><div class="list-dot dot-green"></div><div>'+item+'</div></div>';});
        html+='</div>';
    }
    if(d.report.nextWeek.length) {
        html+='<div class="card"><div class="card-title">&#127919; 下周重点事项</div>';
        d.report.nextWeek.forEach(item=>{html+='<div class="list-item"><div class="list-dot dot-blue"></div><div>'+item+'</div></div>';});
        html+='</div>';
    }
    if(d.report.special) {
        html+='<div class="card"><div class="card-title">&#128204; 特别说明</div><div style="padding:10px;background:rgba(251,191,36,0.1);border-radius:8px;color:#fbbf24">'+d.report.special+'</div></div>';
    }

    document.getElementById('tab-report').innerHTML=html;
}
</script>
</body>
</html>
