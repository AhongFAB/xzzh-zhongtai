<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中合五金经营周报生成器</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #111827 100%);
            min-height: 100vh;
            color: #e2e8f0;
            line-height: 1.6;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .upload-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            padding: 40px;
        }
        .upload-box {
            border: 2px dashed rgba(14, 165, 233, 0.5);
            border-radius: 20px;
            padding: 60px 80px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(30, 58, 138, 0.1);
        }
        .upload-box:hover {
            border-color: #0ea5e9;
            background: rgba(30, 58, 138, 0.2);
            transform: translateY(-2px);
        }
        .upload-box.dragover {
            border-color: #38bdf8;
            background: rgba(14, 165, 233, 0.2);
        }
        .upload-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .upload-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #38bdf8;
        }
        .upload-hint {
            font-size: 14px;
            color: #94a3b8;
        }
        .report-section {
            display: none;
        }
        .report-section.active {
            display: block;
        }
        .report-header {
            background: rgba(30, 58, 138, 0.3);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 16px;
            padding: 24px 32px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .report-title {
            font-size: 28px;
            font-weight: 700;
            color: #38bdf8;
        }
        .report-info {
            display: flex;
            gap: 24px;
            font-size: 14px;
            color: #94a3b8;
        }
        .report-info span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .card {
            background: rgba(30, 58, 138, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #38bdf8;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
        }
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        .stat-card {
            background: rgba(30, 58, 138, 0.25);
            border: 1px solid rgba(56, 189, 248, 0.15);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-label {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #38bdf8;
            margin-bottom: 8px;
        }
        .stat-sub {
            font-size: 12px;
            color: #64748b;
        }
        .stat-sub strong {
            color: #38bdf8;
        }
        .progress-bar {
            height: 8px;
            background: rgba(148, 163, 184, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 12px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0ea5e9, #38bdf8);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th {
            background: rgba(14, 165, 233, 0.2);
            color: #38bdf8;
            font-weight: 600;
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
        }
        td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.1);
            color: #cbd5e1;
        }
        tr:hover td {
            background: rgba(56, 189, 248, 0.05);
        }
        .text-right {
            text-align: right;
        }
        .text-center {
            text-align: center;
        }
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .three-col {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }
        .chart-container {
            position: relative;
            height: 300px;
        }
        .list-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(56, 189, 248, 0.1);
        }
        .list-item:last-child {
            border-bottom: none;
        }
        .list-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 6px;
            flex-shrink: 0;
        }
        .dot-green { background: #10b981; }
        .dot-blue { background: #0ea5e9; }
        .dot-yellow { background: #f59e0b; }
        .dot-red { background: #ef4444; }
        .warning-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            margin-bottom: 12px;
        }
        .warning-card.yellow {
            background: rgba(245, 158, 11, 0.1);
            border-color: rgba(245, 158, 11, 0.3);
        }
        .warning-icon {
            font-size: 24px;
        }
        .warning-text {
            flex: 1;
            font-size: 14px;
        }
        .warning-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        .warning-desc {
            color: #94a3b8;
            font-size: 12px;
        }
        .footer {
            text-align: center;
            padding: 30px;
            color: #64748b;
            font-size: 12px;
        }
        .rate-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
        }
        .rate-high { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .rate-mid { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .rate-low { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        .info-item {
            background: rgba(30, 58, 138, 0.2);
            padding: 16px;
            border-radius: 10px;
            text-align: center;
        }
        .info-item-label {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 6px;
        }
        .info-item-value {
            font-size: 20px;
            font-weight: 700;
            color: #38bdf8;
        }
        .section-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.3), transparent);
            margin: 24px 0;
        }
        @media (max-width: 1024px) {
            .grid-4 { grid-template-columns: repeat(2, 1fr); }
            .two-col { grid-template-columns: 1fr; }
            .three-col { grid-template-columns: 1fr; }
            .info-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 640px) {
            .grid-4 { grid-template-columns: 1fr; }
            .report-header { flex-direction: column; gap: 16px; text-align: center; }
            .report-info { flex-wrap: wrap; justify-content: center; }
            .info-grid { grid-template-columns: 1fr; }
        }
        .mini-table th, .mini-table td {
            padding: 8px 12px;
            font-size: 12px;
        }
        .mini-table .stat-value {
            font-size: 18px;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        .color-bar {
            width: 4px;
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
            border-radius: 4px 0 0 4px;
        }
        .table-row {
            position: relative;
        }
        .bar-green { background: #10b981; }
        .bar-yellow { background: #f59e0b; }
        .bar-red { background: #ef4444; }
        .bar-blue { background: #0ea5e9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="upload-section" id="uploadSection">
            <div class="upload-box" id="uploadBox">
                <div class="upload-icon">📊</div>
                <div class="upload-title">上传Excel经营周报</div>
                <div class="upload-hint">支持 .xlsx 格式，点击或拖拽文件到此处</div>
            </div>
        </div>

        <div class="report-section" id="reportSection">
            <div class="report-header">
                <div class="report-title" id="reportTitle">中合五金经营周报</div>
                <div class="report-info" id="reportInfo"></div>
            </div>

            <div id="reportContent"></div>

            <div class="footer">
                © 2026 中台-财务工具箱 · 开发者：张洪杰，侵权必究
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">

    <script>
    (function() {
        const uploadBox = document.getElementById('uploadBox');
        const fileInput = document.getElementById('fileInput');
        const uploadSection = document.getElementById('uploadSection');
        const reportSection = document.getElementById('reportSection');

        uploadBox.addEventListener('click', () => fileInput.click());
        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBox.classList.add('dragover');
        });
        uploadBox.addEventListener('dragleave', () => {
            uploadBox.classList.remove('dragover');
        });
        uploadBox.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadBox.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) processFile(file);
        });
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) processFile(file);
        });

        function processFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const reportData = parseWorkbook(workbook);
                    renderReport(reportData);
                    uploadSection.style.display = 'none';
                    reportSection.classList.add('active');
                } catch (err) {
                    alert('文件解析失败: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function getCellValue(ws, row, col) {
            const cell = ws[XLSX.utils.encode_cell({ r: row - 1, c: col - 1 })];
            return cell ? (cell.v !== undefined && cell.v !== null ? cell.v : '') : '';
        }

        function getRowValues(ws, row, startCol, endCol) {
            const values = [];
            for (let c = startCol; c <= endCol; c++) {
                values.push(getCellValue(ws, row, c));
            }
            return values;
        }

        function safeNum(val) {
            if (val === '' || val === null || val === undefined) return 0;
            const n = Number(val);
            return isNaN(n) ? 0 : n;
        }

        function fmt(num, decimals = 2) {
            if (num === 0) return '0';
            const abs = Math.abs(num);
            if (abs >= 10000) {
                return (num / 10000).toFixed(decimals) + '万';
            }
            return num.toFixed(decimals);
        }

        function fmtRate(num) {
            return (num * 100).toFixed(1) + '%';
        }

        function parseWorkbook(wb) {
            const data = {
                basic: {},
                budget: { income: [], cost: [], expense: [] },
                weekly: { sales: [], cost: [], expense: [] },
                ar: { staff: [], aging: [], top10: [] },
                approval: { basic: {}, categories: [], flowTypes: [], expenseTypes: [], topApplicants: [] },
                weeklyReport: { period: '', weekNo: '', completed: [], nextWeek: [], special: '' }
            };

            // Sheet1 月度预算
            if (wb.SheetNames.includes('月度预算')) {
                const ws = wb.Sheets['月度预算'];
                data.basic = {
                    year: getCellValue(ws, 5, 2),
                    month: getCellValue(ws, 6, 2),
                    company: getCellValue(ws, 7, 2),
                    reporter: getCellValue(ws, 8, 2),
                    dept: getCellValue(ws, 9, 2),
                    headcount: getCellValue(ws, 10, 2)
                };

                // 收入预算 Row14-20
                for (let r = 14; r <= 20; r++) {
                    data.budget.income.push({
                        item: getCellValue(ws, r, 1),
                        amount: safeNum(getCellValue(ws, r, 2))
                    });
                }

                // 成本预算 Row24-29
                for (let r = 24; r <= 29; r++) {
                    data.budget.cost.push({
                        item: getCellValue(ws, r, 1),
                        amount: safeNum(getCellValue(ws, r, 2))
                    });
                }

                // 费用预算 Row33-47
                for (let r = 33; r <= 47; r++) {
                    data.budget.expense.push({
                        item: getCellValue(ws, r, 1),
                        amount: safeNum(getCellValue(ws, r, 2))
                    });
                }
            }

            // Sheet2 周度数据
            if (wb.SheetNames.includes('周度数据')) {
                const ws = wb.Sheets['周度数据'];

                // 销售数据 Row6-11
                for (let r = 6; r <= 11; r++) {
                    const rowVals = getRowValues(ws, r, 1, 11);
                    data.weekly.sales.push({
                        week: rowVals[0],
                        dateRange: rowVals[1],
                        bSales: safeNum(rowVals[2]),
                        cSales: safeNum(rowVals[3]),
                        lyhSales: safeNum(rowVals[4]),
                        totalSales: safeNum(rowVals[5]),
                        bankReturn: safeNum(rowVals[6]),
                        cashReturn: safeNum(rowVals[7]),
                        wechatReturn: safeNum(rowVals[8]),
                        totalReturn: safeNum(rowVals[9])
                    });
                }

                // 成本数据 Row15-20
                for (let r = 15; r <= 20; r++) {
                    const rowVals = getRowValues(ws, r, 1, 8);
                    data.weekly.cost.push({
                        week: rowVals[0],
                        mainCost: safeNum(rowVals[1]),
                        logistics: safeNum(rowVals[2]),
                        depreciation: safeNum(rowVals[3]),
                        rent: safeNum(rowVals[4]),
                        labor: safeNum(rowVals[5]),
                        otherFixed: safeNum(rowVals[6]),
                        total: safeNum(rowVals[7])
                    });
                }

                // 费用数据 Row24-29
                for (let r = 24; r <= 29; r++) {
                    const rowVals = getRowValues(ws, r, 1, 13);
                    data.weekly.expense.push({
                        week: rowVals[0],
                        adFee: safeNum(rowVals[1]),
                        entertainment: safeNum(rowVals[2]),
                        travel: safeNum(rowVals[3]),
                        vehicle: safeNum(rowVals[4]),
                        office: safeNum(rowVals[5]),
                        network: safeNum(rowVals[6]),
                        utilities: safeNum(rowVals[7]),
                        consumables: safeNum(rowVals[8]),
                        dormRent: safeNum(rowVals[9]),
                        living: safeNum(rowVals[10]),
                        other: safeNum(rowVals[11]),
                        total: safeNum(rowVals[12])
                    });
                }
            }

            // Sheet3 应收账款
            if (wb.SheetNames.includes('应收账款')) {
                const ws = wb.Sheets['应收账款'];

                // 业务员数据 Row6-19
                for (let r = 6; r <= 19; r++) {
                    const rowVals = getRowValues(ws, r, 1, 8);
                    if (rowVals[0]) {
                        data.ar.staff.push({
                            name: rowVals[0],
                            customerCount: safeNum(rowVals[1]),
                            totalUnsettled: safeNum(rowVals[2]),
                            d0_30: safeNum(rowVals[3]),
                            d31_90: safeNum(rowVals[4]),
                            d91_180: safeNum(rowVals[5]),
                            d180plus: safeNum(rowVals[6]),
                            ratio30plus: safeNum(rowVals[7])
                        });
                    }
                }

                // 账龄分布 Row23-27
                for (let r = 23; r <= 27; r++) {
                    const rowVals = getRowValues(ws, r, 1, 4);
                    if (rowVals[0]) {
                        data.ar.aging.push({
                            range: rowVals[0],
                            count: safeNum(rowVals[1]),
                            amount: safeNum(rowVals[2]),
                            ratio: safeNum(rowVals[3])
                        });
                    }
                }

                // TOP10客户 Row31-40
                for (let r = 31; r <= 40; r++) {
                    const rowVals = getRowValues(ws, r, 1, 8);
                    if (rowVals[0]) {
                        data.ar.top10.push({
                            rank: safeNum(rowVals[0]),
                            customer: rowVals[1],
                            salesman: rowVals[2],
                            amount: safeNum(rowVals[3]),
                            agingRange: rowVals[4],
                            docCount: safeNum(rowVals[5]),
                            earliestDate: rowVals[6],
                            latestDate: rowVals[7]
                        });
                    }
                }
            }

            // Sheet4 审批数据
            if (wb.SheetNames.includes('审批数据')) {
                const ws = wb.Sheets['审批数据'];

                data.approval.basic = {
                    period: getCellValue(ws, 5, 2),
                    totalCount: safeNum(getCellValue(ws, 6, 2)),
                    validCount: safeNum(getCellValue(ws, 7, 2)),
                    validAmount: safeNum(getCellValue(ws, 8, 2)),
                    approvedAmount: safeNum(getCellValue(ws, 9, 2)),
                    pendingAmount: safeNum(getCellValue(ws, 10, 2))
                };

                // 类别 Row14-18
                for (let r = 14; r <= 18; r++) {
                    const rowVals = getRowValues(ws, r, 1, 4);
                    if (rowVals[0]) {
                        data.approval.categories.push({
                            category: rowVals[0],
                            count: safeNum(rowVals[1]),
                            amount: safeNum(rowVals[2]),
                            ratio: safeNum(rowVals[3])
                        });
                    }
                }

                // 流程类型 Row21-24
                for (let r = 21; r <= 24; r++) {
                    const rowVals = getRowValues(ws, r, 1, 4);
                    if (rowVals[0]) {
                        data.approval.flowTypes.push({
                            type: rowVals[0],
                            count: safeNum(rowVals[1]),
                            amount: safeNum(rowVals[2]),
                            ratio: safeNum(rowVals[3])
                        });
                    }
                }

                // 费用科目 Row28-42
                for (let r = 28; r <= 42; r++) {
                    const rowVals = getRowValues(ws, r, 1, 4);
                    if (rowVals[0]) {
                        data.approval.expenseTypes.push({
                            item: rowVals[0],
                            count: safeNum(rowVals[1]),
                            amount: safeNum(rowVals[2]),
                            ratio: safeNum(rowVals[3])
                        });
                    }
                }

                // TOP5申请人 Row46-50
                for (let r = 46; r <= 50; r++) {
                    const rowVals = getRowValues(ws, r, 1, 4);
                    if (rowVals[0]) {
                        data.approval.topApplicants.push({
                            rank: safeNum(rowVals[0]),
                            applicant: rowVals[1],
                            count: safeNum(rowVals[2]),
                            amount: safeNum(rowVals[3])
                        });
                    }
                }
            }

            // Sheet5 周报文本
            if (wb.SheetNames.includes('周报文本')) {
                const ws = wb.Sheets['周报文本'];

                data.weeklyReport.period = getCellValue(ws, 6, 2);
                data.weeklyReport.weekNo = getCellValue(ws, 7, 2);

                for (let r = 8; r <= 14; r++) {
                    const val = getCellValue(ws, r, 2);
                    if (val) data.weeklyReport.completed.push(val);
                }

                for (let r = 15; r <= 19; r++) {
                    const val = getCellValue(ws, r, 2);
                    if (val) data.weeklyReport.nextWeek.push(val);
                }

                data.weeklyReport.special = getCellValue(ws, 20, 2);
            }

            return data;
        }

        function calculateMetrics(data) {
            const metrics = {
                totalSales: 0,
                salesTarget: 0,
                salesRate: 0,
                totalReturn: 0,
                returnRate: 0,
                unsettledTotal: 0,
                unsettledTarget: 0,
                marginRate: 0,
                budgetMarginRate: 0,
                weeklyChartData: []
            };

            // 计算销售额和目标
            data.budget.income.forEach(item => {
                if (item.item && item.item.includes('合计')) {
                    metrics.salesTarget = item.amount;
                }
            });

            data.weekly.sales.forEach(w => {
                if (w.totalSales > 0) metrics.totalSales += w.totalSales;
                if (w.totalReturn > 0) metrics.totalReturn += w.totalReturn;
            });

            if (metrics.totalSales > 0 && metrics.salesTarget > 0) {
                metrics.salesRate = Math.min(metrics.totalSales / metrics.salesTarget, 1.5);
            }

            if (metrics.totalSales > 0) {
                metrics.returnRate = metrics.totalReturn / metrics.totalSales;
            }

            // 应收余额
            data.ar.staff.forEach(s => {
                metrics.unsettledTotal += s.totalUnsettled;
            });

            const arTarget = data.budget.income.find(i => i.item && i.item.includes('应收'));
            if (arTarget) metrics.unsettledTarget = arTarget.amount;

            // 毛利率
            let totalCost = 0;
            data.weekly.cost.forEach(w => {
                if (w.total > 0) totalCost += w.total;
            });

            if (metrics.totalSales > 0) {
                metrics.marginRate = (metrics.totalSales - totalCost) / metrics.totalSales;
            }

            // 预算毛利率
            const mainCost = data.budget.cost.find(c => c.item && c.item.includes('成本'));
            if (mainCost && metrics.salesTarget > 0) {
                metrics.budgetMarginRate = (metrics.salesTarget - mainCost.amount) / metrics.salesTarget;
            }

            // 周度图表数据
            metrics.weeklyChartData = data.weekly.sales.filter(w => 
                w.totalSales > 0 || w.totalReturn > 0
            );

            return metrics;
        }

        function detectWarnings(data, metrics) {
            const warnings = [];

            // 业务员30天以上占比>30%
            data.ar.staff.forEach(s => {
                if (s.ratio30plus > 0.3) {
                    warnings.push({
                        level: 'yellow',
                        icon: '🟡',
                        title: '业务员应收预警',
                        desc: `${s.name} 30天以上占比 ${fmtRate(s.ratio30plus)}，超过30%阈值`
                    });
                }
            });

            // 周环比降幅>20%
            for (let i = 1; i < metrics.weeklyChartData.length; i++) {
                const curr = metrics.weeklyChartData[i];
                const prev = metrics.weeklyChartData[i - 1];
                if (prev.totalSales > 0) {
                    const dropRate = (prev.totalSales - curr.totalSales) / prev.totalSales;
                    if (dropRate > 0.2) {
                        warnings.push({
                            level: 'red',
                            icon: '🔴',
                            title: '销售额周环比下降',
                            desc: `${curr.week || 'W'+(i+1)} 销售额环比下降 ${fmtRate(dropRate)}`
                        });
                    }
                }
            }

            // 费用单项达成>预算100%
            data.budget.expense.forEach((exp, idx) => {
                if (exp.amount > 0) {
                    const weeklyExp = data.weekly.expense.find(w => w.week && w.total > 0);
                    if (weeklyExp) {
                        const weeklyItem = idx === 0 ? weeklyExp.adFee :
                            idx === 1 ? weeklyExp.entertainment :
                            idx === 2 ? weeklyExp.travel :
                            idx === 3 ? weeklyExp.vehicle :
                            idx === 4 ? weeklyExp.office :
                            idx === 5 ? weeklyExp.network :
                            idx === 6 ? weeklyExp.utilities :
                            idx === 7 ? weeklyExp.consumables :
                            idx === 8 ? weeklyExp.dormRent :
                            idx === 9 ? weeklyExp.living : weeklyExp.other;
                        
                        if (weeklyItem && weeklyItem > exp.amount) {
                            warnings.push({
                                level: 'yellow',
                                icon: '🟡',
                                title: '费用超预算',
                                desc: `${exp.item} 已使用 ${fmt(weeklyItem)}，超过预算 ${fmt(exp.amount)}`
                            });
                        }
                    }
                }
            });

            // 应收180天以上
            const overdue180 = data.ar.aging.find(a => a.range && a.range.includes('180天以上'));
            if (overdue180 && overdue180.amount > 0) {
                warnings.push({
                    level: 'yellow',
                    icon: '🟡',
                    title: '长期应收账款',
                    desc: `180天以上应收账款 ${fmt(overdue180.amount)} 元，存在回收风险`
                });
            }

            return warnings;
        }

        function renderReport(data) {
            const metrics = calculateMetrics(data);
            const warnings = detectWarnings(data, metrics);

            document.getElementById('reportTitle').textContent = 
                `${data.basic.company || '中合五金'} 经营周报`;
            
            document.getElementById('reportInfo').innerHTML = `
                <span>📅 ${data.basic.year}年${data.basic.month}月</span>
                <span>👤 ${data.basic.reporter}</span>
                <span>🏢 ${data.basic.dept}</span>
            `;

            let html = '';

            // 区块1: 经营总览
            html += `
            <div class="card">
                <div class="card-title">📊 经营总览</div>
                <div class="grid-4">
                    <div class="stat-card">
                        <div class="stat-label">总销售额</div>
                        <div class="stat-value">${fmt(metrics.totalSales)}</div>
                        <div class="stat-sub">目标: <strong>${fmt(metrics.salesTarget)}</strong></div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${Math.min(metrics.salesRate * 100, 100)}%"></div>
                        </div>
                        <div class="stat-sub" style="margin-top:8px">达成率: <strong>${fmtRate(metrics.salesRate)}</strong></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">应收余额</div>
                        <div class="stat-value">${fmt(metrics.unsettledTotal)}</div>
                        <div class="stat-sub">控制目标: <strong>${fmt(metrics.unsettledTarget)}</strong></div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${metrics.unsettledTarget > 0 ? Math.min((metrics.unsettledTotal/metrics.unsettledTarget)*100, 100) : 0}%"></div>
                        </div>
                        <div class="stat-sub" style="margin-top:8px">
                            <span class="rate-badge ${metrics.unsettledTotal <= metrics.unsettledTarget ? 'rate-high' : 'rate-red'}">
                                ${metrics.unsettledTotal <= metrics.unsettledTarget ? '✓ 达标' : '⚠ 超标'}
                            </span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">回款率</div>
                        <div class="stat-value">${fmtRate(metrics.returnRate)}</div>
                        <div class="stat-sub">目标: <strong>≥80%</strong></div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${Math.min(metrics.returnRate * 100, 100)}%"></div>
                        </div>
                        <div class="stat-sub" style="margin-top:8px">
                            <span class="rate-badge ${metrics.returnRate >= 0.8 ? 'rate-high' : metrics.returnRate >= 0.5 ? 'rate-mid' : 'rate-low'}">
                                ${metrics.returnRate >= 0.8 ? '✓ 达标' : metrics.returnRate >= 0.5 ? '⚠ 预警' : '✗ 不达标'}
                            </span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">门店毛利率</div>
                        <div class="stat-value">${fmtRate(metrics.marginRate)}</div>
                        <div class="stat-sub">预算毛利率: <strong>${fmtRate(metrics.budgetMarginRate)}</strong></div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${metrics.budgetMarginRate > 0 ? Math.min((metrics.marginRate/metrics.budgetMarginRate)*100, 100) : 0}%"></div>
                        </div>
                        <div class="stat-sub" style="margin-top:8px">
                            <span class="rate-badge ${metrics.marginRate >= metrics.budgetMarginRate ? 'rate-high' : 'rate-mid'}">
                                ${metrics.marginRate >= metrics.budgetMarginRate ? '✓ 达标' : '⚠ 偏低'}
                            </span>
                        </div>
                    </div>
                </div>
            </div>`;

            // 区块2: 销售达成
            html += `
            <div class="card">
                <div class="card-title">💰 销售达成</div>
                <table>
                    <thead>
                        <tr>
                            <th>板块</th>
                            <th class="text-right">月目标</th>
                            <th class="text-right">累计达成</th>
                            <th class="text-center">达成率</th>
                            <th>进度</th>
                        </tr>
                    </thead>
                    <tbody>`;

            const salesItems = [
                { name: 'B端销售', key: 'bSales' },
                { name: 'C端销售', key: 'cSales' },
                { name: '刘义虎', key: 'lyhSales' }
            ];

            let totalTarget = 0, totalAchieved = 0;
            salesItems.forEach(item => {
                const budget = data.budget.income.find(i => i.item && i.item.includes(item.name.replace('端销售', '')));
                const target = budget ? budget.amount : 0;
                const achieved = data.weekly.sales.reduce((sum, w) => sum + w[item.key], 0);
                totalTarget += target;
                totalAchieved += achieved;
                const rate = target > 0 ? achieved / target : 0;
                const color = rate >= 1 ? 'bar-green' : rate >= 0.7 ? 'bar-yellow' : 'bar-red';
                html += `
                        <tr class="table-row">
                            <td><span class="color-bar ${color}" style="height:20px;margin-right:10px"></span>${item.name}</td>
                            <td class="text-right">${fmt(target)}</td>
                            <td class="text-right">${fmt(achieved)}</td>
                            <td class="text-center">
                                <span class="rate-badge ${rate >= 1 ? 'rate-high' : rate >= 0.7 ? 'rate-mid' : 'rate-low'}">${fmtRate(rate)}</span>
                            </td>
                            <td><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(rate*100,100)}%"></div></div></td>
                        </tr>`;
            });

            const totalRate = totalTarget > 0 ? totalAchieved / totalTarget : 0;
            html += `
                        <tr style="background:rgba(14,165,233,0.1);font-weight:600">
                            <td><span class="color-bar bar-blue" style="height:20px;margin-right:10px"></span>合计</td>
                            <td class="text-right">${fmt(totalTarget)}</td>
                            <td class="text-right">${fmt(totalAchieved)}</td>
                            <td class="text-center">
                                <span class="rate-badge ${totalRate >= 1 ? 'rate-high' : totalRate >= 0.7 ? 'rate-mid' : 'rate-low'}">${fmtRate(totalRate)}</span>
                            </td>
                            <td><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(totalRate*100,100)}%"></div></div></td>
                        </tr>
                    </tbody>
                </table>
            </div>`;

            // 区块3: 周度趋势
            if (metrics.weeklyChartData.length > 0) {
                html += `
            <div class="card">
                <div class="card-title">📈 周度趋势</div>
                <div class="chart-container">
                    <canvas id="weeklyChart"></canvas>
                </div>
            </div>`;
            }

            // 区块4: 应收账款
            html += `
            <div class="card">
                <div class="card-title">💳 应收账款</div>
                <div class="two-col">
                    <div>
                        <table class="mini-table">
                            <thead>
                                <tr>
                                    <th>业务员</th>
                                    <th class="text-right">未结算</th>
                                    <th class="text-right">0-30天</th>
                                    <th class="text-right">31-90天</th>
                                    <th class="text-right">91-180天</th>
                                    <th class="text-right">180天+</th>
                                    <th class="text-center">占比</th>
                                </tr>
                            </thead>
                            <tbody>`;

            const totalUnsettled = data.ar.staff.reduce((sum, s) => sum + s.totalUnsettled, 0);
            data.ar.staff.forEach(s => {
                const ratio = totalUnsettled > 0 ? s.totalUnsettled / totalUnsettled : 0;
                const ratio30plus = s.d31_90 + s.d91_180 + s.d180plus;
                const barClass = ratio30plus > s.totalUnsettled * 0.3 ? 'bar-red' : ratio30plus > s.totalUnsettled * 0.15 ? 'bar-yellow' : 'bar-green';
                html += `
                                <tr class="table-row">
                                    <td><span class="color-bar ${barClass}" style="height:16px;margin-right:8px"></span>${s.name}</td>
                                    <td class="text-right">${fmt(s.totalUnsettled)}</td>
                                    <td class="text-right">${fmt(s.d0_30)}</td>
                                    <td class="text-right">${fmt(s.d31_90)}</td>
                                    <td class="text-right">${fmt(s.d91_180)}</td>
                                    <td class="text-right">${fmt(s.d180plus)}</td>
                                    <td class="text-center"><span class="rate-badge ${ratio30plus > s.totalUnsettled * 0.3 ? 'rate-low' : 'rate-high'}">${fmtRate(ratio)}</span></td>
                                </tr>`;
            });
            html += `
                            </tbody>
                        </table>
                    </div>
                    <div>
                        <div style="margin-bottom:20px">
                            <div style="font-size:14px;color:#94a3b8;margin-bottom:12px">账龄分布</div>
                            <div class="chart-container" style="height:200px">
                                <canvas id="agingChart"></canvas>
                            </div>
                        </div>
                        <div>
                            <div style="font-size:14px;color:#94a3b8;margin-bottom:12px">TOP5客户</div>`;
            
            const top5 = data.ar.top10.slice(0, 5);
            top5.forEach((c, i) => {
                const barClass = c.agingRange && c.agingRange.includes('180') ? 'bar-red' : 
                                 c.agingRange && c.agingRange.includes('91') ? 'bar-yellow' : 'bar-green';
                html += `
                            <div style="background:rgba(30,58,138,0.2);padding:10px 12px;border-radius:8px;margin-bottom:8px">
                                <div style="display:flex;justify-content:space-between;align-items:center">
                                    <div style="display:flex;align-items:center;gap:8px">
                                        <span class="color-bar ${barClass}" style="height:16px"></span>
                                        <span style="font-weight:600">${c.customer}</span>
                                    </div>
                                    <span style="color:#38bdf8;font-weight:600">${fmt(c.amount)}</span>
                                </div>
                                <div style="font-size:12px;color:#64748b;margin-top:4px">${c.salesman} · ${c.agingRange}</div>
                            </div>`;
            });
            html += `
                        </div>
                    </div>
                </div>
            </div>`;

            // 区块5: 成本费用与审批
            html += `
            <div class="card">
                <div class="card-title">💼 成本费用与审批</div>
                <div class="two-col">
                    <div>
                        <div style="margin-bottom:20px">
                            <div style="font-size:14px;color:#94a3b8;margin-bottom:12px">成本结构</div>
                            <div class="chart-container" style="height:200px">
                                <canvas id="costChart"></canvas>
                            </div>
                        </div>
                        <div>
                            <div style="font-size:14px;color:#94a3b8;margin-bottom:12px">费用构成TOP10</div>
                            <div class="chart-container" style="height:250px">
                                <canvas id="expenseChart"></canvas>
                            </div>
                        </div>
                    </div>
                    <div>
                        <div style="font-size:14px;color:#94a3b8;margin-bottom:12px">审批汇总</div>
                        <div class="info-grid" style="margin-bottom:20px">
                            <div class="info-item">
                                <div class="info-item-label">统计期间</div>
                                <div class="info-item-value">${data.approval.basic.period || '-'}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-item-label">总笔数</div>
                                <div class="info-item-value">${data.approval.basic.totalCount}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-item-label">有效金额</div>
                                <div class="info-item-value">${fmt(data.approval.basic.validAmount)}</div>
                            </div>
                        </div>
                        <div style="font-size:14px;color:#94a3b8;margin-bottom:12px">流程类型分布</div>
                        <table class="mini-table">
                            <thead>
                                <tr>
                                    <th>流程类型</th>
                                    <th class="text-right">笔数</th>
                                    <th class="text-right">金额</th>
                                    <th class="text-center">占比</th>
                                </tr>
                            </thead>
                            <tbody>`;
            
            data.approval.flowTypes.forEach(f => {
                html += `
                                <tr>
                                    <td>${f.type}</td>
                                    <td class="text-right">${f.count}</td>
                                    <td class="text-right">${fmt(f.amount)}</td>
                                    <td class="text-center">${fmtRate(f.ratio)}</td>
                                </tr>`;
            });
            html += `
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>`;

            // 区块6: 上周完成
            if (data.weeklyReport.completed.length > 0) {
                html += `
            <div class="card">
                <div class="card-title">✅ 上周完成事项</div>`;
                data.weeklyReport.completed.forEach(item => {
                    html += `
                <div class="list-item">
                    <div class="list-dot dot-green"></div>
                    <div>${item}</div>
                </div>`;
                });
                html += `</div>`;
            }

            // 区块7: 下周重点
            if (data.weeklyReport.nextWeek.length > 0) {
                html += `
            <div class="card">
                <div class="card-title">🎯 下周重点事项</div>`;
                data.weeklyReport.nextWeek.forEach(item => {
                    html += `
                <div class="list-item">
                    <div class="list-dot dot-blue"></div>
                    <div>${item}</div>
                </div>`;
                });
                html += `</div>`;
            }

            // 区块8: 风险预警
            if (warnings.length > 0) {
                html += `
            <div class="card">
                <div class="card-title">⚠️ 风险预警</div>`;
                warnings.forEach(w => {
                    html += `
                <div class="warning-card ${w.level === 'yellow' ? 'yellow' : ''}">
                    <div class="warning-icon">${w.icon}</div>
                    <div class="warning-text">
                        <div class="warning-title">${w.title}</div>
                        <div class="warning-desc">${w.desc}</div>
                    </div>
                </div>`;
                });
                html += `</div>`;
            }

            document.getElementById('reportContent').innerHTML = html;

            // 渲染图表
            renderCharts(data, metrics);
        }

        function renderCharts(data, metrics) {
            // 周度趋势图
            const weeklyCtx = document.getElementById('weeklyChart');
            if (weeklyCtx) {
                const labels = metrics.weeklyChartData.map(w => w.week || w.dateRange);
                const salesData = metrics.weeklyChartData.map(w => w.totalSales);
                const returnData = metrics.weeklyChartData.map(w => w.totalReturn);

                new Chart(weeklyCtx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: '销售额',
                                data: salesData,
                                borderColor: '#0ea5e9',
                                backgroundColor: 'rgba(14, 165, 233, 0.1)',
                                fill: true,
                                tension: 0.4
                            },
                            {
                                label: '回款额',
                                data: returnData,
                                borderColor: '#10b981',
                                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                                fill: true,
                                tension: 0.4
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: { color: '#94a3b8' }
                            }
                        },
                        scales: {
                            x: {
                                grid: { color: 'rgba(148, 163, 184, 0.1)' },
                                ticks: { color: '#94a3b8' }
                            },
                            y: {
                                grid: { color: 'rgba(148, 163, 184, 0.1)' },
                                ticks: { color: '#94a3b8' }
                            }
                        }
                    }
                });
            }

            // 账龄分布饼图
            const agingCtx = document.getElementById('agingChart');
            if (agingCtx && data.ar.aging.length > 0) {
                new Chart(agingCtx, {
                    type: 'doughnut',
                    data: {
                        labels: data.ar.aging.map(a => a.range),
                        datasets: [{
                            data: data.ar.aging.map(a => a.amount),
                            backgroundColor: ['#10b981', '#f59e0b', '#ef4444', '#64748b']
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'right',
                                labels: { color: '#94a3b8', font: { size: 11 } }
                            }
                        }
                    }
                });
            }

            // 成本结构饼图
            const costCtx = document.getElementById('costChart');
            if (costCtx && data.approval.categories.length > 0) {
                new Chart(costCtx, {
                    type: 'doughnut',
                    data: {
                        labels: data.approval.categories.filter(c => c.category !== '合计').map(c => c.category),
                        datasets: [{
                            data: data.approval.categories.filter(c => c.category !== '合计').map(c => c.amount),
                            backgroundColor: ['#ef4444', '#f59e0b', '#0ea5e9', '#10b981']
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'right',
                                labels: { color: '#94a3b8', font: { size: 11 } }
                            }
                        }
                    }
                });
            }

            // 费用构成横向柱状图
            const expenseCtx = document.getElementById('expenseChart');
            if (expenseCtx && data.approval.expenseTypes.length > 0) {
                const top10 = data.approval.expenseTypes
                    .filter(e => e.amount > 0)
                    .sort((a, b) => b.amount - a.amount)
                    .slice(0, 10);

                new Chart(expenseCtx, {
                    type: 'bar',
                    data: {
                        labels: top10.map(e => e.item),
                        datasets: [{
                            data: top10.map(e => e.amount),
                            backgroundColor: 'rgba(14, 165, 233, 0.7)',
                            borderColor: '#0ea5e9',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            x: {
                                grid: { color: 'rgba(148, 163, 184, 0.1)' },
                                ticks: { color: '#94a3b8' }
                            },
                            y: {
                                grid: { display: false },
                                ticks: { color: '#94a3b8' }
                            }
                        }
                    }
                });
            }
        }
    })();
    </script>
</body>
</html>
