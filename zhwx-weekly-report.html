<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中合五金经营周报生成器 V5</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-start: #0a0e1a;
            --bg-end: #111827;
            --card-bg: rgba(30, 58, 138, 0.15);
            --card-border: rgba(56, 189, 248, 0.2);
            --primary: #38bdf8;
            --success: #4ade80;
            --danger: #f87171;
            --warning: #fbbf24;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 10px;
        }
        .header p { color: var(--text-muted); font-size: 0.9rem; }
        .toolbar {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #0ea5e9);
            color: #0a0e1a;
            font-weight: 600;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4); }
        .btn-secondary {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text);
        }
        .btn-secondary:hover { background: rgba(30, 58, 138, 0.3); }
        .file-input { display: none; }
        .file-label {
            padding: 12px 24px;
            background: var(--card-bg);
            border: 2px dashed var(--card-border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--primary);
        }
        .file-label:hover { background: rgba(30, 58, 138, 0.3); }
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 10px;
        }
        .tab-btn {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.95rem;
            border-radius: 6px 6px 0 0;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: var(--card-bg);
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }
        .tab-btn:hover:not(.active) { color: var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 1.1rem;
            color: var(--primary);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--card-border);
        }
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .kpi-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        .kpi-label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; }
        .kpi-value { font-size: 1.4rem; font-weight: 700; color: var(--text); }
        .kpi-value.success { color: var(--success); }
        .kpi-value.danger { color: var(--danger); }
        .kpi-value.warning { color: var(--warning); }
        .chart-container { position: relative; height: 300px; margin: 15px 0; }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .data-table th, .data-table td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid var(--card-border);
        }
        .data-table th { background: rgba(56, 189, 248, 0.1); color: var(--primary); font-weight: 600; }
        .data-table tr:hover { background: rgba(56, 189, 248, 0.05); }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 5px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        .progress-fill.warning { background: linear-gradient(90deg, var(--warning), #f59e0b); }
        .progress-fill.danger { background: linear-gradient(90deg, var(--danger), #dc2626); }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--card-border); }
        .info-label { color: var(--text-muted); }
        .info-value { font-weight: 600; }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state svg { width: 80px; height: 80px; margin-bottom: 20px; opacity: 0.5; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
        .badge-success { background: rgba(74, 222, 128, 0.2); color: var(--success); }
        .badge-danger { background: rgba(248, 113, 113, 0.2); color: var(--danger); }
        .badge-warning { background: rgba(251, 191, 36, 0.2); color: var(--warning); }
        .footer {
            text-align: center;
            padding: 30px 0;
            margin-top: 40px;
            border-top: 1px solid var(--card-border);
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { text-decoration: underline; }
        .summary-row { display: flex; gap: 20px; margin-top: 15px; }
        .summary-item { flex: 1; text-align: center; padding: 10px; background: rgba(56, 189, 248, 0.05); border-radius: 8px; }
        .summary-item .label { font-size: 0.85rem; color: var(--text-muted); }
        .summary-item .value { font-size: 1.2rem; font-weight: 700; color: var(--text); margin-top: 5px; }
        .text-right { text-align: right; }
        .text-left { text-align: left; }
        @media (max-width: 768px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.5rem; }
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <a href="report.html" class="back-link">← 返回报告列表</a>
    
    <div class="header">
        <h1>🏪 中合五金经营周报生成器 V5</h1>
        <p>基于实际模板 · 5 Sheet结构 · 6大模块</p>
    </div>

    <div class="toolbar">
        <input type="file" id="fileInput" class="file-input" accept=".xlsx,.xls">
        <label for="fileInput" class="file-label">📁 选择Excel文件</label>
        <button class="btn btn-primary" onclick="loadSampleData()">📊 加载示例数据</button>
    </div>

    <!-- Tab导航 -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('overview')">📈 经营总览</button>
        <button class="tab-btn" onclick="switchTab('budget')">📋 预算达成</button>
        <button class="tab-btn" onclick="switchTab('sales')">💰 销售分析</button>
        <button class="tab-btn" onclick="switchTab('receivable')">📑 应收账款</button>
        <button class="tab-btn" onclick="switchTab('cost')">📉 成本费用</button>
        <button class="tab-btn" onclick="switchTab('report')">📝 周报事项</button>
    </div>

    <!-- 经营总览 -->
    <div id="tab-overview" class="tab-content active">
        <div class="kpi-grid" id="kpi-overview"></div>
        <div class="grid-2">
            <div class="card">
                <div class="card-title">销售与回款趋势</div>
                <div class="chart-container"><canvas id="chartSalesTrend"></canvas></div>
            </div>
            <div class="card">
                <div class="card-title">月度目标进度</div>
                <div id="progressBars"></div>
            </div>
        </div>
    </div>

    <!-- 预算达成 -->
    <div id="tab-budget" class="tab-content">
        <div class="card">
            <div class="card-title">预算执行情况</div>
            <div class="kpi-grid" id="kpi-budget"></div>
            <table class="data-table" id="table-budget"></table>
        </div>
    </div>

    <!-- 销售分析 -->
    <div id="tab-sales" class="tab-content">
        <div class="grid-2">
            <div class="card">
                <div class="card-title">B/C端销售占比</div>
                <div class="chart-container"><canvas id="chartSalesPie"></canvas></div>
            </div>
            <div class="card">
                <div class="card-title">各渠道销售趋势</div>
                <div class="chart-container"><canvas id="chartSalesChannel"></canvas></div>
            </div>
        </div>
        <div class="card">
            <div class="card-title">周度销售明细</div>
            <table class="data-table" id="table-sales-weekly"></table>
        </div>
    </div>

    <!-- 应收账款 -->
    <div id="tab-receivable" class="tab-content">
        <div class="kpi-grid" id="kpi-receivable"></div>
        <div class="grid-2">
            <div class="card">
                <div class="card-title">账龄分布</div>
                <div class="chart-container"><canvas id="chartAging"></canvas></div>
                <table class="data-table" id="table-aging"></table>
            </div>
            <div class="card">
                <div class="card-title">业务员应收排名</div>
                <table class="data-table" id="table-salesman"></table>
            </div>
        </div>
        <div class="card">
            <div class="card-title">欠款TOP10客户</div>
            <table class="data-table" id="table-top10"></table>
        </div>
    </div>

    <!-- 成本费用 -->
    <div id="tab-cost" class="tab-content">
        <div class="kpi-grid" id="kpi-cost"></div>
        <div class="grid-2">
            <div class="card">
                <div class="card-title">成本费用构成</div>
                <div class="chart-container"><canvas id="chartCostPie"></canvas></div>
            </div>
            <div class="card">
                <div class="card-title">费用趋势</div>
                <div class="chart-container"><canvas id="chartCostTrend"></canvas></div>
            </div>
        </div>
        <div class="card">
            <div class="card-title">周度成本费用明细</div>
            <table class="data-table" id="table-cost-weekly"></table>
        </div>
        <div class="card">
            <div class="card-title">审批数据汇总</div>
            <div class="kpi-grid" id="kpi-approval"></div>
            <table class="data-table" id="table-approval"></table>
        </div>
    </div>

    <!-- 周报事项 -->
    <div id="tab-report" class="tab-content">
        <div class="card">
            <div class="card-title">周报内容</div>
            <div id="reportContent"></div>
        </div>
        <div class="card">
            <div class="card-title">审批摘要</div>
            <div id="approvalSummary"></div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 中台-财务工具箱 · 开发者：张洪杰，侵权必究</p>
        <p>数据全本地处理，安全可靠</p>
    </div>

    <script>
        // 全局变量
        let workbookData = {};
        let chartInstances = {};
        let reportMeta = { year: 2026, month: 5, company: '中合五金', reporter: '张洪杰', dept: '财务部', staff: 29 };

        // 格式化金额
        function fmtMoney(val) {
            if (val === null || val === undefined || val === '') return '-';
            const n = parseFloat(val);
            if (isNaN(n)) return val;
            return n.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // 格式化百分比
        function fmtPct(val, mul = 1) {
            if (val === null || val === undefined || val === '') return '-';
            const n = parseFloat(val);
            if (isNaN(n)) {
                if (typeof val === 'string' && val.includes('%')) return val;
                return val;
            }
            return (n * mul).toFixed(1) + '%';
        }

        // Tab切换
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tabId}')"]`).classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
            resizeCharts();
        }

        // 图表创建封装
        function createChart(canvasId, type, data, options = {}) {
            const ctx = document.getElementById(canvasId);
            if (!ctx) return null;
            if (chartInstances[canvasId]) {
                chartInstances[canvasId].destroy();
            }
            const defaults = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: '#f1f5f9' } }
                }
            };
            const merged = { ...defaults, ...options };
            chartInstances[canvasId] = new Chart(ctx, { type, data, ...merged });
            return chartInstances[canvasId];
        }

        // 图表重绘
        function resizeCharts() {
            Object.values(chartInstances).forEach(chart => {
                if (chart) chart.resize();
            });
        }

        // 解析Sheet数据
        function getSheetData(sheet) {
            if (!sheet || !sheet['!ref']) return [];
            const range = XLSX.utils.decode_range(sheet['!ref']);
            const data = [];
            for (let r = range.s.r; r <= range.e.r; r++) {
                const row = [];
                for (let c = range.s.c; c <= range.e.c; c++) {
                    const cell = sheet[XLSX.utils.encode_cell({ r, c })];
                    row.push(cell ? cell.v : '');
                }
                data.push(row);
            }
            return data;
        }

        // 获取列值（0索引）
        function getVal(row, idx) {
            return row[idx] !== undefined ? row[idx] : '';
        }

        // 解析月度预算Sheet
        function parseSheet1(data) {
            const result = { base: {}, income: {}, cost: {}, expense: {} };
            
            // 基本信息
            result.base.year = getVal(data[4], 1);
            result.base.month = getVal(data[5], 1);
            result.base.company = getVal(data[6], 1);
            result.base.reporter = getVal(data[7], 1);
            result.base.dept = getVal(data[8], 1);
            result.base.staff = getVal(data[9], 1);
            
            // 累计数据
            result.base.totalSales = getVal(data[11], 1);
            result.base.totalCollected = getVal(data[12], 1);
            
            // 收入预算 (Row15开始，科目|金额)
            let i = 14;
            while (i < data.length) {
                const label = getVal(data[i], 0);
                const val = getVal(data[i], 1);
                if (label === 'B端销售') result.income.b = val;
                else if (label === 'C端销售') result.income.c = val;
                else if (label === '刘义虎') result.income.lyh = val;
                else if (label === '合计') result.income.total = val;
                else if (label === '应收余额') result.income.arBalance = val;
                else if (label === '应收余额目标') result.income.arTarget = val;
                i++;
            }
            
            // 成本预算 (Row23开始)
            i = 22;
            while (i < data.length) {
                const label = getVal(data[i], 0);
                const val = getVal(data[i], 1);
                if (label === '主营业务成本') result.cost.main = val;
                else if (label === '物流费') result.cost.logistics = val;
                else if (label === '折旧') result.cost.depreciation = val;
                else if (label === '租金') result.cost.rent = val;
                else if (label === '人工') result.cost.labor = val;
                i++;
            }
            
            // 费用预算 (Row31开始)
            i = 30;
            while (i < data.length) {
                const label = getVal(data[i], 0);
                const val = getVal(data[i], 1);
                if (label === '业务招待费') result.expense.entertain = val;
                else if (label === '差旅费') result.expense.travel = val;
                else if (label === '车辆费') result.expense.vehicle = val;
                else if (label === '办公用品') result.expense.office = val;
                else if (label === '生活费') result.expense.living = val;
                else if (label === '宿舍费') result.expense.dorm = val;
                else if (label === '其他费用') result.expense.other = val;
                else if (label === '通讯费') result.expense.commu = val;
                else if (label === '水电费') result.expense.utility = val;
                i++;
            }
            
            return result;
        }

        // 解析周度数据Sheet
        function parseSheet2(data) {
            const result = { sales: [], cost: [], expense: [] };
            
            // 销售区 (Row5开始，周次|日期|B端|C端|刘义虎|总销售|总回款)
            let i = 4;
            while (i < data.length) {
                const week = getVal(data[i], 0);
                if (week && week.toString().match(/W\d+/)) {
                    result.sales.push({
                        week: week,
                        date: getVal(data[i], 1),
                        b: getVal(data[i], 2) || 0,
                        c: getVal(data[i], 3) || 0,
                        lyh: getVal(data[i], 4) || 0,
                        total: getVal(data[i], 5) || 0,
                        collected: getVal(data[i], 6) || 0
                    });
                } else if (week === '成本数据') {
                    break;
                }
                i++;
            }
            
            // 成本区 (Row15开始)
            i = 14;
            while (i < data.length) {
                const week = getVal(data[i], 0);
                if (week && week.toString().match(/W\d+/)) {
                    result.cost.push({
                        week: week,
                        main: getVal(data[i], 1) || 0,
                        logistics: getVal(data[i], 2) || 0,
                        depreciation: getVal(data[i], 3) || 0,
                        rent: getVal(data[i], 4) || 0,
                        labor: getVal(data[i], 5) || 0,
                        otherFixed: getVal(data[i], 6) || 0,
                        total: getVal(data[i], 7) || 0
                    });
                } else if (week === '费用数据') {
                    break;
                }
                i++;
            }
            
            // 费用区 (Row24开始 - 12列: 周次|业务招待费|维修维护费|差旅费|交通费|车辆使用费|办公费|服务费|福利费|通讯费|其它|合计)
            i = 23;
            while (i < data.length) {
                const week = getVal(data[i], 0);
                if (week && week.toString().match(/W\d+/)) {
                    result.expense.push({
                        week: week,
                        entertain: getVal(data[i], 1) || 0,
                        maintain: getVal(data[i], 2) || 0,
                        travel: getVal(data[i], 3) || 0,
                        transport: getVal(data[i], 4) || 0,
                        vehicle: getVal(data[i], 5) || 0,
                        office: getVal(data[i], 6) || 0,
                        service: getVal(data[i], 7) || 0,
                        welfare: getVal(data[i], 8) || 0,
                        commu: getVal(data[i], 9) || 0,
                        other: getVal(data[i], 10) || 0,
                        total: getVal(data[i], 11) || 0
                    });
                }
                i++;
            }
            
            return result;
        }

        // 解析应收账款Sheet
        function parseSheet3(data) {
            const result = { summary: {}, salesmen: [], aging: [], top10: [] };
            
            // 累计数据
            result.summary.totalSales = getVal(data[1], 1);
            result.summary.totalCollected = getVal(data[2], 1);
            
            // 业务员明细 (Row6开始)
            let i = 5;
            while (i < data.length) {
                const name = getVal(data[i], 0);
                if (!name || name === '业务员') { i++; continue; }
                if (name === '账龄分布') break;
                result.salesmen.push({
                    name: name,
                    clients: getVal(data[i], 1) || 0,
                    unsettled: getVal(data[i], 2) || 0,
                    d0_30: getVal(data[i], 3) || 0,
                    d31_90: getVal(data[i], 4) || 0,
                    d91_180: getVal(data[i], 5) || 0,
                    d180plus: getVal(data[i], 6) || 0,
                    ratio: getVal(data[i], 7) || '0%'
                });
                i++;
            }
            
            // 账龄分布 (Row24开始)
            i = 23;
            while (i < data.length) {
                const range = getVal(data[i], 0);
                if (!range || range === '区间') { i++; continue; }
                if (range === '欠款TOP10客户') break;
                result.aging.push({
                    range: range,
                    count: getVal(data[i], 1) || 0,
                    amount: getVal(data[i], 2) || 0,
                    ratio: getVal(data[i], 3) || '0%'
                });
                i++;
            }
            
            // TOP10客户 (Row32开始)
            i = 31;
            while (i < data.length) {
                const rank = getVal(data[i], 0);
                if (!rank || rank === '排名') { i++; continue; }
                result.top10.push({
                    rank: rank,
                    customer: getVal(data[i], 1),
                    salesman: getVal(data[i], 2),
                    amount: getVal(data[i], 3) || 0,
                    maxAge: getVal(data[i], 4),
                    docCount: getVal(data[i], 5) || 0,
                    earliest: getVal(data[i], 6),
                    latest: getVal(data[i], 7)
                });
                i++;
            }
            
            return result;
        }

        // 解析审批数据Sheet
        function parseSheet4(data) {
            const result = { base: {}, category: [], flowType: [], expenseDetail: [], topApplicant: [] };
            
            // 基本信息 (Row4开始)
            result.base.period = getVal(data[4], 1);
            result.base.totalCount = getVal(data[5], 1);
            result.base.validCount = getVal(data[6], 1);
            result.base.validAmount = getVal(data[7], 1);
            result.base.approvedAmount = getVal(data[8], 1);
            result.base.pendingAmount = getVal(data[9], 1);
            
            // 审批类别 (Row14开始)
            let i = 13;
            while (i < data.length) {
                const type = getVal(data[i], 0);
                if (!type || type === '类别') { i++; continue; }
                if (type === '流程类型') break;
                result.category.push({
                    type: type,
                    count: getVal(data[i], 1) || 0,
                    amount: getVal(data[i], 2) || 0,
                    ratio: getVal(data[i], 3) || 0
                });
                i++;
            }
            
            // 流程类型 (Row22开始)
            i = 21;
            while (i < data.length) {
                const type = getVal(data[i], 0);
                if (!type || type === '类型') { i++; continue; }
                if (type === '费用分类明细') break;
                result.flowType.push({
                    type: type,
                    count: getVal(data[i], 1) || 0,
                    amount: getVal(data[i], 2) || 0,
                    ratio: getVal(data[i], 3) || 0
                });
                i++;
            }
            
            // 费用分类明细 (Row29开始)
            i = 28;
            while (i < data.length) {
                const item = getVal(data[i], 0);
                if (!item || item === '科目') { i++; continue; }
                if (item === 'TOP10申请人') break;
                result.expenseDetail.push({
                    item: item,
                    count: getVal(data[i], 1) || 0,
                    amount: getVal(data[i], 2) || 0,
                    ratio: getVal(data[i], 3) || 0
                });
                i++;
            }
            
            // TOP10申请人 (Row47开始)
            i = 46;
            while (i < data.length) {
                const rank = getVal(data[i], 0);
                if (!rank || rank === '排名') { i++; continue; }
                result.topApplicant.push({
                    rank: rank,
                    name: getVal(data[i], 1),
                    count: getVal(data[i], 2) || 0,
                    amount: getVal(data[i], 3) || 0
                });
                i++;
            }
            
            return result;
        }

        // 解析周报文本Sheet
        function parseSheet5(data) {
            const result = { period: '', week: '', lastWeek: [], nextWeek: [], special: '' };
            
            result.period = getVal(data[4], 1);
            result.week = getVal(data[5], 1);
            
            // 上周完成
            for (let i = 6; i <= 12; i++) {
                const item = getVal(data[i], 1);
                if (item) result.lastWeek.push(item);
            }
            
            // 下周重点
            for (let i = 13; i <= 17; i++) {
                const item = getVal(data[i], 1);
                if (item) result.nextWeek.push(item);
            }
            
            // 特别说明
            result.special = getVal(data[18], 1) || '';
            
            return result;
        }

        // 计算汇总数据
        function calculateSummary(s1, s2, s3) {
            const summary = {};
            
            // 使用Sheet3的累计数据（优先）
            summary.totalSales = s3.summary.totalSales || s1.base.totalSales || 0;
            summary.totalCollected = s3.summary.totalCollected || s1.base.totalCollected || 0;
            summary.collectRate = summary.totalSales > 0 ? summary.totalCollected / summary.totalSales : 0;
            
            // 周度销售汇总
            summary.weeklySales = s2.sales.reduce((sum, w) => sum + (w.total || 0), 0);
            summary.weeklyCollected = s2.sales.reduce((sum, w) => sum + (w.collected || 0), 0);
            
            // 月度销售目标
            summary.salesBudget = s1.income.total || 6000000;
            summary.salesComplete = summary.weeklySales / summary.salesBudget;
            
            // 时间进度（假设本月）
            const now = new Date();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const dayOfMonth = now.getDate();
            summary.timeProgress = dayOfMonth / daysInMonth;
            
            // 预测月底
            summary.predictMonthEnd = summary.timeProgress > 0 ? summary.weeklySales / summary.timeProgress : 0;
            
            // 应收分析
            summary.arBalance = s1.income.arBalance || s3.summary.totalSales - s3.summary.totalCollected;
            summary.arTarget = s1.income.arTarget || 1800000;
            summary.arExceed = summary.arBalance - summary.arTarget;
            
            // 成本费用汇总
            summary.weeklyCost = s2.cost.reduce((sum, w) => sum + (w.total || 0), 0);
            summary.weeklyExpense = s2.expense.reduce((sum, w) => sum + (w.total || 0), 0);
            summary.costBudget = (s1.cost.main || 0) + (s1.cost.logistics || 0) + (s1.cost.depreciation || 0) + (s1.cost.rent || 0) + (s1.cost.labor || 0);
            summary.expenseBudget = Object.values(s1.expense).reduce((sum, v) => sum + (v || 0), 0);
            
            return summary;
        }

        // 主渲染函数
        function renderAllData() {
            const s1 = parseSheet1(workbookData['Sheet1'] || workbookData['月度预算'] || []);
            const s2 = parseSheet2(workbookData['Sheet2'] || workbookData['周度数据'] || []);
            const s3 = parseSheet3(workbookData['Sheet3'] || workbookData['应收账款'] || []);
            const s4 = parseSheet4(workbookData['Sheet4'] || workbookData['审批数据'] || []);
            const s5 = parseSheet5(workbookData['Sheet5'] || workbookData['周报文本'] || []);
            
            const summary = calculateSummary(s1, s2, s3);
            
            renderOverview(summary, s2);
            renderBudget(summary, s1, s2);
            renderSales(s1, s2);
            renderReceivable(summary, s3);
            renderCost(summary, s1, s2, s4);
            renderReport(s5, s4);
        }

        // 文件上传处理
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: 'array', cellDates: true });
                    
                    wb.SheetNames.forEach(name => {
                        const sheet = wb.Sheets[name];
                        workbookData[name] = getSheetData(sheet);
                    });
                    
                    renderAllData();
                    alert('数据加载成功！');
                } catch (err) {
                    alert('文件解析失败：' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        });
