<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>昆仑云ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0ea5e9',
                        'bg-dark': '#0f172a',
                        'bg-darker': '#020617',
                        glass: 'rgba(30,41,59,0.7)',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
            overflow: hidden;
            background: #020617;
        }
        
        /* 动态渐变壁纸 */
        .desktop-bg {
            background: linear-gradient(135deg, #020617 0%, #0f172a 40%, #1e3a5f 100%);
            position: relative;
        }
        
        .desktop-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 20% 40%, rgba(14, 165, 233, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 80% 20%, rgba(139, 92, 246, 0.1), transparent),
                radial-gradient(ellipse 50% 30% at 50% 80%, rgba(16, 185, 129, 0.08), transparent);
            animation: meshFlow 20s ease-in-out infinite;
        }
        
        @keyframes meshFlow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        
        /* 顶部菜单栏 */
        .menu-bar {
            height: 28px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        /* Dock 样式 */
        .dock-container {
            position: fixed;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }
        
        .dock {
            display: flex;
            align-items-end;
            gap: 4px;
            padding: 4px 8px;
            background: rgba(51, 51, 51, 0.5);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .dock-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: bottom center;
            will-change: transform, width, height;
        }
        
        .dock-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: width, height, font-size;
        }
        
        .dock-item:hover .dock-icon {
            transform: scale(1.15);
        }
        
        .dock-item.active .dock-icon {
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.3);
        }
        
        .dock-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: white;
            margin-top: 4px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .dock-item.active .dock-dot {
            opacity: 1;
        }
        
        .dock-separator {
            width: 1px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 4px;
            align-self: center;
        }
        
        /* 桌面图标 */
        .desktop-icon {
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .desktop-icon:hover {
            transform: scale(1.05);
        }
        
        .desktop-icon.selected {
            transform: scale(1.05);
        }
        
        .desktop-icon.selected .icon-wrapper {
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.5);
        }
        
        .icon-wrapper {
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        
        /* 窗口样式 */
        .window {
            position: fixed;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05);
            overflow: hidden;
            min-width: 600px;
            min-height: 400px;
        }
        
        .window.opening {
            animation: windowOpen 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .window.closing {
            animation: windowClose 0.2s ease-in forwards;
        }
        
        .window.minimizing {
            animation: windowMinimize 0.4s ease-in forwards;
        }
        
        .window.maximizing {
            animation: windowMaximize 0.3s ease-out forwards;
        }
        
        @keyframes windowOpen {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        @keyframes windowClose {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.85); opacity: 0; }
        }
        
        @keyframes windowMinimize {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.1) translateY(200px); opacity: 0; }
        }
        
        @keyframes windowMaximize {
            0% { border-radius: 12px; }
            100% { border-radius: 0; }
        }
        
        .window-titlebar {
            height: 36px;
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            display: flex;
            align-items: center;
            padding: 0 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: move;
        }
        
        .traffic-lights {
            display: flex;
            gap: 8px;
        }
        
        .traffic-light {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: transparent;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .traffic-light:hover {
            color: rgba(0, 0, 0, 0.7);
        }
        
        .traffic-light.close { background: #ff5f57; }
        .traffic-light.minimize { background: #febc2e; }
        .traffic-light.maximize { background: #28c840; }
        
        .window-content {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        
        .window-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .window-loading {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 1);
            z-index: 10;
        }
        
        .loading-spinner {
            font-size: 48px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 16px;
            height: 16px;
            cursor: se-resize;
            opacity: 0.3;
            transition: opacity 0.2s;
        }
        
        .resize-handle:hover {
            opacity: 0.6;
        }
        
        .resize-handle::before {
            content: '';
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 8px;
            height: 8px;
            border-right: 2px solid rgba(255,255,255,0.4);
            border-bottom: 2px solid rgba(255,255,255,0.4);
        }
        
        /* 右键菜单 */
        .context-menu {
            position: fixed;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            padding: 6px;
            z-index: 10000;
            min-width: 180px;
        }
        
        .context-menu-item {
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 13px;
            color: white;
            cursor: pointer;
            transition: background 0.15s;
        }
        
        .context-menu-item:hover {
            background: rgba(14, 165, 233, 0.2);
        }
        
        .context-menu-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 4px 0;
        }
        
        /* 关于弹窗 */
        .about-modal {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 10001;
        }
        
        .about-content {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: modalOpen 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes modalOpen {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .about-logo {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
        }
        
        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        /* 分类标签 */
        .category-label {
            color: rgba(148, 163, 184, 0.6);
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            .window {
                width: 100% !important;
                height: calc(100vh - 28px) !important;
                min-width: unset !important;
                min-height: unset !important;
                top: 28px !important;
                left: 0 !important;
                border-radius: 0 !important;
            }
            
            .dock {
                transform: scale(0.8);
            }
            
            .desktop-icons-container {
                display: none;
            }
        }
    </style>
</head>
<body class="desktop-bg">
    <!-- 顶部菜单栏 -->
    <div class="menu-bar fixed top-0 left-0 right-0 flex items-center justify-between px-4 z-50" id="menuBar">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-gradient-to-br from-primary to-purple-500"></div>
            <span class="text-[13px] font-semibold text-slate-200 cursor-pointer hover:text-white" onclick="showAbout()">昆仑云ERP</span>
        </div>
        <div class="flex items-center gap-4 text-xs text-slate-400">
            <span id="menuTime"></span>
        </div>
    </div>
    
    <!-- 桌面图标区域 -->
    <div class="desktop-icons-container fixed top-10 right-4 flex flex-col gap-6 z-10" id="desktopIcons">
        <!-- 动态生成 -->
    </div>
    
    <!-- 窗口容器 -->
    <div id="windowsContainer"></div>
    
    <!-- Dock -->
    <div class="dock-container" id="dockContainer">
        <div class="dock" id="dock"></div>
    </div>
    
    <!-- 右键菜单 -->
    <div class="context-menu hidden" id="contextMenu">
        <div class="context-menu-item" onclick="refreshDesktop()">刷新桌面</div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" onclick="showAbout()">关于昆仑云ERP</div>
    </div>
    
    <!-- 右键菜单（图标） -->
    <div class="context-menu hidden" id="iconContextMenu">
        <div class="context-menu-item" onclick="openFromContextMenu()">打开</div>
    </div>
    
    <!-- 关于弹窗 -->
    <div class="about-modal hidden" id="aboutModal">
        <div class="about-content">
            <div class="about-logo">☁️</div>
            <h2 class="text-2xl font-bold text-white mb-2">昆仑云ERP</h2>
            <p class="text-slate-400 text-sm mb-4">版本 v0.1.0-alpha</p>
            <p class="text-slate-500 text-xs mb-6">开发者：张洪杰</p>
            <button onclick="closeAbout()" class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-primary/80 transition-colors">
                好
            </button>
        </div>
    </div>

    <script>
        // 应用配置
        const categories = [
            {
                name: '非税工具',
                apps: [
                    { id: 'payment-tracker', name: '付款跟踪', icon: '💰', url: 'payment-tracker.html', color: '#f59e0b' },
                    { id: 'purchase-cost', name: '采购成本', icon: '🧮', url: 'purchase-cost-calculator.html', color: '#8b5cf6' },
                    { id: 'receivable', name: '应收账款', icon: '📊', url: 'https://ahongfab.github.io/xzzh-yingshou/', color: '#3b82f6' },
                    { id: 'voucher-match', name: '凭证匹配', icon: '📋', url: 'https://ahongfab.github.io/xzzh-voucher-match/', color: '#06b6d4' },
                    { id: 'qw-approval', name: '企微审批', icon: '📈', url: 'qw-approval-report.html', color: '#10b981' },
                    { id: 'statement', name: '对账单', icon: '🧾', url: 'https://ahongfab.github.io/xzzh-duizhang/', color: '#ec4899' }
                ]
            },
            {
                name: '财税工具',
                apps: [
                    { id: 'tax', name: '财税工具', icon: '🔧', url: 'tax.html', color: '#ef4444' }
                ]
            },
            {
                name: '汇报工具',
                apps: [
                    { id: 'report', name: '汇报工具', icon: '📝', url: 'report.html', color: '#f97316' }
                ]
            }
        ];

        // 状态管理
        const state = {
            windows: {},
            activeWindow: null,
            selectedIcon: null,
            contextMenuTarget: null,
            isDragging: false,
            isResizing: false,
            dragOffset: { x: 0, y: 0 },
            resizeWindow: null
        };

        // 所有应用列表
        let allApps = [];
        categories.forEach(cat => {
            allApps = allApps.concat(cat.apps);
        });

        // 更新时间
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('menuTime').textContent = timeStr;
        }
        updateTime();
        setInterval(updateTime, 1000);

        // 初始化桌面图标
        function initDesktopIcons() {
            const container = document.getElementById('desktopIcons');
            container.innerHTML = '';
            
            categories.forEach((category, catIndex) => {
                const catDiv = document.createElement('div');
                catDiv.className = 'flex flex-col gap-1';
                
                const label = document.createElement('div');
                label.className = 'category-label';
                label.textContent = category.name;
                catDiv.appendChild(label);
                
                category.apps.forEach(app => {
                    const iconDiv = document.createElement('div');
                    iconDiv.className = 'desktop-icon flex flex-col items-center p-2';
                    iconDiv.dataset.id = app.id;
                    
                    const iconWrapper = document.createElement('div');
                    iconWrapper.className = 'icon-wrapper w-16 h-16 mb-1';
                    iconWrapper.style.background = `linear-gradient(135deg, ${app.color}, ${adjustColor(app.color, -30)})`;
                    iconWrapper.innerHTML = `<span class="text-3xl">${app.icon}</span>`;
                    
                    const name = document.createElement('span');
                    name.className = 'text-white text-[11px] text-center';
                    name.textContent = app.name;
                    
                    iconDiv.appendChild(iconWrapper);
                    iconDiv.appendChild(name);
                    
                    iconDiv.addEventListener('click', (e) => {
                        e.stopPropagation();
                        selectIcon(app.id);
                    });
                    
                    iconDiv.addEventListener('dblclick', () => {
                        openWindow(app);
                    });
                    
                    iconDiv.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        showIconContextMenu(e, app);
                    });
                    
                    catDiv.appendChild(iconDiv);
                });
                
                container.appendChild(catDiv);
            });
        }

        // 颜色调整
        function adjustColor(color, amount) {
            const hex = color.replace('#', '');
            const r = Math.max(0, Math.min(255, parseInt(hex.substr(0, 2), 16) + amount));
            const g = Math.max(0, Math.min(255, parseInt(hex.substr(2, 2), 16) + amount));
            const b = Math.max(0, Math.min(255, parseInt(hex.substr(4, 2), 16) + amount));
            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
        }

        // 初始化 Dock
        function initDock() {
            const dock = document.getElementById('dock');
            dock.innerHTML = '';
            
            allApps.forEach((app, index) => {
                if (index === 6) {
                    const sep = document.createElement('div');
                    sep.className = 'dock-separator';
                    dock.appendChild(sep);
                }
                
                const item = document.createElement('div');
                item.className = 'dock-item';
                item.dataset.id = app.id;
                
                const icon = document.createElement('div');
                icon.className = 'dock-icon';
                icon.style.background = `linear-gradient(135deg, ${app.color}, ${adjustColor(app.color, -30)})`;
                icon.textContent = app.icon;
                
                const dot = document.createElement('div');
                dot.className = 'dock-dot';
                
                item.appendChild(icon);
                item.appendChild(dot);
                
                item.addEventListener('click', () => handleDockClick(app));
                item.addEventListener('mouseenter', () => handleDockHover(index));
                item.addEventListener('mouseleave', () => resetDockIcons());
                
                dock.appendChild(item);
            });
        }

        // Dock 点击处理
        function handleDockClick(app) {
            if (!state.windows[app.id]) {
                openWindow(app);
            } else if (state.activeWindow === app.id) {
                minimizeWindow(app.id);
            } else {
                focusWindow(app.id);
            }
        }

        // Dock Magnification 效果
        function handleDockHover(hoveredIndex) {
            const items = document.querySelectorAll('.dock-item');
            items.forEach((item, index) => {
                const icon = item.querySelector('.dock-icon');
                const distance = Math.abs(index - hoveredIndex);
                
                if (distance === 0) {
                    icon.style.width = '68px';
                    icon.style.height = '68px';
                    icon.style.fontSize = '32px';
                    icon.style.borderRadius = '16px';
                } else if (distance === 1) {
                    icon.style.width = '60px';
                    icon.style.height = '60px';
                    icon.style.fontSize = '28px';
                    icon.style.borderRadius = '14px';
                } else {
                    icon.style.width = '48px';
                    icon.style.height = '48px';
                    icon.style.fontSize = '24px';
                    icon.style.borderRadius = '12px';
                }
            });
        }

        function resetDockIcons() {
            const items = document.querySelectorAll('.dock-item');
            items.forEach(item => {
                const icon = item.querySelector('.dock-icon');
                icon.style.width = '48px';
                icon.style.height = '48px';
                icon.style.fontSize = '24px';
                icon.style.borderRadius = '12px';
            });
        }

        // 选择图标
        function selectIcon(id) {
            document.querySelectorAll('.desktop-icon').forEach(icon => {
                icon.classList.remove('selected');
            });
            
            if (state.selectedIcon === id) {
                state.selectedIcon = null;
            } else {
                state.selectedIcon = id;
                document.querySelector(`.desktop-icon[data-id="${id}"]`)?.classList.add('selected');
            }
        }

        // 打开窗口
        function openWindow(app) {
            if (state.windows[app.id]) {
                focusWindow(app.id);
                return;
            }
            
            const container = document.getElementById('windowsContainer');
            const win = document.createElement('div');
            win.className = 'window';
            win.id = `window-${app.id}`;
            win.style.width = '920px';
            win.style.height = '620px';
            win.style.left = `${100 + Object.keys(state.windows).length * 30}px`;
            win.style.top = `${50 + Object.keys(state.windows).length * 30}px`;
            win.style.zIndex = 1000 + Object.keys(state.windows).length;
            
            win.innerHTML = `
                <div class="window-titlebar" onmousedown="startDrag(event, '${app.id}')">
                    <div class="traffic-lights">
                        <div class="traffic-light close" onclick="closeWindow('${app.id}')">×</div>
                        <div class="traffic-light minimize" onclick="minimizeWindow('${app.id}')">−</div>
                        <div class="traffic-light maximize" onclick="maximizeWindow('${app.id}')">↗</div>
                    </div>
                    <div class="flex-1 text-center text-[13px] text-slate-200 font-medium">${app.name}</div>
                </div>
                <div class="window-content">
                    <div class="window-loading" id="loading-${app.id}">
                        <div class="loading-spinner">${app.icon}</div>
                        <div class="text-slate-400 mt-4 text-sm">正在启动...</div>
                    </div>
                    <iframe 
                        id="iframe-${app.id}"
                        class="window-iframe"
                        src="${app.url}"
                        sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
                        onload="hideLoading('${app.id}')"
                    ></iframe>
                </div>
                <div class="resize-handle" onmousedown="startResize(event, '${app.id}')"></div>
            `;
            
            container.appendChild(win);
            
            // 添加入场动画
            win.classList.add('opening');
            setTimeout(() => {
                win.classList.remove('opening');
            }, 350);
            
            state.windows[app.id] = {
                element: win,
                minimized: false,
                maximized: false,
                originalSize: { width: '920px', height: '620px' },
                originalPosition: { left: win.style.left, top: win.style.top }
            };
            
            // 点击窗口聚焦
            win.addEventListener('mousedown', () => focusWindow(app.id));
            
            // 更新 Dock 状态
            updateDockState(app.id, true);
            
            state.activeWindow = app.id;
        }

        // 隐藏加载
        function hideLoading(id) {
            const loading = document.getElementById(`loading-${id}`);
            if (loading) {
                loading.style.opacity = '0';
                loading.style.transition = 'opacity 0.3s';
                setTimeout(() => loading.remove(), 300);
            }
        }

        // 关闭窗口
        function closeWindow(id) {
            const winData = state.windows[id];
            if (!winData) return;
            
            const win = winData.element;
            win.classList.add('closing');
            
            setTimeout(() => {
                win.remove();
                delete state.windows[id];
                updateDockState(id, false);
                
                if (state.activeWindow === id) {
                    state.activeWindow = Object.keys(state.windows).pop() || null;
                }
            }, 200);
        }

        // 最小化窗口
        function minimizeWindow(id) {
            const winData = state.windows[id];
            if (!winData || winData.minimized) return;
            
            const win = winData.element;
            win.classList.add('minimizing');
            
            setTimeout(() => {
                win.style.display = 'none';
                win.classList.remove('minimizing');
                winData.minimized = true;
            }, 400);
        }

        // 最大化窗口
        function maximizeWindow(id) {
            const winData = state.windows[id];
            if (!winData) return;
            
            const win = winData.element;
            
            if (winData.maximized) {
                // 恢复
                win.classList.add('maximizing');
                win.style.width = winData.originalSize.width;
                win.style.height = winData.originalSize.height;
                win.style.left = winData.originalPosition.left;
                win.style.top = winData.originalPosition.top;
                win.style.borderRadius = '12px';
                
                setTimeout(() => {
                    win.classList.remove('maximizing');
                }, 300);
                
                winData.maximized = false;
            } else {
                // 最大化
                winData.originalSize = {
                    width: win.style.width,
                    height: win.style.height
                };
                winData.originalPosition = {
                    left: win.style.left,
                    top: win.style.top
                };
                
                win.classList.add('maximizing');
                win.style.width = '100vw';
                win.style.height = 'calc(100vh - 28px - 80px)';
                win.style.left = '0';
                win.style.top = '28px';
                win.style.borderRadius = '0';
                
                setTimeout(() => {
                    win.classList.remove('maximizing');
                }, 300);
                
                winData.maximized = true;
            }
        }

        // 聚焦窗口
        function focusWindow(id) {
            const winData = state.windows[id];
            if (!winData) return;
            
            const win = winData.element;
            if (winData.minimized) {
                win.style.display = 'block';
                win.classList.add('opening');
                setTimeout(() => win.classList.remove('opening'), 350);
                winData.minimized = false;
            }
            
            // 置顶
            const maxZ = Math.max(...Object.values(state.windows).map(w => parseInt(w.element.style.zIndex) || 0));
            win.style.zIndex = maxZ + 1;
            
            state.activeWindow = id;
        }

        // 窗口拖拽
        function startDrag(e, id) {
            if (e.target.classList.contains('traffic-light')) return;
            
            const winData = state.windows[id];
            if (!winData || winData.maximized) return;
            
            state.isDragging = true;
            state.dragOffset = {
                x: e.clientX - winData.element.offsetLeft,
                y: e.clientY - winData.element.offsetTop
            };
            state.dragWindowId = id;
            
            document.addEventListener('mousemove', handleDrag);
            document.addEventListener('mouseup', stopDrag);
        }

        function handleDrag(e) {
            if (!state.isDragging) return;
            
            const winData = state.windows[state.dragWindowId];
            if (!winData) return;
            
            const win = winData.element;
            win.style.left = `${e.clientX - state.dragOffset.x}px`;
            win.style.top = `${e.clientY - state.dragOffset.y}px`;
        }

        function stopDrag() {
            state.isDragging = false;
            document.removeEventListener('mousemove', handleDrag);
            document.removeEventListener('mouseup', stopDrag);
        }

        // 窗口缩放
        function startResize(e, id) {
            e.preventDefault();
            e.stopPropagation();
            
            state.isResizing = true;
            state.resizeWindow = id;
            
            document.addEventListener('mousemove', handleResize);
            document.addEventListener('mouseup', stopResize);
        }

        function handleResize(e) {
            if (!state.isResizing) return;
            
            const winData = state.windows[state.resizeWindow];
            if (!winData || winData.maximized) return;
            
            const win = winData.element;
            const newWidth = Math.max(600, e.clientX - win.offsetLeft);
            const newHeight = Math.max(400, e.clientY - win.offsetTop);
            
            win.style.width = `${newWidth}px`;
            win.style.height = `${newHeight}px`;
        }

        function stopResize() {
            state.isResizing = false;
            document.removeEventListener('mousemove', handleResize);
            document.removeEventListener('mouseup', stopResize);
        }

        // 更新 Dock 状态
        function updateDockState(id, active) {
            const dockItem = document.querySelector(`.dock-item[data-id="${id}"]`);
            if (dockItem) {
                if (active) {
                    dockItem.classList.add('active');
                } else {
                    dockItem.classList.remove('active');
                }
            }
        }

        // 右键菜单
        function showContextMenu(e) {
            e.preventDefault();
            const menu = document.getElementById('contextMenu');
            menu.style.left = `${e.clientX}px`;
            menu.style.top = `${e.clientY}px`;
            menu.classList.remove('hidden');
        }

        function showIconContextMenu(e, app) {
            e.preventDefault();
            state.contextMenuTarget = app;
            const menu = document.getElementById('iconContextMenu');
            menu.style.left = `${e.clientX}px`;
            menu.style.top = `${e.clientY}px`;
            menu.classList.remove('hidden');
        }

        function hideContextMenu() {
            document.getElementById('contextMenu').classList.add('hidden');
            document.getElementById('iconContextMenu').classList.add('hidden');
            state.contextMenuTarget = null;
        }

        function refreshDesktop() {
            hideContextMenu();
            location.reload();
        }

        function openFromContextMenu() {
            if (state.contextMenuTarget) {
                openWindow(state.contextMenuTarget);
            }
            hideContextMenu();
        }

        // 关于弹窗
        function showAbout() {
            hideContextMenu();
            document.getElementById('aboutModal').classList.remove('hidden');
        }

        function closeAbout() {
            document.getElementById('aboutModal').classList.add('hidden');
        }

        // 点击空白处取消选中
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.desktop-icon') && !e.target.closest('.context-menu')) {
                state.selectedIcon = null;
                document.querySelectorAll('.desktop-icon').forEach(icon => {
                    icon.classList.remove('selected');
                });
            }
            hideContextMenu();
        });

        // ESC 关闭关于弹窗
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeAbout();
                hideContextMenu();
            }
        });

        // 初始化
        initDesktopIcons();
        initDock();
        
        // 右键桌面
        document.addEventListener('contextmenu', (e) => {
            if (!e.target.closest('.window') && !e.target.closest('.dock') && !e.target.closest('.menu-bar')) {
                showContextMenu(e);
            }
        });
    </script>
</body>
</html>
