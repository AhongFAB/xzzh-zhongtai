<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="财务工具箱 - 非税工具箱、财税工具箱、汇报工具箱">
    <meta name="theme-color" content="#0f172a">
    <title>财务工具箱</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧰</text></svg>">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'PingFang SC','Microsoft YaHei',-apple-system,BlinkMacSystemFont,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;overflow-x:hidden}

        .bg-particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
        .bg-particles span{position:absolute;border-radius:50%;background:rgba(147,197,253,.15);animation:float linear infinite}
        @keyframes float{0%{transform:translateY(100vh) scale(0);opacity:0}50%{opacity:1}100%{transform:translateY(-10vh) scale(1);opacity:0}}

        .hero{position:relative;z-index:1;text-align:center;padding:80px 20px 50px}
        .hero-logo{display:inline-flex;align-items:center;justify-content:center;width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,#3b82f6,#06b6d4);font-size:40px;margin-bottom:24px;box-shadow:0 8px 32px rgba(59,130,246,.3)}
        .hero h1{font-size:40px;font-weight:800;background:linear-gradient(135deg,#fff 0%,#93c5fd 50%,#06b6d4 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:3px;margin-bottom:12px}
        .hero .subtitle{font-size:17px;color:#94a3b8;letter-spacing:6px;font-weight:300}
        .hero .divider{width:60px;height:3px;background:linear-gradient(90deg,#3b82f6,#06b6d4);border-radius:2px;margin:28px auto 0}

        .main{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:40px 20px 60px}
        .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:32px}
        @media(max-width:900px){.cards{grid-template-columns:1fr;gap:24px}.hero h1{font-size:28px}.hero .subtitle{font-size:14px;letter-spacing:4px}}

        .card{background:linear-gradient(145deg,rgba(30,41,59,.8),rgba(15,23,42,.9));border:1px solid rgba(148,163,184,.1);border-radius:22px;padding:48px 32px;cursor:pointer;transition:all .4s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;backdrop-filter:blur(10px);text-decoration:none;display:block;text-align:center}
        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:22px 22px 0 0;opacity:0;transition:opacity .4s}
        .card:hover{transform:translateY(-8px);border-color:rgba(148,163,184,.25);box-shadow:0 20px 60px rgba(0,0,0,.3)}
        .card:hover::before{opacity:1}
        .card:active{transform:translateY(-3px)}

        .card:nth-child(1)::before{background:linear-gradient(90deg,#10b981,#06b6d4)}
        .card:nth-child(2)::before{background:linear-gradient(90deg,#3b82f6,#8b5cf6)}
        .card:nth-child(3)::before{background:linear-gradient(90deg,#f97316,#ef4444)}

        .card .glow{position:absolute;top:-50%;left:-50%;width:200%;height:200%;border-radius:50%;opacity:0;transition:opacity .4s;pointer-events:none}
        .card:nth-child(1) .glow{background:radial-gradient(circle,rgba(16,185,129,.06),transparent 60%)}
        .card:nth-child(2) .glow{background:radial-gradient(circle,rgba(59,130,246,.06),transparent 60%)}
        .card:nth-child(3) .glow{background:radial-gradient(circle,rgba(249,115,22,.06),transparent 60%)}
        .card:hover .glow{opacity:1}

        .card-icon{font-size:64px;margin-bottom:24px;display:block}
        .card-title{font-size:24px;font-weight:700;color:#f1f5f9;margin-bottom:10px;letter-spacing:2px}
        .card-desc{font-size:14px;color:#94a3b8;line-height:1.7;margin-bottom:28px}
        .card-link{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:15px;transition:all .3s}
        .card:nth-child(1) .card-link{color:#34d399}
        .card:nth-child(2) .card-link{color:#60a5fa}
        .card:nth-child(3) .card-link{color:#fb923c}
        .card-link .arrow{display:inline-block;transition:transform .3s}.card:hover .card-link .arrow{transform:translateX(6px)}

        footer{position:relative;z-index:1;text-align:center;padding:40px 20px 24px;color:#475569;font-size:12px;letter-spacing:1px;line-height:1.8}
        footer .copyright-line1{color:#64748b}
        footer .copyright-line2{margin-top:4px;font-size:11px;opacity:.7}
    </style>
</head>
<body>

<div class="bg-particles" id="particles"></div>

<div class="hero">
    <div class="hero-logo">🧰</div>
    <h1>财务工具箱</h1>
    <p class="subtitle">非税 · 财税 · 汇报</p>
    <div class="divider"></div>
</div>

<div class="main">
    <div class="cards">
        <a class="card" href="non-tax.html">
            <div class="glow"></div>
            <span class="card-icon">💼</span>
            <div class="card-title">非税工具箱</div>
            <div class="card-desc">应收应付 · 对账管理</div>
            <span class="card-link">进入 <span class="arrow">→</span></span>
        </a>
        <a class="card" href="tax.html">
            <div class="glow"></div>
            <span class="card-icon">🔧</span>
            <div class="card-title">财税工具箱</div>
            <div class="card-desc">进项核查 · 开票建议 · 合同生成</div>
            <span class="card-link">进入 <span class="arrow">→</span></span>
        </a>
        <a class="card" href="report.html">
            <div class="glow"></div>
            <span class="card-icon">📈</span>
            <div class="card-title">汇报工具箱</div>
            <div class="card-desc">日报 · 周报 · 月报</div>
            <span class="card-link">进入 <span class="arrow">→</span></span>
        </a>
    </div>
</div>

<footer>
    <div class="copyright-line1">© 2026 财务工具箱 · 开发者：张洪杰</div>
    <div class="copyright-line2">版权所有 · 未经授权禁止复制、传播或商业使用 · 侵权必究</div>
</footer>

<script>
const pc=document.getElementById('particles');
for(let i=0;i<20;i++){
    const s=document.createElement('span');
    const size=Math.random()*4+2;
    s.style.cssText=`left:${Math.random()*100}%;width:${size}px;height:${size}px;animation-duration:${Math.random()*15+10}s;animation-delay:${Math.random()*10}s`;
    pc.appendChild(s);
}
</script>
</body>
</html>
